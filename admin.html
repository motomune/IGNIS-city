<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IGNIS CITY - 承認管理</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Noto Sans JP',sans-serif;background:#05050a;color:#fff;min-height:100vh;padding:20px;}
    .bg-gradient{position:fixed;inset:0;background:radial-gradient(circle at 20% 10%,rgba(255,106,0,0.08),transparent 50%),radial-gradient(circle at 80% 90%,rgba(238,9,121,0.08),transparent 50%);pointer-events:none;z-index:0;}
    .container{max-width:1100px;margin:0 auto;position:relative;z-index:1;}
    .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px;padding-bottom:16px;border-bottom:1px solid rgba(255,255,255,0.08);}
    .title{font-size:22px;font-weight:900;background:linear-gradient(135deg,#ff6a00,#ee0979);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:0.06em;}
    .subtitle{font-size:11px;color:rgba(255,255,255,0.4);margin-top:4px;letter-spacing:0.1em;text-transform:uppercase;}
    .user-info{font-size:12px;color:rgba(255,255,255,0.5);text-align:right;}
    .user-info .uname{color:#ff6a00;font-weight:700;}
    .logout-btn{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.6);padding:6px 12px;border-radius:8px;font-size:11px;cursor:pointer;margin-top:6px;}
    .logout-btn:hover{background:rgba(255,255,255,0.1);}
    #login-screen{max-width:380px;margin:80px auto;background:#0a0a14;border:1px solid rgba(255,106,0,0.3);border-radius:18px;padding:32px;position:relative;z-index:1;}
    #login-screen h1{font-size:20px;font-weight:900;background:linear-gradient(135deg,#ff6a00,#ee0979);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;margin-bottom:6px;}
    #login-screen .sub{font-size:11px;color:rgba(255,255,255,0.4);text-align:center;margin-bottom:24px;letter-spacing:0.1em;text-transform:uppercase;}
    .form-group{margin-bottom:14px;}
    .form-group label{display:block;font-size:11px;color:rgba(255,255,255,0.5);margin-bottom:6px;letter-spacing:0.06em;}
    .form-group input{width:100%;background:rgba(255,255,255,0.04);border:1.5px solid rgba(255,255,255,0.1);border-radius:10px;padding:11px 14px;color:#fff;font-size:14px;outline:none;transition:border-color 0.2s;}
    .form-group input:focus{border-color:rgba(255,106,0,0.6);}
    .primary-btn{width:100%;background:linear-gradient(135deg,#ff6a00,#ee0979);border:none;color:#fff;padding:12px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;transition:opacity 0.2s;}
    .primary-btn:hover{opacity:0.9;}
    .primary-btn:disabled{opacity:0.4;cursor:not-allowed;}
    .error-msg{color:#ef4444;font-size:12px;margin-top:8px;text-align:center;min-height:16px;}
    .tabs{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap;}
    .tab{padding:10px 18px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:10px;color:rgba(255,255,255,0.5);font-size:13px;font-weight:700;cursor:pointer;transition:all 0.2s;}
    .tab.active{background:linear-gradient(135deg,rgba(255,106,0,0.2),rgba(238,9,121,0.15));border-color:rgba(255,106,0,0.4);color:#fff;}
    .tab .badge{display:inline-block;background:rgba(255,106,0,0.3);border-radius:8px;padding:1px 8px;font-size:11px;margin-left:6px;}
    .list{display:flex;flex-direction:column;gap:12px;}
    .card{background:#0a0a14;border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:18px 20px;display:grid;grid-template-columns:auto 1fr auto;gap:18px;align-items:start;}
    .card.pending{border-color:rgba(255,165,0,0.3);}
    .card.approved{border-color:rgba(34,197,94,0.25);}
    .card.rejected{opacity:0.55;border-color:rgba(239,68,68,0.25);}
    .rank-icon{font-size:32px;text-align:center;padding-top:4px;}
    .card-body{min-width:0;}
    .card-row{display:flex;gap:12px;align-items:baseline;flex-wrap:wrap;}
    .owner{font-size:12px;color:#1d9bf0;font-weight:700;}
    .owner a{color:#1d9bf0;text-decoration:none;}
    .owner a:hover{text-decoration:underline;}
    .coord{font-size:11px;color:rgba(255,255,255,0.4);font-family:monospace;}
    .floors{font-size:11px;color:rgba(255,255,255,0.5);}
    .status-badge{font-size:10px;font-weight:800;padding:2px 8px;border-radius:6px;letter-spacing:0.08em;text-transform:uppercase;}
    .status-badge.pending{background:rgba(255,165,0,0.18);color:#ffab40;border:1px solid rgba(255,165,0,0.4);}
    .status-badge.approved{background:rgba(34,197,94,0.18);color:#4ade80;border:1px solid rgba(34,197,94,0.4);}
    .status-badge.rejected{background:rgba(239,68,68,0.18);color:#f87171;border:1px solid rgba(239,68,68,0.4);}
    .type-badge{display:inline-block;font-size:10px;font-weight:800;padding:2px 8px;border-radius:5px;margin-left:6px;vertical-align:middle;letter-spacing:0.06em;}
    .type-badge.motto{background:rgba(255,106,0,0.2);color:#ff6a00;border:1px solid rgba(255,106,0,0.4);}
    .type-badge.past{background:rgba(96,165,250,0.18);color:#60a5fa;border:1px solid rgba(96,165,250,0.4);}
    .chip-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px;}
    .chip-item{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);padding:3px 9px;border-radius:12px;font-size:11px;color:rgba(255,255,255,0.7);}
    .past-section{margin-top:8px;font-size:12px;color:rgba(255,255,255,0.4);letter-spacing:0.06em;font-weight:700;}
    .past-text{margin-top:4px;font-size:12px;color:rgba(255,255,255,0.6);background:rgba(255,255,255,0.03);padding:8px 12px;border-radius:8px;line-height:1.6;white-space:pre-wrap;}
    .motto-text{margin-top:8px;padding:10px 14px;border-radius:10px;font-size:15px;font-weight:800;display:inline-block;letter-spacing:0.06em;background:rgba(0,0,0,0.5);}
    .motto-text.rank-5{color:#ee0979;border:2px solid #ee0979;box-shadow:0 0 12px rgba(238,9,121,0.4);}
    .motto-text.rank-4{color:#f59e0b;border:2px solid #f59e0b;box-shadow:0 0 12px rgba(245,158,11,0.4);}
    .motto-text.rank-3{color:#3b82f6;border:2px solid #3b82f6;box-shadow:0 0 12px rgba(59,130,246,0.4);}
    .motto-text.rank-2{color:#22c55e;border:2px solid #22c55e;box-shadow:0 0 12px rgba(34,197,94,0.4);}
    .motto-text.rank-1{color:#94a3b8;border:2px solid #94a3b8;box-shadow:0 0 12px rgba(148,163,184,0.4);}
    .meta{margin-top:8px;font-size:10px;color:rgba(255,255,255,0.3);letter-spacing:0.06em;}
    .actions{display:flex;flex-direction:column;gap:6px;}
    .action-btn{padding:8px 16px;border-radius:8px;border:none;font-size:12px;font-weight:700;cursor:pointer;transition:opacity 0.2s;min-width:96px;}
    .action-btn:hover{opacity:0.85;}
    .action-btn:disabled{opacity:0.4;cursor:not-allowed;}
    .btn-approve{background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;}
    .btn-reject{background:linear-gradient(135deg,#ef4444,#b91c1c);color:#fff;}
    .btn-revert{background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.6);border:1px solid rgba(255,255,255,0.12);}
    .empty{text-align:center;padding:60px 20px;color:rgba(255,255,255,0.3);font-size:14px;}
    .loading{text-align:center;padding:40px;color:rgba(255,255,255,0.4);font-size:13px;}
    #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#0a0a14;border:1px solid rgba(255,106,0,0.5);color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:200;}
    #toast.show{opacity:1;}
    .access-denied{max-width:420px;margin:80px auto;text-align:center;background:#0a0a14;border:1px solid rgba(239,68,68,0.4);border-radius:18px;padding:40px;}
    .access-denied h2{color:#ef4444;font-size:20px;margin-bottom:12px;}
    .access-denied p{color:rgba(255,255,255,0.5);font-size:13px;line-height:1.7;}
    #admin-stats{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:18px;}
    .stat-card{background:#0a0a14;border:1px solid rgba(255,106,0,0.25);border-radius:12px;padding:14px 20px;min-width:150px;}
    .stat-num{font-size:26px;font-weight:900;color:#ff6a00;line-height:1.1;}
    .stat-lbl{font-size:11px;color:rgba(255,255,255,0.5);margin-top:4px;letter-spacing:0.04em;}
    @media(max-width:680px){.card{grid-template-columns:1fr;gap:12px;}.actions{flex-direction:row;}}
  </style>
</head>
<body>
  <div class="bg-gradient"></div>

  <div id="login-screen">
    <h1>IGNIS CITY</h1>
    <div class="sub">Admin Approval Console</div>
    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>メールアドレス</label>
        <input type="email" id="login-email" required autocomplete="email">
      </div>
      <div class="form-group">
        <label>パスワード</label>
        <input type="password" id="login-password" required autocomplete="current-password">
      </div>
      <button class="primary-btn" id="login-btn" type="submit">ログイン</button>
      <div class="error-msg" id="login-error"></div>
    </form>
  </div>

  <div id="denied-screen" class="container" style="display:none;">
    <div class="access-denied">
      <h2>⛔ アクセス拒否</h2>
      <p>このページは管理者のみアクセス可能です。<br>承認権限のないアカウントでログインしました。</p>
      <button class="primary-btn" style="margin-top:18px;" onclick="handleLogout()">ログアウト</button>
    </div>
  </div>

  <div id="admin-screen" class="container" style="display:none;">
    <div class="header">
      <div>
        <div class="title">🛡 IGNIS CITY 管理</div>
        <div class="subtitle">Motto &amp; Past Details Console</div>
      </div>
      <div class="user-info">
        <div>logged in as <span class="uname" id="admin-uname">-</span></div>
        <button class="logout-btn" onclick="handleLogout()">ログアウト</button>
      </div>
    </div>
    <div id="admin-stats">
      <div class="stat-card"><div class="stat-num" id="stat-total">–</div><div class="stat-lbl">総ユーザー数</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-mau">–</div><div class="stat-lbl">直近30日ログイン（実人数）</div></div>
    </div>
    <div class="tabs">
      <button class="tab active" data-tab="pending" onclick="switchTab('pending')">📨 申請中 <span class="badge" id="badge-pending">0</span></button>
      <button class="tab" data-tab="approved" onclick="switchTab('approved')">✅ 承認済み <span class="badge" id="badge-approved">0</span></button>
      <button class="tab" data-tab="rejected" onclick="switchTab('rejected')">❌ 却下 <span class="badge" id="badge-rejected">0</span></button>
      <button class="tab" id="translate-all-btn" onclick="backfillMottoEn()" title="承認済みで未翻訳の格言をDeepLで英訳してDBに保存">🌐 未翻訳を一括英訳</button>
    </div>
    <div id="list-container">
      <div class="loading">読み込み中...</div>
    </div>
  </div>

  <div id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL='https://xssjhgosxyhknonlrjrq.supabase.co';
    const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhzc2poZ29zeHloa25vbmxyanJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxMDE5OTYsImV4cCI6MjA5MjY3Nzk5Nn0.mK-w9uRuOEFkY4XBGervejqmuxiC4yiHHG20OQPOUjU';
    const ADMIN_USER_ID='afc818cd-d2fa-4c1c-8460-9dbce9e60e37';
    const db=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

    const CHIP_LABELS={money:'お金',trust:'信用',friend:'友人',partner:'恋人',family:'家族',health:'健康',workplace:'職場の居場所',other:'その他'};
    function chipsHtml(arr){
      if(!arr||!arr.length)return '<span style="font-size:11px;color:rgba(255,255,255,0.3);">（なし）</span>';
      return arr.map(v=>{
        const s=String(v);
        const label=s.startsWith('other:')?`その他: ${s.slice(6)}`:(CHIP_LABELS[s]||s);
        return `<span class="chip-item">${escapeHtml(label)}</span>`;
      }).join('');
    }

    let currentTab='pending';
    let profiles=[];
    let currentUser=null;

    function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

    function showScreen(screen){
      document.getElementById('login-screen').style.display=screen==='login'?'block':'none';
      document.getElementById('denied-screen').style.display=screen==='denied'?'block':'none';
      document.getElementById('admin-screen').style.display=screen==='admin'?'block':'none';
    }

    async function handleLogin(ev){
      ev.preventDefault();
      const email=document.getElementById('login-email').value.trim();
      const password=document.getElementById('login-password').value;
      const btn=document.getElementById('login-btn');
      const errEl=document.getElementById('login-error');
      errEl.textContent='';btn.disabled=true;btn.textContent='ログイン中...';
      try{
        const{data,error}=await db.auth.signInWithPassword({email,password});
        if(error)throw error;
        await checkAndShowAdmin(data.user);
      }catch(e){errEl.textContent=e.message||'ログインに失敗しました';}
      finally{btn.disabled=false;btn.textContent='ログイン';}
    }

    async function checkAndShowAdmin(user){
      currentUser=user;
      if(!user||user.id!==ADMIN_USER_ID){showScreen('denied');return;}
      const{data:ud}=await db.from('users').select('username,x_username').eq('id',user.id).single();
      const display=ud&&ud.x_username?`@${ud.x_username}`:ud&&ud.username?ud.username:user.email;
      document.getElementById('admin-uname').textContent=display;
      showScreen('admin');
      loadAdminStats();
      await loadProfiles();
    }
    async function loadAdminStats(){
      try{
        const{data,error}=await db.rpc('get_admin_stats');
        if(error)throw error;
        if(data&&!data.error){
          document.getElementById('stat-total').textContent=(data.total_users??'–').toLocaleString?data.total_users.toLocaleString():data.total_users;
          document.getElementById('stat-mau').textContent=(data.mau_30d??'–').toLocaleString?data.mau_30d.toLocaleString():data.mau_30d;
        }
      }catch(e){console.warn('admin stats',e);}
    }

    async function handleLogout(){
      await db.auth.signOut();
      currentUser=null;profiles=[];
      showScreen('login');
    }

    async function loadProfiles(){
      document.getElementById('list-container').innerHTML='<div class="loading">読み込み中...</div>';
      try{
        const[mottoRes,pastRes]=await Promise.all([
          db.from('building_profiles').select('id,user_id,building_x,building_z,motto_text,pending_motto_text,pending_submitted_at,status,created_at,reviewed_at').order('created_at',{ascending:false}),
          db.from('building_past_details').select('id,user_id,building_x,building_z,lost_items,gained_items,background_detail,current_positive,status,created_at,updated_at').order('updated_at',{ascending:false}),
        ]);
        if(mottoRes.error)throw mottoRes.error;
        if(pastRes.error)throw pastRes.error;
        const mottoItems=(mottoRes.data||[]).map(p=>{
          // 承認済み格言に修正申請(pending_motto_text)が付いている＝「修正の承認待ち」
          const isEdit=p.status==='approved'&&!!p.pending_motto_text;
          return{...p,_type:'motto',_isEdit:isEdit,_reviewState:isEdit?'pending':p.status,
            created_at:isEdit?(p.pending_submitted_at||p.created_at):p.created_at};
        });
        const pastItems=(pastRes.data||[]).map(p=>({...p,created_at:p.updated_at||p.created_at,_type:'past',_isEdit:false,_reviewState:p.status}));
        const allItems=[...mottoItems,...pastItems];
        const userIds=[...new Set(allItems.map(p=>p.user_id))];
        let userMap={};
        if(userIds.length){
          const{data:ud}=await db.from('users').select('id,username,x_username').in('id',userIds);
          (ud||[]).forEach(u=>{userMap[u.id]={username:u.username,x_username:u.x_username};});
        }
        const bxList=[...new Set(allItems.map(p=>p.building_x))];
        let bMap={};
        if(bxList.length){
          const{data:bd}=await db.from('buildings').select('x,z,floors').in('x',bxList);
          (bd||[]).forEach(b=>{bMap[`${b.x}_${b.z}`]=b.floors;});
        }
        profiles=allItems.map(p=>({...p,users:userMap[p.user_id]||{},_floors:bMap[`${p.building_x}_${p.building_z}`]||0}));
        profiles.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
        renderList();
      }catch(e){
        console.warn(e);
        document.getElementById('list-container').innerHTML=`<div class="empty">読み込みに失敗しました: ${e.message}</div>`;
      }
    }

    function getStarByFloors(f){if(f>=48)return 5;if(f>=40)return 4;if(f>=30)return 3;if(f>=20)return 2;return 1;}
    const BUILDING_ICONS={5:'🏙',4:'🏢',3:'🏬',2:'🏪',1:'🏠'};
    const STAR_LABELS={5:'★★★★★ 伝説',4:'★★★★ エピック',3:'★★★ レア',2:'★★ アンコモン',1:'★ コモン'};
    function rankClass(star){return 'rank-'+star;}

    function switchTab(tab){
      currentTab=tab;
      document.querySelectorAll('.tab').forEach(el=>el.classList.toggle('active',el.dataset.tab===tab));
      renderList();
    }

    function fmtTime(iso){if(!iso)return '';const d=new Date(iso);return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;}

    function renderList(){
      const counts={pending:0,approved:0,rejected:0};
      profiles.forEach(p=>{if(counts[p._reviewState]!==undefined)counts[p._reviewState]++;});
      document.getElementById('badge-pending').textContent=counts.pending;
      document.getElementById('badge-approved').textContent=counts.approved;
      document.getElementById('badge-rejected').textContent=counts.rejected;
      const filtered=profiles.filter(p=>p._reviewState===currentTab);
      const container=document.getElementById('list-container');
      if(!filtered.length){container.innerHTML=`<div class="empty">該当する申請はありません</div>`;return;}
      container.innerHTML='<div class="list">'+filtered.map(p=>renderCard(p)).join('')+'</div>';
    }

    function renderCard(p){
      const star=getStarByFloors(p._floors);
      const icon=BUILDING_ICONS[star]||'🏢';
      const u=p.users||{};
      const xName=u.x_username||'';
      const ownerHtml=xName?`<a href="https://x.com/${encodeURIComponent(xName)}" target="_blank" rel="noopener">@${xName}</a>`:(u.username||'(unknown)');
      const typeBadge=p._type==='motto'
        ?(p._isEdit?`<span class="type-badge motto">✏️ 格言修正</span>`:`<span class="type-badge motto">💬 格言</span>`)
        :`<span class="type-badge past">📖 過去詳細</span>`;
      let bodyHtml='';
      if(p._type==='motto'){
        if(p._isEdit){
          // 修正申請：現在の承認済み格言と、修正後（承認待ち）を並べて表示
          bodyHtml=`
            <div class="past-section">現在の格言（壁に表示中）</div>
            <div class="motto-text ${rankClass(star)}" style="opacity:0.6;">💬 ${escapeHtml(p.motto_text||'')}</div>
            <div class="past-section" style="margin-top:8px;color:#ffab40;">修正後（承認待ち）</div>
            <div class="motto-text ${rankClass(star)}">💬 ${escapeHtml(p.pending_motto_text||'')}</div>`;
        }else{
          bodyHtml=p.motto_text
            ?`<div class="motto-text ${rankClass(star)}">💬 ${escapeHtml(p.motto_text)}</div>`
            :'<div style="margin-top:6px;font-size:12px;color:rgba(255,255,255,0.3);">（格言なし）</div>';
        }
      } else {
        bodyHtml=`
          <div class="past-section">① 失ったもの</div><div class="chip-row">${chipsHtml(p.lost_items)}</div>
          <div class="past-section" style="margin-top:8px;">② 得たもの・得ようとしているもの</div><div class="chip-row">${chipsHtml(p.gained_items)}</div>
          ${p.background_detail?`<div class="past-section" style="margin-top:8px;">③ 背景と経緯の詳細</div><div class="past-text">${escapeHtml(p.background_detail)}</div>`:''}
          ${p.current_positive?`<div class="past-section" style="margin-top:8px;">④ 読者へのメッセージ</div><div class="past-text">${escapeHtml(p.current_positive)}</div>`:''}`;
      }
      let actions='';
      if(p._isEdit){
        actions=`
          <button class="action-btn btn-approve" onclick="approveMottoEdit('${p.id}')">✅ 修正を承認</button>
          <button class="action-btn btn-reject" onclick="rejectMottoEdit('${p.id}')">❌ 修正を却下</button>`;
      } else if(p._reviewState==='pending'){
        actions=`
          <button class="action-btn btn-approve" onclick="updateStatus('${p.id}','${p._type}','approved')">✅ 承認</button>
          <button class="action-btn btn-reject" onclick="updateStatus('${p.id}','${p._type}','rejected')">❌ 却下</button>`;
      } else {
        actions=`<button class="action-btn btn-revert" onclick="updateStatus('${p.id}','${p._type}','pending')">↩ 差し戻し</button>`;
      }
      const reviewedAt=p._isEdit?null:(p._type==='motto'?p.reviewed_at:p.updated_at);
      const reviewedLine=reviewedAt?` ／ 審査: ${fmtTime(reviewedAt)}`:'';
      const submitLabel=p._isEdit?'修正申請':'申請';
      return `
        <div class="card ${p._reviewState}">
          <div class="rank-icon" title="${STAR_LABELS[star]}">${icon}</div>
          <div class="card-body">
            <div class="card-row">
              <span class="owner">👤 ${ownerHtml}</span>${typeBadge}
              <span class="coord">座標 ${p.building_x},${p.building_z}</span>
              <span class="floors">${p._floors||'?'}F / ${STAR_LABELS[star]}</span>
              <span class="status-badge ${p._reviewState}">${p._reviewState}</span>
            </div>
            ${bodyHtml}
            <div class="meta">${submitLabel}: ${fmtTime(p.created_at)}${reviewedLine}</div>
          </div>
          <div class="actions">${actions}</div>
        </div>`;
    }

    function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);}

    // 承認済み格言への「修正申請」を承認＝修正本文を本採用
    async function approveMottoEdit(id){
      const item=profiles.find(p=>p.id===id&&p._type==='motto');
      if(!item||!item.pending_motto_text){showToast('対象が見つかりません');return;}
      try{
        const{error}=await db.from('building_profiles').update({
          motto_text:item.pending_motto_text,
          pending_motto_text:null,
          pending_submitted_at:null,
          reviewed_at:new Date().toISOString()
        }).eq('id',id);
        if(error)throw error;
        translatePending({ids:[id]}).catch(()=>{}); // 採用された格言を英訳してDBへ
        showToast('✓ 修正を承認しました');
        await loadProfiles();
      }catch(e){console.warn(e);showToast('更新に失敗しました: '+e.message);}
    }
    // 修正申請を却下＝元の承認済み格言を維持し、修正本文を破棄
    async function rejectMottoEdit(id){
      if(!confirm('この修正申請を却下しますか？（元の格言はそのまま残ります）'))return;
      try{
        const{error}=await db.from('building_profiles').update({
          pending_motto_text:null,
          pending_submitted_at:null
        }).eq('id',id);
        if(error)throw error;
        showToast('✓ 修正を却下しました');
        await loadProfiles();
      }catch(e){console.warn(e);showToast('更新に失敗しました: '+e.message);}
    }

    async function updateStatus(id,type,newStatus){
      const ok=newStatus==='rejected'?confirm('この申請を却下しますか？'):true;
      if(!ok)return;
      try{
        const table=type==='motto'?'building_profiles':'building_past_details';
        const now=new Date().toISOString();
        const payload=type==='motto'
          ?{status:newStatus,reviewed_at:newStatus==='pending'?null:now}
          :{status:newStatus,updated_at:now};
        const{error}=await db.from(table).update(payload).eq('id',id);
        if(error)throw error;
        if(newStatus==='approved')translatePending(type==='motto'?{ids:[id]}:{pastIds:[id]}).catch(()=>{}); // 承認した内容を英訳
        const label=newStatus==='approved'?'承認':newStatus==='rejected'?'却下':'差し戻し';
        showToast(`✓ ${label}しました`);
        await loadProfiles();
      }catch(e){console.warn(e);showToast('更新に失敗しました: '+e.message);}
    }

    // ===== DeepL 英訳（Edge Function translate-motto 経由）=====
    // payload: {ids:[..]}=格言 / {pastIds:[..]}=過去詳細 / {}=未翻訳を全件。キーはサーバー側シークレット。
    async function translatePending(payload){
      try{
        const{data:{session}}=await db.auth.getSession();
        const token=session&&session.access_token;
        if(!token)return null;
        const res=await fetch(`${SUPABASE_URL}/functions/v1/translate-motto`,{
          method:'POST',
          headers:{'Authorization':`Bearer ${token}`,'apikey':SUPABASE_ANON_KEY,'Content-Type':'application/json'},
          body:JSON.stringify(payload||{})
        });
        return await res.json();
      }catch(e){console.warn('translate-motto error',e);return null;}
    }
    async function backfillMottoEn(){
      const btn=document.getElementById('translate-all-btn');
      if(btn){btn.disabled=true;btn.textContent='英訳中...';}
      const r=await translatePending({});
      if(btn){btn.disabled=false;btn.textContent='🌐 未翻訳を一括英訳';}
      if(r&&r.ok)showToast(`✓ 英訳：格言${r.motto}件／過去詳細${r.past}件`);
      else showToast('英訳に失敗（関数とDEEPL_API_KEYの設定を確認）: '+((r&&r.error)||''));
    }

    (async()=>{
      const{data}=await db.auth.getSession();
      if(data.session&&data.session.user){await checkAndShowAdmin(data.session.user);}
      else{showScreen('login');}
    })();
  </script>
