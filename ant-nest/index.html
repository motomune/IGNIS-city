<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>小さな仲間で、大きな巣を｜Little Diggers, Great Nest</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #1a120b; font-family: "Segoe UI", system-ui, sans-serif; }
  #game { display: block; width: 100vw; height: 100vh; cursor: crosshair; }
  #hud {
    position: fixed; top: 10px; left: 10px; color: #fff; font-size: 11px;
    text-shadow: 0 1px 3px #000; pointer-events: none; line-height: 1.32;
    background: rgba(10,8,4,.4); padding: 6px 9px; border-radius: 9px; max-width: 240px;
  }
  #hud .bar { width: 128px; height: 8px; background: rgba(0,0,0,.5); border: 1px solid #000; border-radius: 6px; overflow: hidden; margin: 2px 0 4px; }
  #hud .bar > span { display: block; height: 100%; transition: width .12s linear; }
  #xpPct { color:#9fdcff; font-weight:800; }
  #stage { font-size: 13.5px; font-weight: 700; }
  #colony { margin-top: 3px; color: #ffd9a0; white-space: pre-line; }
  #quest { margin-top: 5px; color: #9fe8ff; font-weight: 700; }
  #help {
    position: fixed; bottom: 96px; left: 10px; right: 10px; color: #e3d5bb; font-size: 11px;
    text-shadow: 0 1px 2px #000; pointer-events: none; text-align: center; opacity:.85;
  }
  /* 画面操作ボタン */
  .ctrl { position: fixed; z-index: 8; user-select:none; -webkit-user-select:none; touch-action:none; }
  .btn { background:rgba(44,32,18,.55); border:2px solid rgba(255,255,255,.28); border-radius:14px;
         color:#fff; font-size:12px; font-weight:700; display:flex; align-items:center; justify-content:center;
         text-align:center; line-height:1.15; cursor:pointer; -webkit-tap-highlight-color:transparent; }
  .btn:active, .btn.on { background:rgba(150,110,50,.85); transform:scale(0.96); }
  /* 押した瞬間だけ光るフラッシュ（操作ボタン用） */
  .btn.tap { background:rgba(255,196,96,.98)!important; border-color:#fff!important; color:#3a2a10!important; transform:scale(0.93); }
  /* BGMボタンだけは ON/OFF が一目でわかる持続表示 */
  .btn.bgm-on  { background:rgba(70,190,110,.9); border-color:rgba(150,255,190,.95); color:#eafff2; }
  .btn.bgm-off { background:rgba(56,56,62,.7); border-color:rgba(255,255,255,.2); color:rgba(255,255,255,.45); }
  #joy { left:20px; bottom:20px; width:120px; height:120px; border-radius:50%;
         background:rgba(44,32,18,.4); border:2px solid rgba(255,255,255,.25); touch-action:none; }
  #joyKnob { position:absolute; left:50%; top:50%; width:54px; height:54px; margin:-27px 0 0 -27px;
             border-radius:50%; background:rgba(200,150,70,.85); border:2px solid rgba(255,255,255,.45);
             box-shadow:0 3px 10px rgba(0,0,0,.4); transition:transform .04s linear; pointer-events:none; }
  #acts { right:14px; bottom:16px; display:grid; grid-template-columns:repeat(3,76px); grid-auto-rows:48px; gap:7px; }
  #shareBox { position:fixed; top:14px; left:50%; transform:translateX(-50%); z-index:11; display:none;
    background:rgba(15,12,8,.9); border:2px solid #ffd86a; border-radius:12px; padding:10px 12px; color:#fff;
    font-size:13px; align-items:center; gap:10px; box-shadow:0 4px 16px rgba(0,0,0,.5); }
  #shareBox.on { display:flex; }
  #shareMsg { max-width:230px; line-height:1.3; }
  #shareBtn { background:#111; color:#fff; border:1px solid #555; border-radius:8px; padding:8px 12px; font-weight:700; cursor:pointer; }
  #shareClose { background:transparent; color:#aaa; border:none; font-size:20px; cursor:pointer; }
  #toast {
    position: fixed; top: 40%; left: 50%; transform: translate(-50%,-50%);
    color: #fff; font-size: 27px; font-weight: 800; text-shadow: 0 2px 8px #000;
    pointer-events: none; opacity: 0; transition: opacity .3s; text-align:center; max-width: 90vw;
  }
  #over {
    position: fixed; inset: 0; background: rgba(8,4,2,.82); display: none;
    flex-direction: column; align-items: center; justify-content: center; color: #fff; z-index: 10;
  }
  #over h1 { font-size: 42px; margin: 0 0 14px; text-shadow: 0 3px 10px #000; }
  #over p { font-size: 18px; margin: 6px 0; color: #ffd9a0; }
  #over .retry { margin-top: 22px; font-size: 16px; color: #9fe8ff; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="hud">
  <div id="stage">🥚 たまご</div>
  <div id="hpLabel">体力</div>
  <div class="bar"><span id="hpBar" style="width:100%;background:#e44;"></span></div>
  <div id="evoPct" style="color:#9fdcff;font-weight:800;"></div>
  <div id="stats"></div>
  <div id="colony"></div>
  <div id="quest"></div>
</div>
<div id="toast"></div>
<div id="over">
  <h1>💀 コロニー全滅…</h1>
  <p id="overStats"></p>
  <p class="retry">R キー または クリック で再挑戦</p>
</div>
<div id="help">
  画面ボタンで操作 ・ 🍖運搬=働きアリに死骸/ゴミを運ばせる ・ 触れた虫は攻撃＆食料で回復 ・ 🪙コインはタッチで回収 ・ 🔴赤/⚪白アリ誕生で𝕏シェア ・ 自動セーブ
</div>
<!-- 画面操作：移動ジョイスティック -->
<div id="joy" class="ctrl"><div id="joyKnob"></div></div>
<!-- 画面操作：アクション -->
<div id="acts" class="ctrl">
  <div class="btn" data-act="grabdig">🤏掴む/置く</div>
  <div class="btn" data-act="lay">🥚産卵</div>
  <div class="btn" data-act="gather">🍖運搬</div>
  <div class="btn" data-act="digrole">⛏任命</div>
  <div class="btn" data-act="soldier">⚔兵隊任命</div>
  <div class="btn" data-act="bgm">🎵BGM</div>
</div>
<!-- レアアリ誕生時のXシェア -->
<div id="shareBox"><div id="shareMsg"></div><button id="shareBtn">𝕏 にシェア</button><button id="shareClose">×</button></div>

<script>
"use strict";
/* =====================================================================
   アリの巣 ANT NEST v4 — コロニーサバイバル + バイオーム
   重力/壁登り(飛行不可) / 巣の設計図に沿った採掘 / 森・畑・都市バイオーム
   昼=発展 / 夜=防衛ウェーブ(地域別の外敵) / アリクイ / 兵隊 / アブラムシ / クエスト
   ===================================================================== */
const TAU = Math.PI * 2;
// ---- 言語（親IGNISから ?lang=en で英語表示）----
const JA = (new URLSearchParams(location.search).get("lang") !== "en");
const L = (ja,en) => JA ? ja : en;
// 英語のときは固定UI（ボタン/ヘルプ/全滅画面/シェア）を差し替え
if (!JA){
  document.documentElement.lang="en";
  const setTxt=(sel,txt)=>{ const el=document.querySelector(sel); if(el) el.textContent=txt; };
  setTxt('[data-act="grabdig"]',"🤏Grab/Place");
  setTxt('[data-act="lay"]',"🥚Lay Egg");
  setTxt('[data-act="gather"]',"🍖Haul");
  setTxt('[data-act="digrole"]',"⛏Assign Dig");
  setTxt('[data-act="soldier"]',"⚔Assign Soldier");
  setTxt('[data-act="bgm"]',"🎵BGM");
  setTxt('#help',"On-screen controls ・ 🍖Haul = workers carry carcasses/trash ・ touch bugs to attack & food to heal ・ 🪙tap coins to collect ・ 🔴red/⚪white ant births = share on 𝕏 ・ auto-save");
  setTxt('#over h1',"💀 Colony wiped out…");
  setTxt('#over .retry',"Press R or click to retry");
  setTxt('#shareBtn',"𝕏 Share");
  setTxt('#hpLabel',"HP");
}
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// ---- World ----
const CELL = 26, COLS = 180, ROWS = 70, SURFACE = 14;
const WORLD_W = COLS * CELL, WORLD_H = ROWS * CELL;
const AIR = 0, DIRT = 1, ROCK = 2, SAND = 3;
const grid = new Int8Array(COLS * ROWS);
const surfaceH = new Int16Array(COLS);
const gi = (cx, cy) => cy * COLS + cx;
const inBounds = (cx, cy) => cx >= 0 && cx < COLS && cy >= 0 && cy < ROWS;
const cellAt = (cx, cy) => inBounds(cx, cy) ? grid[gi(cx, cy)] : ROCK;
const setCell = (cx, cy, v) => { if (inBounds(cx, cy)) grid[gi(cx, cy)] = v; };
const colonyCx = (COLS / 2) | 0;

// ---- バイオーム（森 / 畑 / 都市）。巣は中央の「畑」にある ----
const BIOME_W = COLS / 3;
function biomeIdx(cx){ return cx < BIOME_W ? 0 : cx < BIOME_W*2 ? 1 : 2; }
const BIOMES = [
  { key:"forest", name:"🌲森",   nameEn:"🌲Forest", night:["beetle","stag","centipede","mantis"], day:["beetle","grub"] },
  { key:"farm",   name:"🌾畑",   nameEn:"🌾Farm",   night:["locust","caterpillar","beetle"],      day:["locust","caterpillar"] },
  { key:"city",   name:"🏙都市", nameEn:"🏙City",   night:["roach","spider","centipede"],         day:["roach","spider"] },
];

// ---- 巣の設計図 & 役割別の部屋 ----
const nestPlan = [];                 // 掘る予定セル {cx,cy,k}
const nestPlanSet = new Set();
const planRoom = new Map();          // k -> roomId（部屋）/ -1（通路・縦坑）
function planAdd(cx, cy){
  if (!inBounds(cx,cy) || cy < surfaceH[cx] || cy >= ROWS-2) return;
  const k = cy*COLS + cx;
  if (grid[k]===ROCK) grid[k]=DIRT;        // 設計図上の岩盤は掘れる土に（縦坑が詰まらないように）
  if (!planRoom.has(k)) planRoom.set(k, -1);
  if (!nestPlanSet.has(k)){ nestPlanSet.add(k); nestPlan.push({cx,cy,k}); }
}
// このセルを掘ると別々の部屋同士が直接つながってしまうか（壁を1マス残すための判定）
function wouldMergeRooms(cx,cy){
  const ids=new Set();
  const self=planRoom.get(cy*COLS+cx); if (self>=0) ids.add(self);
  for (const [dx,dy] of NB){ const nx=cx+dx, ny=cy+dy;
    if (cellAt(nx,ny)===AIR){ const id=planRoom.get(ny*COLS+nx); if (id>=0) ids.add(id); } }
  return ids.size>=2;                 // 2部屋以上に接する＝掘ると壁が消える→掘らせない
}
function planTunnel(x0, y, x1){ for (let x=Math.min(x0,x1); x<=Math.max(x0,x1); x++) planAdd(x,y); }

// 巣の部屋：queen=女王の間 / nursery=育児室 / food=食料庫 / waste=ゴミ捨て場
const rooms = [];                    // {type, cells:[{cx,cy,k}], cx, cy, built}
const roomCellType = new Map();      // k -> type（完成した部屋のセル）
// 部屋はこのサイクル順にエンドレスに増設：ゴミ→食糧→女王→育児→ゴミ→…（3つ目ごとに女王室）
const ROOM_CYCLE = ["waste","food","queen","nursery"];
const ROOM_CAP = 36;                 // 暴走防止の上限（実プレイでは事実上エンドレス）
let roomsCompleted = 0;              // 完成した部屋の累計（敵レベルの基準）
const ROOM_META = {
  queen:  {label:L("👑女王の間","👑Queen's Chamber"),   tint:"rgba(170,110,210,0.13)"},
  nursery:{label:L("🥚育児室","🥚Nursery"),             tint:"rgba(120,205,130,0.13)"},
  food:   {label:L("🍖食料庫","🍖Pantry"),               tint:"rgba(225,175,80,0.13)"},
  waste:  {label:L("🗑ゴミ捨て場","🗑Dump"),             tint:"rgba(140,125,100,0.13)"},
};
function addRoom(type, ccx, ccy, rw, rh){
  const id=rooms.length, cells=[];
  for (let dx=-rw;dx<=rw;dx++) for (let dy=-rh;dy<=rh;dy++)
    if ((dx*dx)/(rw*rw)+(dy*dy)/(rh*rh) <= 1.05){
      const cx=ccx+dx, cy=ccy+dy, k=cy*COLS+cx;
      if (!inBounds(cx,cy) || cy<surfaceH[cx] || cy>=ROWS-2) continue;
      if (planRoom.has(k) && planRoom.get(k)>=0 && planRoom.get(k)!==id) continue; // 他の部屋を侵食しない
      planAdd(cx,cy); planRoom.set(k,id); cells.push({cx,cy,k});
    }
  rooms.push({type, cells, cx:ccx, cy:ccy, built:false});
}
function builtRoom(type){ for (const r of rooms) if (r.built && r.type===type) return r; return null; }
function roomTypeAt(x,y){ return roomCellType.get(((y/CELL)|0)*COLS + ((x/CELL)|0)) || null; }
function baseBuilt(){ return ["queen","nursery","food","waste"].every(t=>builtRoom(t)); }
// 最初の巣：縦坑に女王の間→育児室→食料庫→ゴミ捨て場を順に接続
function buildBaseNest(){
  const ex=colonyCx, top=surfaceH[ex];
  // 浅い順に4部屋。最深がreorgで女王室になる（=地上から最も遠く、通路のみで接続）
  const layout=[
    {type:"waste",   d:5,  side:-1, rw:2, rh:2, br:8},
    {type:"food",    d:10, side:1,  rw:3, rh:2, br:9},
    {type:"queen",   d:15, side:-1, rw:3, rh:2, br:8},
    {type:"nursery", d:20, side:1,  rw:3, rh:2, br:9},
  ];
  const maxY=Math.min(ROWS-4, top+20);
  for (let y=top; y<=maxY; y++) planAdd(ex,y);          // 主縦坑（地上と巣をつなぐ唯一の口）
  for (const L of layout){
    const ry=Math.min(ROWS-4, top+L.d);
    const rcx=Math.max(3,Math.min(COLS-4, ex+L.side*L.br));   // 長めの枝通路
    planTunnel(ex, ry, rcx);
    addRoom(L.type, rcx, ry, L.rw, L.rh);
  }
}
// 部屋の完成判定（岩盤セルは無視して、土/砂が無くなれば完成）
function updateRooms(){
  for (const r of rooms){
    if (r.built) continue;
    let done=true;
    // 壁として残すセル(別部屋に接する)は掘らないので完成判定から除外
    for (const c of r.cells){ const v=grid[c.k]; if ((v===DIRT||v===SAND) && !wouldMergeRooms(c.cx,c.cy)){ done=false; break; } }
    if (done){
      r.built=true;
      for (const c of r.cells) roomCellType.set(c.k, r.type);
      if (!r.counted){ r.counted=true; roomsCompleted++; announceEnemyMilestone(roomsCompleted); }
      toast(`🏠 ${ROOM_META[r.type].label} ${L("が完成","done")}！(${roomsCompleted})`, "#cfe", 1.6); sfx("hatch");
    }
  }
}
let expandTier=0;   // 旧仕様の名残（セーブ互換のため残置・未使用）
// エンドレス拡大：全部屋を掘り終えたら、サイクル順(ゴミ→食糧→女王→育児…)に次の1部屋を計画。
// 掘り終えるたびに次が増えるので、生まれたアリが掘り続ける限り巣が広がり続ける。
function maybeExpand(){
  if (!baseBuilt()) return;
  if (rooms.length>=ROOM_CAP) return;          // 暴走防止の上限
  if (rooms.some(r=>!r.built)) return;          // まだ掘っている部屋がある→待つ
  const ex=colonyCx, top=surfaceH[ex];
  const idx=rooms.length;                       // 作成順（=サイクル位置）
  const ry=Math.min(ROWS-4, top + 8 + idx*2);   // 緩やかに深く
  const side=(idx%2===0)?-1:1;                  // 左右交互
  const reach=8 + (idx%6)*3;                    // 8,11,14,17,20,23…と横に広げる
  const rcx=Math.max(3, Math.min(COLS-4, ex + side*reach));
  for (let y=top; y<=ry; y++) planAdd(ex,y);    // 主縦坑を伸ばす
  planTunnel(ex, ry, rcx);
  const type=ROOM_CYCLE[idx%4];
  addRoom(type, rcx, ry, 3, 2);
  toast(`🏗 ${L("巣を拡張：新しい","Expanding: new ")}${ROOM_META[type].label}`, "#fea", 1.6); sfx("quest");
}
// 部屋を周囲に掘り広げて拡張
function enlargeRoom(r, rw, rh){
  const id=rooms.indexOf(r);
  for (let dx=-rw;dx<=rw;dx++) for (let dy=-rh;dy<=rh;dy++)
    if ((dx*dx)/(rw*rw)+(dy*dy)/(rh*rh) <= 1.05){
      const cx=r.cx+dx, cy=r.cy+dy, k=cy*COLS+cx;
      if (!inBounds(cx,cy)||cy<surfaceH[cx]||cy>=ROWS-2) continue;
      if (grid[k]===AIR) continue;                                       // 既に開いた所(通路等)は触らない
      if (planRoom.has(k) && planRoom.get(k)>=0 && planRoom.get(k)!==id) continue; // 他室は侵食しない
      planAdd(cx,cy); planRoom.set(k,id);
      if (!r.cells.some(c=>c.k===k)) r.cells.push({cx,cy,k});
    }
  r.built=false;     // 拡張分を掘るまで未完了に戻す
}
// 役割部屋が揃ったら成熟：女王室を最深部へ（ゴミ部屋と役割交換）＋各部屋を拡張
let matured=false;
function matureNest(){
  if (matured || !baseBuilt()) return;
  matured=true;                                      // 基本4部屋が完成＝以降はサイクルでエンドレス拡大
  banner(L("🏛 巣が安定：ここからサイクルで巣が広がり続ける","🏛 Nest stable: it now keeps growing in a cycle"), "#cfe", 2.4); sfx("quest");
}
// 敵レベルの解放アナウンス（完成部屋数に連動）
function announceEnemyMilestone(n){
  if (n===6)  { banner(L("⚔ 部屋6つ：カマキリが参戦！","⚔ 6 rooms: Mantises join the assault!"), "#fda", 2.4); sfx("newbug"); }
  else if (n===9)  { banner(L("⚔ 部屋9つ：ムカデが出現！","⚔ 9 rooms: Centipedes appear!"), "#fda", 2.4); sfx("newbug"); }
  else if (n===12) { banner(L("⚔ 部屋12：カブトムシ・クワガタ参戦！","⚔ 12 rooms: Beetles & stags join!"), "#fda", 2.4); sfx("newbug"); }
  else if (n===15) { banner(L("⚠ 部屋15：アリクイ参戦！以降は敵が強化されていく","⚠ 15 rooms: Anteater joins! Enemies now grow stronger"), "#f88", 2.8); sfx("roar"); }
  else if (n>15 && (n-15)%3===0) banner(L(`⚠ 敵が強化（Lv${Math.floor((n-15)/3)}）`,`⚠ Enemies strengthened (Lv${Math.floor((n-15)/3)})`), "#f99", 2.2);
}

function genWorld(){
  for (let cx = 0; cx < COLS; cx++){
    const surf = SURFACE + Math.round(Math.sin(cx*0.18)*1.5 + Math.sin(cx*0.05)*2);
    surfaceH[cx] = surf;
    for (let cy = 0; cy < ROWS; cy++){
      let v = AIR;
      if (cy >= surf) v = DIRT;
      if (cy >= ROWS - 2) v = ROCK;
      if (v === DIRT && cy > surf+2 && Math.random() < 0.02) v = ROCK;
      grid[gi(cx,cy)] = v;
    }
  }
}

// ---- Camera / resize ----
const cam = { x: 0, y: 0 };
const darkC = document.createElement("canvas");
const dctx = darkC.getContext("2d");
function resize(){ canvas.width = innerWidth; canvas.height = innerHeight; darkC.width = canvas.width; darkC.height = canvas.height; }
addEventListener("resize", resize); resize();

// ---- フェロモン道 / 季節・天候 / 飢餓 ----
const pher = new Float32Array(COLS*ROWS);          // 餌道フェロモンの強さ
let pherDecayT = 0;
function pherAt(cx,cy){ return inBounds(cx,cy)?pher[cy*COLS+cx]:0; }
function depositPher(cx,cy,amt){ if(inBounds(cx,cy)){ const k=cy*COLS+cx; pher[k]=Math.min(8, pher[k]+amt); } }
const SEASONS=[
  {n:"🌸 春", nEn:"🌸 Spring", rain:0.40, cold:0.05},
  {n:"☀ 夏", nEn:"☀ Summer", rain:0.22, cold:0.00},
  {n:"🍂 秋", nEn:"🍂 Autumn", rain:0.45, cold:0.20},
  {n:"❄ 冬", nEn:"❄ Winter", rain:0.00, cold:0.60},
];
function seasonIdx(){ return Math.floor((dayNum-1)/3)%4; }
function curSeason(){ return SEASONS[seasonIdx()]; }
let weather="clear", weatherT=14;                  // clear / rain / snow
let envSlow=1;                                      // 寒さ・雨による減速係数(NPC・敵)
let starving=false;
const drops=[];                                     // 雨/雪の粒（描画用、再利用）
let erodeT=0;
let AC = null;
function ensureAudio(){
  if (!AC){ try { AC = new (window.AudioContext||window.webkitAudioContext)(); } catch(e){} }
  if (AC && AC.state === "suspended") AC.resume();
}
function beep(f0, f1, dur, type, vol, delay){
  if (!AC) return;
  const t0 = AC.currentTime + (delay||0);
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type||"sine";
  o.frequency.setValueAtTime(f0, t0);
  o.frequency.exponentialRampToValueAtTime(Math.max(1,f1), t0+dur);
  g.gain.setValueAtTime(vol||0.07, t0);
  g.gain.exponentialRampToValueAtTime(0.0001, t0+dur);
  o.connect(g); g.connect(AC.destination);
  o.start(t0); o.stop(t0+dur+0.03);
}
function sfx(n){
  if (n==="dig")    beep(140, 55, 0.07, "square", 0.05);
  if (n==="drop")   beep(220, 70, 0.09, "sine", 0.08);

// ---- BFS ----
const bfsParent = new Int32Array(COLS*ROWS);
const bfsVisited = new Uint8Array(COLS*ROWS);
const NB = [[0,1],[0,-1],[-1,0],[1,0]];
function walkable(cx, cy){
  return inBounds(cx,cy) && cellAt(cx,cy)===AIR &&
         cy >= surfaceH[cx]-4 && Math.abs(cx-colonyCx) <= 42;
}
function rebuildPath(endIdx){
  const path=[]; let c=endIdx;
  while (c>=0){ path.push({cx:c%COLS, cy:(c/COLS)|0}); c=bfsParent[c]; }
  return path.reverse();
}
// 開始セルが砂などで塞がれていたら近くの空気セルへスナップ（埋もれ対策）
function nearestAir(scx, scy){
  if (cellAt(scx,scy)===AIR) return [scx,scy];
  for (let r=1;r<=3;r++)
    for (let dy=-r;dy<=r;dy++) for (let dx=-r;dx<=r;dx++)
      if (cellAt(scx+dx,scy+dy)===AIR) return [scx+dx,scy+dy];
  return null;
}
function bfsPath(scx, scy, targetFn){
  const s=nearestAir(scx,scy); if (!s) return null; scx=s[0]; scy=s[1];
  bfsVisited.fill(0);
  const start = gi(scx,scy);
  const q=[start]; bfsVisited[start]=1; bfsParent[start]=-1;
  let qi=0;
  while (qi<q.length && q.length<7000){
    const cur=q[qi++], cx=cur%COLS, cy=(cur/COLS)|0;
    if (targetFn(cx,cy)) return rebuildPath(cur);
    for (const [dx,dy] of NB){
      const nx=cx+dx, ny=cy+dy, ni=gi(nx,ny);
      if (walkable(nx,ny) && !bfsVisited[ni]){ bfsVisited[ni]=1; bfsParent[ni]=cur; q.push(ni); }
    }
  }
  return null;
}
function findDigPath(scx, scy){
  if (!inBounds(scx,scy) || cellAt(scx,scy)!==AIR) return null;
  bfsVisited.fill(0);
  const start = gi(scx,scy);
  const q=[start]; bfsVisited[start]=1; bfsParent[start]=-1;
  let qi=0; const cands=[];
  while (qi<q.length && q.length<7000){
    const cur=q[qi++], cx=cur%COLS, cy=(cur/COLS)|0;
    if (Math.abs(cx-colonyCx) <= 34){
      for (const [dx,dy] of [[0,1],[-1,0],[1,0]]){
        const nx=cx+dx, ny=cy+dy;
        if (inBounds(nx,ny) && cellAt(nx,ny)===DIRT && ny>=surfaceH[nx]){
          cands.push({cur, depth:ny, dig:{cx:nx,cy:ny}}); break;
        }
      }
    }
    for (const [dx,dy] of NB){
      const nx=cx+dx, ny=cy+dy, ni=gi(nx,ny);
      if (walkable(nx,ny) && !bfsVisited[ni]){ bfsVisited[ni]=1; bfsParent[ni]=cur; q.push(ni); }
    }
  }
  if (!cands.length) return null;
  cands.sort((a,b)=>b.depth-a.depth);
  const pick = cands[(Math.random()*Math.min(6,cands.length))|0];
  return { path: rebuildPath(pick.cur), dig: pick.dig };
}
// 設計図に沿って掘る: 既存トンネルから最も近い「未掘削の予定セル」を探す
function findNestDigPath(scx, scy){
  const s=nearestAir(scx,scy); if (!s) return null; scx=s[0]; scy=s[1];
  bfsVisited.fill(0);
  const start = gi(scx,scy);
  const q=[start]; bfsVisited[start]=1; bfsParent[start]=-1;
  let qi=0;
  while (qi<q.length && q.length<9000){
    const cur=q[qi++], cx=cur%COLS, cy=(cur/COLS)|0;
    for (const [dx,dy] of NB){                    // 隣に「予定地かつまだ土/砂」があれば掘削対象
      const nx=cx+dx, ny=cy+dy;
      if (nestPlanSet.has(ny*COLS+nx)){
        const v=cellAt(nx,ny);
        if ((v===DIRT || v===SAND) && !wouldMergeRooms(nx,ny))   // 部屋同士の壁は残す
          return { path: rebuildPath(cur), dig:{cx:nx,cy:ny} };
      }
    }
    for (const [dx,dy] of NB){
      const nx=cx+dx, ny=cy+dy, ni=gi(nx,ny);
      if (walkable(nx,ny) && !bfsVisited[ni]){ bfsVisited[ni]=1; bfsParent[ni]=cur; q.push(ni); }
    }
  }
  return null;
}

// 経路追従: "arrived"|"moving"|"blocked"|"none"
function followPath(w, dt, sp){
  if (!w.path) return "none";
  const node = w.path[w.pi];
  if (!node){ w.path=null; return "arrived"; }
  if (cellAt(node.cx,node.cy)!==AIR){ w.path=null; return "blocked"; }
  const tx=node.cx*CELL+CELL/2, ty=node.cy*CELL+CELL/2;
  const dx=tx-w.x, dy=ty-w.y, dist=Math.hypot(dx,dy);
  if (dist<3){ w.pi++; return "moving"; }
  const spd=sp*envSlow*(w.speedMul||1);                // 個体の速度倍率（赤=2,白=3）
  w.x += dx/dist*spd*dt; w.y += dy/dist*spd*dt;
  if (Math.abs(dx)>1) w.facing = dx>0?1:-1;
  return "moving";
}

function dropSandNear(e){
  const cx=(e.x/CELL)|0, cy=(e.y/CELL)|0;
  const tries=[[cx+e.facing,cy],[cx-e.facing,cy],[cx+e.facing,cy-1],[cx,cy-1]];  // 自分の真上には置かない
  for (const [tx,ty] of tries){
    if (inBounds(tx,ty) && cellAt(tx,ty)===AIR && ty < surfaceH[tx]){ setCell(tx,ty,SAND); return true; }
  }
  return false;
}
// 土を薄く広く撒くための補助：列の砂の積み高さ
function sandPile(cx){ let h=0; for (let cy=surfaceH[cx]-1; cy>=surfaceH[cx]-8 && cellAt(cx,cy)===SAND; cy--) h++; return h; }
let dumpSide=1;
// 入口から離れ、まだ低い列を選んで土を撒く（山にせず奥まで広げる）
function pickDumpColumn(){
  dumpSide=-dumpSide;
  for (const s of [dumpSide,-dumpSide])
    for (let d=4; d<10; d++){ const cx=colonyCx+s*d; if (cx<2||cx>=COLS-2) break; if (sandPile(cx)<3) return cx; }
  // 近くが埋まったら更に外側へ薄く
  for (const s of [dumpSide,-dumpSide])
    for (let d=10; d<26; d++){ const cx=colonyCx+s*d; if (cx<2||cx>=COLS-2) break; if (sandPile(cx)<3) return cx; }
  return Math.max(2,Math.min(COLS-3, colonyCx+dumpSide*((Math.random()*16+5)|0)));
}
// 巣の再構築（埋め戻し）対象：掘った土でここを埋めて整える
const fillTargets=[]; const fillSet=new Set();
function markFill(cx,cy){
  if (!inBounds(cx,cy) || cy<surfaceH[cx]) return;
  const k=cy*COLS+cx; if (fillSet.has(k)) return;
  fillSet.add(k); fillTargets.push({cx,cy,k});
}
// 入口を広く掘った余分な幅を埋め戻して1マス幅の整った縦坑に再構築
function remodelEntrance(){
  const ex=colonyCx, top=surfaceH[ex];
  for (const dx of [-1,1]) for (let cy=top; cy<top+2; cy++) markFill(ex+dx, cy);
}
function nearestFill(w){
  let best=null, bd=1e9;
  for (const t of fillTargets){ if (grid[t.k]!==AIR) continue; const d=(t.cx*CELL-w.x)**2+(t.cy*CELL-w.y)**2; if (d<bd){ bd=d; best=t; } }
  return best;
}

// ---- NPC: 働きアリ（移動はゆっくり=WSPD）----
const WSPD = 60;                       // 旧120から半減
function updateDigger(w, dt){
  if (w.wait>0){ w.wait-=dt; return; }
  // 夜も働きアリは通常どおり作業する（退避しない）
  if (w.mode==="hide"){ w.mode="idle"; w.path=null; }
  // 体力が20%以下になったら、勝手に食料庫へ行って蓄えを食べて回復する
  if (!w.eating && w.hp <= w.maxHp*0.2 && builtRoom("food") && colonyFood>=1){
    if (w.haul) releaseHaul(w);
    w.eating=true; w.path=null;
  }
  if (w.eating){
    if (w.hp >= w.maxHp*0.9 || colonyFood < 0.2 || !builtRoom("food")){ w.eating=false; w.path=null; }
    else if (roomTypeAt(w.x,w.y)==="food"){                 // 食料庫に到着→食べて回復
      w.hp = Math.min(w.maxHp, w.hp + dt*40);
      colonyFood = Math.max(0, colonyFood - dt*0.4);
      if ((w.eatFx=(w.eatFx||0)-dt) <= 0){ w.eatFx=0.4; puff(w.x,w.y,3,"#fd8",30,-15); }
      return;
    } else {                                                // 食料庫へ向かう
      if (!w.path){ w.path=bfsPath((w.x/CELL)|0,(w.y/CELL)|0,(x,y)=>roomCellType.get(y*COLS+x)==="food"); w.pi=0; }
      if (w.path){ if (followPath(w,dt,WSPD)==="blocked") w.path=null; return; }
      w.wait=0.4; return;
    }
  }
  const full = w.load>=w.carryCap || (w.load>0 && w.noMore);
  if (full){ updateSandCarry(w, dt); return; }           // 満載 or もう掘れない→運搬
  if (w.load>0){ updateDig(w, dt); return; }             // 積載中(白アリ)→さらに掘る
  if (w.haul){ updateHaul(w, dt); return; }              // 物資の運搬を継続
  if (assignHaul(w)){ updateHaul(w, dt); return; }       // 卵/死骸/ゴミの運搬を優先
  if (w.forage && gatherT<=0 && !isNight){ updateForage(w, dt); return; }   // 探索（夜は地表に出ず巣の中限定）
  updateDig(w, dt);                                      // 採掘アリ：設計図を掘る
}
// 探索アリ：地表を歩き、餌道フェロモンの強い方へ向かう（餌を見つけたらassignHaulが拾う）
function updateForage(w, dt){
  if (followPath(w, dt, WSPD)==="moving") return;
  // フェロモンの強い地表セルを優先して次の目的地に
  let best=null, bv=-1;
  for (let s=0;s<10;s++){
    const cx=Math.max(2,Math.min(COLS-3, colonyCx + ((Math.random()*70-35)|0)));
    const cy=surfaceH[cx]-1;
    const v=pherAt(cx,cy)*2 + Math.random()*0.6 - Math.abs(cx-(w.x/CELL))*0.01;
    if (v>bv){ bv=v; best={cx,cy}; }
  }
  if (best){ w.path=bfsPath((w.x/CELL)|0,(w.y/CELL)|0,(x,y)=>x===best.cx&&y===best.cy); w.pi=0; }
  if (!w.path) w.wait=0.6+Math.random();
}
// 掘った砂を①埋め戻し(再構築)に再利用 ②なければ地上へ薄く広く撒く
function updateSandCarry(w, dt){
  // ① 埋め戻し優先（巣の余分を土で埋めて再構築）
  const t = nearestFill(w);
  if (t){
    const wcx=(w.x/CELL)|0, wcy=(w.y/CELL)|0;
    if (Math.abs(wcx-t.cx)<=1 && Math.abs(wcy-t.cy)<=1){      // 隣接→埋める（積載は全部おろす）
      setCell(t.cx,t.cy,DIRT); nestPlanSet.delete(t.k);
      const fi=fillTargets.indexOf(t); if (fi>=0) fillTargets.splice(fi,1);
      puff(t.cx*CELL+13,t.cy*CELL+13,4,"#8a6035",40,-10);
      w.load=0; w.carrying=false; w.spread=false; w.noMore=false; w.path=null; w.wait=0.2; return;
    }
    if (!w.path){ w.path=bfsPath(wcx,wcy,(x,y)=>Math.abs(x-t.cx)<=1&&Math.abs(y-t.cy)<=1); w.pi=0; }
    if (w.path){ if (followPath(w,dt,WSPD)==="blocked") w.path=null; return; }
  }
  // 夜は地表に出ない：埋め戻し先が無ければ砂を抱えたまま巣の中で待機
  if (isNight){ w.wait=0.6+Math.random()*0.6; return; }
  // ② 地上へ運んで薄く広く撒く（入口から離れ・低い列へ・左右交互に）
  if (followPath(w, dt, WSPD)==="moving") return;
  const cx=(w.x/CELL)|0, cy=(w.y/CELL)|0;
  if (cy >= surfaceH[cx]){                              // まだ地中 → 地上へ
    const p=bfsPath(cx, cy, (x,y)=> y < surfaceH[x]);
    if (p){ w.path=p; w.pi=0; return; }
  }
  if (!w.spread){
    w.spread=true;
    const tx=pickDumpColumn();
    const p=bfsPath(cx, cy, (x,y)=> x===tx && y<surfaceH[x]);
    if (p){ w.path=p; w.pi=0; return; }
  }
  const n=Math.max(1,w.load||1);
  for (let k=0;k<n;k++) dropSandNear(w);                  // 積載分の砂をまとめて捨てる
  droppedCount+=n; w.load=0; w.carrying=false; w.spread=false; w.noMore=false; w.wait=0.3+Math.random()*0.4;
}
// 設計図に沿って掘る
function updateDig(w, dt){
  if (w.path){
    const st=followPath(w, dt, WSPD);
    if (st==="moving") return;
    if (st==="arrived" && w.digCell){
      const {cx,cy}=w.digCell, v=cellAt(cx,cy);
      if (v===DIRT||v===SAND){ setCell(cx,cy,AIR); w.load=(w.load||0)+1; w.carrying=true; w.spread=false; puff(cx*CELL+13,cy*CELL+13,4,"#8a6035",60,-30); w.wait=0.1; }
      w.digCell=null; return;
    }
    w.path=null;
  }
  const cx=(w.x/CELL)|0, cy=(w.y/CELL)|0;
  const r=findNestDigPath(cx, cy);
  if (r){ w.path=r.path; w.pi=0; w.digCell=r.dig; w.noMore=false; }
  else if (w.load>0) w.noMore=true;                      // もう掘れない→運んで捨てる
  else w.wait=1+Math.random()*2;                         // 設計図を掘り終えた→待機（拡大は人口で発生）
}
// ---- 運搬タスク（卵→育児室 / 死骸→食料庫 / ゴミ→ゴミ捨て場）----
function targetType(kind){ return kind==="egg"?"nursery" : kind==="carcass"?"food" : "waste"; }
function itemArr(kind){ return kind==="egg"?eggsArr : kind==="carcass"?carcasses : garbage; }
function itemAlive(kind,it){ return itemArr(kind).includes(it); }
function assignHaul(w){
  if (builtRoom("nursery")) for (const e of eggsArr)   if (e.state==="queen" && !e.carrier){ e.carrier=w; w.haul={kind:"egg",     item:e, phase:"toItem", fail:0}; return true; }
  if (builtRoom("food"))    for (const c of carcasses) if (!c.carrier && !c.stored){          c.carrier=w; w.haul={kind:"carcass", item:c, phase:"toItem", fail:0}; return true; }
  if (builtRoom("waste"))   for (const g of garbage)   if (!g.inMidden && !g.carrier){        g.carrier=w; w.haul={kind:"garbage", item:g, phase:"toItem", fail:0}; return true; }
  return false;
}
function releaseHaul(w){
  if (w.haul && w.haul.item){ w.haul.item.carrier=null; if (w.haul.kind==="egg") w.haul.item.state="queen"; }
  w.haul=null; w.path=null;
}
function updateHaul(w, dt){
  const h=w.haul, it=h.item;
  if (!itemAlive(h.kind,it)){ w.haul=null; w.path=null; return; }
  if (h.phase==="toItem"){
    const wcx=(w.x/CELL)|0, wcy=(w.y/CELL)|0, icx=(it.x/CELL)|0, icy=(it.y/CELL)|0;
    if (Math.abs(wcx-icx)<=1 && Math.abs(wcy-icy)<=1){ h.phase="toRoom"; w.path=null; return; } // 隣接で拾う
    if (!w.path){
      w.path=bfsPath(wcx,wcy,(x,y)=>Math.abs(x-icx)<=1&&Math.abs(y-icy)<=1); w.pi=0;
      if (!w.path){ if (++h.fail>3){ releaseHaul(w); } else w.wait=0.5; return; }
    }
    if (followPath(w, dt, WSPD)==="blocked") w.path=null;
    return;
  }
  // 荷物を運搬中（自分の位置に追従）。餌を巣へ運ぶアリは餌道フェロモンを残す
  it.x=w.x; it.y=w.y-3;
  if (h.kind==="carcass") depositPher((w.x/CELL)|0,(w.y/CELL)|0, 0.7);
  const room=builtRoom(targetType(h.kind));
  if (!room){ releaseHaul(w); return; }
  if (roomTypeAt(w.x,w.y)===room.type){ depositItem(w,h); return; }
  if (!w.path){
    w.path=bfsPath((w.x/CELL)|0,(w.y/CELL)|0,(x,y)=>x===room.cx&&y===room.cy); w.pi=0;
    if (!w.path){ if (++h.fail>4){ releaseHaul(w); } else w.wait=0.5; return; }
  }
  if (followPath(w, dt, WSPD)==="blocked") w.path=null;
}
// 部屋内の、既存アイテムから離れた空きセルを返す（重ならないよう配置）
function freeRoomCell(room, occupied, minD){
  if (!room) return null;
  for (let tries=0; tries<room.cells.length+6; tries++){
    const c=room.cells[(Math.random()*room.cells.length)|0];
    if (grid[c.k]!==AIR) continue;
    const px=c.cx*CELL+13, py=c.cy*CELL+13;
    let ok=true;
    for (const it of occupied){ if ((it.x-px)**2+(it.y-py)**2 < minD*minD){ ok=false; break; } }
    if (ok) return {x:px,y:py};
  }
  return {x:room.cx*CELL+13, y:room.cy*CELL+13};
}
function depositItem(w, h){
  const it=h.item;
  if (h.kind==="egg"){
    const room=builtRoom("nursery");
    const p=freeRoomCell(room, eggsArr.filter(e=>e!==it && e.state==="nursery"), 18) || {x:w.x,y:w.y};
    it.carrier=null; it.state="nursery"; it.t=0; it.x=p.x; it.y=p.y;   // 部屋の奥に重ならず置く
  } else if (h.kind==="carcass"){
    const room=builtRoom("food"); colonyFood+=it.value||1;
    const stored=carcasses.filter(c=>c.stored);
    if (stored.length<8){ const p=freeRoomCell(room, stored, 18) || {x:w.x,y:w.y};
      it.carrier=null; it.stored=true; it.vy=0; it.x=p.x; it.y=p.y; }    // 食料庫に貯蔵（触れると回復）
    else { const i=carcasses.indexOf(it); if (i>=0) carcasses.splice(i,1); }
    puff(w.x,w.y,4,"#fd8",40,-20);
  } else { it.carrier=null; it.inMidden=true; it.t=0; }
  w.haul=null; w.path=null; w.wait=0.3;
}

// ---- NPC: 兵隊アリ ----
function updateSoldier(w, dt){
  w.atkCD=Math.max(0,w.atkCD-dt);
  w.retarget-=dt;
  let tgt=null, td=Infinity, tp=null;
  for (const e of invaders){
    if (e.flee) continue;
    const d=(e.x-w.x)**2+(e.y-w.y)**2;
    if (d<td){ td=d; tgt=e; tp=null; }
  }
  if (anteater && !anteater.flee){
    const t=anteaterTip();
    if (t){ const d=(t.x-w.x)**2+(t.y-w.y)**2; if (d<td){ td=d; tgt=null; tp=t; } }
  }
  if ((tgt||tp) && td < 560*560){
    const tx = tp?tp.x:tgt.x, ty = tp?tp.y:tgt.y;
    if (Math.sqrt(td) < 26){
      if (w.atkCD<=0){
        w.atkCD=0.5;
        const dmg=w.atkMul||1;                 // 赤=2,白=0.75
        if (tp) hitAnteater(dmg, tp.x, tp.y);
        else hitEnemy(tgt, dmg);
      }
      return;
    }
    if (!w.path || w.retarget<=0){
      w.retarget=0.9;
      const tcx=(tx/CELL)|0, tcy=(ty/CELL)|0;
      w.path = bfsPath((w.x/CELL)|0, (w.y/CELL)|0, (x,y)=> Math.abs(x-tcx)<=1 && Math.abs(y-tcy)<=1);
      w.pi=0;
    }
    followPath(w, dt, 115);
    return;
  }
  // 平時パトロール
  if (w.wait>0){ w.wait-=dt; return; }
  const st = followPath(w, dt, 70);
  if (st==="moving") return;
  const cx=(w.x/CELL)|0, cy=(w.y/CELL)|0;
  const rx=cx+((Math.random()*16)|0)-8, ry=cy+((Math.random()*10)|0)-5;
  w.path = bfsPath(cx, cy, (x,y)=> x===rx && y===ry); w.pi=0;
  if (!w.path) w.wait=0.8;
}

// プレイヤーが死骸を咥える / 置く・納品する（F）
function playerGrabDrop(){

    } else {

// silent=true は女王の自動産卵（失敗時もトースト出さない）
function layEgg(silent){

}
function updateEggs(dt){
  for (let i=eggsArr.length-1;i>=0;i--){
    const e=eggsArr[i];
    // 運搬者が消えていたら解放（卵が永久に止まるバグ防止）
    if (e.carrier){
      if (e.carrier!=="player" && !workers.includes(e.carrier)){ e.carrier=null; e.state="queen"; }
      else continue;
    }
    // 育児室にあると速く育つ。運び手がいなくても最低限その場で育つ（必ず孵化する）
    const rate = (e.state==="nursery" ? 1 : 0.45) * (starving ? 0.25 : (curSeason().cold>0.5 ? 0.5 : 1));
    e.t += dt * rate;
    e.stage2 = e.t<5 ? "egg" : e.t<10 ? "larva" : "pupa";
    if (e.t>=15 && workers.length+1<150){

      else toast(L("🐜 羽化！ 新しい働きアリ（[2]で兵隊に）","🐜 Emerged! A new worker ant ([2] for soldier)"), "#cfc", 1.2);
    }
  }
}

// ---- 砂物理 ----
let sandAcc=0, sandFlip=false;
function stepSand(){
  sandFlip=!sandFlip;
  const pcx=(ant.x/CELL)|0, pcy=(ant.y/CELL)|0;
  for (let cy=ROWS-2; cy>=0; cy--){
    for (let i=0;i<COLS;i++){
      const cx = sandFlip ? i : COLS-1-i;
      if (grid[gi(cx,cy)]!==SAND) continue;
      // 砂は地表より下（巣の空間）へは流れ込めない＝アリ塚は地上に積もり巣は埋まらない
      const free=(tx,ty)=> cellAt(tx,ty)===AIR && ty < surfaceH[tx] && !(tx===pcx&&ty===pcy);
      if (free(cx,cy+1)){ grid[gi(cx,cy)]=AIR; grid[gi(cx,cy+1)]=SAND; }
      else {
        const d = sandFlip?1:-1;
        if (free(cx+d,cy+1)&&free(cx+d,cy)){ grid[gi(cx,cy)]=AIR; grid[gi(cx+d,cy+1)]=SAND; }
        else if (free(cx-d,cy+1)&&free(cx-d,cy)){ grid[gi(cx,cy)]=AIR; grid[gi(cx-d,cy+1)]=SAND; }
      }
    }
  }
}

// ---- 地面歩行（虫・アブラムシ共通） ----
function groundY(cx){ let cy=0; while (cellAt(cx,cy)===AIR && cy<ROWS) cy++; return cy; }
const solidPt = (x,y)=> { const v=cellAt((x/CELL)|0,(y/CELL)|0); return v===DIRT||v===ROCK||v===SAND; };
function walkGround(e, dt){
  if (!solidPt(e.x, e.y+11)) { e.y += 90*dt; return; }
  const dir = Math.sign(e.vx)||1;
  const aheadX = e.x + dir*13;
  if (solidPt(aheadX, e.y)){
    if (!solidPt(aheadX, e.y-CELL) && !solidPt(e.x, e.y-CELL)) e.y -= 95*dt;
    else e.vx *= -1;
  }
  e.x += e.vx*envSlow*dt;
  if (e.x<CELL){e.x=CELL; e.vx=Math.abs(e.vx);}
  if (e.x>WORLD_W-CELL){e.x=WORLD_W-CELL; e.vx=-Math.abs(e.vx);}
}

// ---- 昼の虫（餌・無害寄り） ----
const bugs = [];
const foods = [];
let bugTimer = 4;
function spawnBug(){
  const cx = Math.max(2, Math.min(COLS-3, ((ant.x/CELL)|0) + ((Math.random()*60-30)|0)));
  const cy = groundY(cx);
  const pool = ["grub","caterpillar","locust"];   // 昼は弱い虫・餌のみ（強い虫は夜に部屋数で解放）
  const kind = pool[(Math.random()*pool.length)|0];
  const d = ENEMY[kind];
  bugs.push({ kind, shape:d.shape, col:d.col, r:d.r,
              x:cx*CELL+CELL/2, y:(cy-1)*CELL+10, hp:3, vx:(Math.random()<.5?-1:1)*32,
              cool:0, hit:0, facing:1, trail:[] });
}
function updateBugs(dt){
  bugTimer -= dt;
  if (!isNight && bugTimer<=0 && bugs.length<5){ spawnBug(); bugTimer = 5+Math.random()*6; }
  for (let i=bugs.length-1;i>=0;i--){
    const b=bugs[i];
    b.hit=Math.max(0,b.hit-dt);
    walkGround(b, dt);
    b.facing = b.vx>0?1:-1;
    const d2=(b.x-ant.x)**2+(b.y-ant.y)**2;
    if (d2 < (ant.r+13)**2 && stage().speed>0){
      // 触れたら（静止中でも）プレイヤーが攻撃する
      if (b.hit<=0){
        b.hp--; b.hit=0.35; b.vx=Math.sign(b.x-ant.x||1)*90;
        ant.attackFlash=0.15;
        dmgText(b.x,b.y-12,"-1","#ffd0d0"); sfx("bite"); shake=Math.max(shake,2);
        puff(b.x,b.y,5,"#cfe07a",90,-50);
        if (b.hp<=0){
          spawnCarcass(b.x, b.y, b.kind||"grub", 1);
          bugs.splice(i,1);
          killCount++; gainXp(4); shake=Math.max(shake,4);
          toast("🐛 撃退！ アリが食料庫へ運ぶ", "#bfb", 0.9);
          continue;
        }
      }
      // 虫も時々噛んでくる（反撃ダメージ）
      b.cool-=dt;
      if (b.cool<=0){ b.cool=0.9; damagePlayer(4); }
    }
  }
}
function updateFoods(dt){
  for (let i=foods.length-1;i>=0;i--){
    const f=foods[i]; f.t+=dt;
    if (!solidPt(f.x, f.y+8)) f.y += 60*dt;
    const d2=(f.x-ant.x)**2+(f.y-ant.y)**2;
    if (d2 < (ant.r+13)**2 && stage().speed>0){
      const st=stage();
      if (ant.hp < st.maxHp*0.75){
        ant.hp=Math.min(st.maxHp, ant.hp+40);
        toast("🍖 もぐもぐ…体力回復！", "#fe9", 0.8);
      } else {
        colonyFood++;
        toast("🍖 コロニー食料に貯蔵 (+1)", "#fd8", 0.8);
      }
      gainXp(2); sfx("eat");
      foods.splice(i,1);
    }
  }
  if (foods.length>25) foods.splice(0, foods.length-25);
}

// ---- 死骸（撃退した虫＝ひっくり返る）/ ゴミ ----
const carcasses = [];   // {x,y,kind,shape,col,r,value,carrier,vy,facing}
const garbage   = [];   // {x,y,carrier,inMidden,t,vy}
const coins     = [];   // ゴミが最終的にコインになる {x,y,t,vy}
let coinCount   = 0, coinsToday = 0;   // 1日の獲得上限30枚
function spawnCarcass(x,y,kind,value){
  const d=ENEMY[kind]||{shape:"bug",col:"#7a7a5a",r:11};
  carcasses.push({x,y,kind,shape:d.shape,col:d.col,r:d.r,value:value||1,carrier:null,vy:0,facing:1});
  if (carcasses.length>30) carcasses.shift();
}
function spawnGarbageAt(x,y,coinVal){ garbage.push({x,y,carrier:null,inMidden:false,t:0,vy:0,coinVal:coinVal||1}); if(garbage.length>40) garbage.shift(); }
function updateCarcasses(dt){
  for (let i=carcasses.length-1;i>=0;i--){
    const c=carcasses[i];
    if (c.carrier) continue;                       // 運搬中は worker が位置更新
    if (!c.stored && !solidPt(c.x,c.y+8)){ c.vy+=400*dt; c.y+=c.vy*dt; } else c.vy=0;
    // 食料庫に貯蔵された死骸：触れると体力回復。食べた後はゴミになりゴミ部屋へ運ばれる
    if (c.stored){
      if (stage().speed>0 && (c.x-ant.x)**2+(c.y-ant.y)**2<(ant.r+14)**2){   // プレイヤー
        ant.hp=Math.min(stage().maxHp, ant.hp+35); sfx("eat");
        puff(c.x,c.y,5,"#fd8",60,-30); spawnGarbageAt(c.x,c.y,coinValueFor(c.kind)); carcasses.splice(i,1);
        toast(L("🍖 食料庫の餌で回復！","🍖 Healed from the pantry!"), "#fe9", 0.8); continue;
      }
      for (const w of workers){    // 弱った働きアリも食べて回復（残りはゴミに→ゴミ部屋へ）
        if (w.hp<w.maxHp*0.6 && (c.x-w.x)**2+(c.y-w.y)**2<16*16){
          w.hp=Math.min(w.maxHp, w.hp+35); puff(c.x,c.y,4,"#fd8",40,-20);
          spawnGarbageAt(c.x,c.y,coinValueFor(c.kind)); carcasses.splice(i,1); break;
        }
      }
      continue;
    }
    // 地表の死骸：プレイヤーが空腹なら緊急で食べる
    if (stage().speed>0 && ant.hp<stage().maxHp*0.5 && (c.x-ant.x)**2+(c.y-ant.y)**2<(ant.r+12)**2){
      ant.hp=Math.min(stage().maxHp, ant.hp+30); sfx("eat");
      spawnGarbageAt(ant.x, ant.y, coinValueFor(c.kind)); carcasses.splice(i,1);
    }
  }
}
function updateGarbage(dt){
  for (let i=garbage.length-1;i>=0;i--){
    const g=garbage[i];
    if (g.carrier) continue;
    if (!g.inMidden && !solidPt(g.x,g.y+8)){ g.vy+=400*dt; g.y+=g.vy*dt; } else g.vy=0;
    if (g.inMidden){ g.t+=dt; if (g.t>=DAY_LEN){       // ゴミ捨て場で1日経つとコインになる（虫の強さ別の枚数）
      const val=g.coinVal||1;
      coins.push({x:g.x, y:g.y, t:0, vy:0, val});
      puff(g.x,g.y,12,"#ffe27a",110,-70); dmgText(g.x,g.y-12,"🪙×"+val,"#ffd"); sfx("quest"); garbage.splice(i,1);
    } }
  }
}
function collectCoin(c){
  const i=coins.indexOf(c); if(i<0) return;
  const v=c.val||1;
  // ゲーム内のコイン回収は無制限。IGNISへ反映されるのは会員ティアの1日上限まで（親側RPCで制御）

  puff(c.x,c.y,8,"#ffe27a",90,-50); dmgText(c.x,c.y-10,"+"+v+"🪙","#ffe27a");

const invaders = [];
// 外敵図鑑（バイオーム別に出現）。shape=描画形, col=色, r=大きさ
const ENEMY = {
  beetle:     {hp:5, spd:90, dmg:7, r:13, shape:"beetle", col:"#2a3550"}, // カブトムシ
  stag:       {hp:7, spd:80, dmg:9, r:13, shape:"stag",   col:"#3a2614"}, // クワガタ
  centipede:  {hp:9, spd:55, dmg:9, r:10, shape:"centi",  col:"#8a3a24"}, // ムカデ
  mantis:     {hp:7, spd:88, dmg:9, r:14, shape:"mantis", col:"#5fae46"}, // カマキリ
  locust:     {hp:4, spd:125,dmg:6, r:12, shape:"locust", col:"#9a9a40"}, // バッタ
  caterpillar:{hp:6, spd:42, dmg:5, r:11, shape:"cater",  col:"#9bc24a"}, // イモムシ
  roach:      {hp:4, spd:140,dmg:6, r:11, shape:"roach",  col:"#5a3818"}, // ゴキブリ
  spider:     {hp:5, spd:105,dmg:8, r:11, shape:"spider", col:"#2e2630"}, // クモ

// 死骸→ゴミ→コインになるときの価値（虫の強さ別）：弱い虫1 / カマキリ・ムカデ2 / カブト・クワガタ3 / アリクイ5
const COIN_VALUE = { locust:1, caterpillar:1, roach:1, spider:1, grub:1, mantis:2, centipede:2, beetle:3, stag:3, anteater:5 };
function coinValueFor(kind){ return COIN_VALUE[kind] || 1; }
// 完成部屋数で出現する外敵の種類が増える：~3弱い虫 / 6カマキリ / 9ムカデ / 12カブト・クワガタ / 15アリクイ
function enemyPool(){
  const r=roomsCompleted, pool=["locust","caterpillar","roach","spider"];
  if (r>=6) pool.push("mantis");
  if (r>=9) pool.push("centipede");
  if (r>=12){ pool.push("beetle"); pool.push("stag"); }
  return pool;
}
// 15部屋以降は新種ではなく強化：3部屋ごとにレベルが上がり、色が変わり体力が増す
function enemyPowerLevel(){ return Math.max(0, Math.floor((roomsCompleted-15)/3)); }
const POWER_TINTS = ["#ff6a6a","#ffb347","#b07cff","#4dd0e1","#ff4fa3","#7CFC00"];
function makeInvader(kind, x, y, vx){
  const d=ENEMY[kind], pop=workers.length+1, lvl=enemyPowerLevel();
  // 日数＋コロニー規模＋（15部屋以降の）強化レベルで強くなる
  const hp=Math.round((d.hp + dayNum*0.6 + pop*0.35) * (1+0.3*lvl));
  const dmg=Math.round(d.dmg + pop*0.12 + lvl);
  const col=lvl>0 ? POWER_TINTS[(lvl-1)%POWER_TINTS.length] : d.col;   // 強化個体は色が変わる
  return { kind, shape:d.shape, col, r:d.r, x, y, hp, maxHp:hp, spd:d.spd, dmg,
           atkT:Math.random()*0.5, hit:0, path:null, pi:0, ret:0, facing:1, trail:[], flee:false, fade:1, vx };
}
function spawnWave(){
  const n = Math.min(9, 1+dayNum);
  const pool = enemyPool();                 // 出現する敵の種類は「完成した部屋数」で決まる
  for (let i=0;i<n;i++){
    const side=Math.random()<0.5?-1:1;
    const cx=Math.max(2,Math.min(COLS-3, colonyCx+side*(14+((Math.random()*16)|0))));
    const cy=groundY(cx);
    const kind=pool[(Math.random()*pool.length)|0];
    invaders.push(makeInvader(kind, cx*CELL+13, (cy-1)*CELL+10, (side<0?1:-1)*40));
  }
  const lvl=enemyPowerLevel();
  banner(L(`🌙 第${dayNum}夜 — 外敵 ${n}匹！卵を守れ！${lvl>0?` (強化Lv${lvl})`:""}`,`🌙 Night ${dayNum} — ${n} invaders! Protect the eggs!${lvl>0?` (Lv${lvl})`:""}`), "#fbb");
  sfx("night"); shake=Math.max(shake,4);
  if (roomsCompleted>=15 && Math.random()<0.45) spawnAnteater();   // アリクイは部屋15以降に参戦
}
function hitEnemy(e, dmg){
  e.hp-=dmg; e.hit=0.3;
  dmgText(e.x, e.y-12, "-"+dmg, "#ffd0d0");
  sfx("bite"); shake=Math.max(shake,2.5);
  puff(e.x,e.y,4,"#d8e07a",80,-40);
  if (e.hp<=0) killInvader(e);
}
function killInvader(e){
  const i=invaders.indexOf(e); if (i<0) return;
  invaders.splice(i,1);
  const big = e.shape==="centi"||e.shape==="mantis"||e.shape==="stag";
  const drops = big?3 : e.r>=12?2 : 1;
  spawnCarcass(e.x, e.y, e.kind, drops);     // ひっくり返った死骸→アリが食料庫へ運ぶ
  killCount++; gainXp(big?8:4);
  shake=Math.max(shake,4);
  toast(L("💥 撃退！","💥 Repelled!"), "#bfb", 0.6);
}
function damagePlayer(d){
  if (stage().speed===0 && ant.stage===0) d*=1.5; // 卵は脆い
  ant.hp-=d; shake=Math.max(shake,5); sfx("hurt");
  dmgText(ant.x, ant.y-16, "-"+(d|0), "#ff8080");
}
function updateInvaders(dt){
  for (let i=invaders.length-1;i>=0;i--){
    const e=invaders[i];
    e.hit=Math.max(0,e.hit-dt); e.atkT=Math.max(0,e.atkT-dt);
    if (e.flee){
      e.fade-=dt/1.5;
      if (e.fade<=0){ invaders.splice(i,1); continue; }
      e.y-=20*dt; continue;
    }
    // ターゲット選択（卵優先→アリ）
    e.ret-=dt;
    if (e.ret<=0){
      e.ret=1.6;
      let best=null, bd=Infinity;
      for (const g of eggsArr){ const d=(g.x-e.x)**2+(g.y-e.y)**2; if (d<bd){bd=d; best=g;} }
      if (!best){
        const tgts=[ant, ...workers];
        for (const t of tgts){ const d=(t.x-e.x)**2+(t.y-e.y)**2; if (d<bd){bd=d; best=t;} }
      }
      if (best){
        const tcx=(best.x/CELL)|0, tcy=(best.y/CELL)|0;
        e.path = bfsPath((e.x/CELL)|0, (e.y/CELL)|0, (x,y)=> Math.abs(x-tcx)<=1 && Math.abs(y-tcy)<=1);
        e.pi=0;
      }
    }
    if (e.path) followPath(e, dt, e.spd);
    else { // 巣に入れない→地表をうろついて入口を探す
      e.vx = Math.abs(e.vx)<5 ? 40*Math.sign(colonyCx*CELL-e.x||1) : e.vx;
      walkGround(e, dt);
      e.facing = e.vx>0?1:-1;
    }
    // ムカデの体は頭が通った道（=トンネル内）を記録して追従させる
    if (e.shape==="centi"){
      const last=e.trail[0];
      if (!last || (e.x-last[0])**2+(e.y-last[1])**2 > 16){ e.trail.unshift([e.x,e.y]); if (e.trail.length>80) e.trail.pop(); }
    }
    // 卵を食べる
    for (let g=eggsArr.length-1;g>=0;g--){
      const eg=eggsArr[g];
      if ((eg.x-e.x)**2+(eg.y-e.y)**2 < 16*16){
        eggsArr.splice(g,1);
        e.hp=Math.min(e.maxHp, e.hp+2);
        toast("😱 卵が食べられた！", "#f88", 1.2);
        sfx("eggeat"); shake=Math.max(shake,6);
        break;
      }
    }
    // アリへの攻撃
    if (e.atkT<=0){
      if ((e.x-ant.x)**2+(e.y-ant.y)**2 < (ant.r+13)**2){ damagePlayer(e.dmg); e.atkT=0.8; }
      else {
        for (const w of workers){
          if ((e.x-w.x)**2+(e.y-w.y)**2 < 20*20){
            w.hp-=e.dmg; dmgText(w.x,w.y-12,"-"+e.dmg,"#f99"); e.atkT=0.8; break;
          }
        }
      }
    }
    // 触れたら（静止中でも）プレイヤーが攻撃する
    if (stage().speed>0 && e.hit<=0 && (e.x-ant.x)**2+(e.y-ant.y)**2 < (ant.r+13)**2){
      ant.attackFlash=0.15;
      hitEnemy(e, 1);
    }
  }
}

// ---- アリクイ（ボス） ----
let anteater = null;
function spawnAnteater(){
  const dir=Math.random()<0.5?-1:1;
  const cx=Math.max(4,Math.min(COLS-5, colonyCx+dir*9));
  const cy=groundY(cx);
  anteater={x:cx*CELL, y:cy*CELL-22, hp:18+dayNum, maxHp:18+dayNum, dir:-dir,
            tongue:[], tt:0.15, ttd:1, rec:0, atkT:0, hit:0, flee:false};
  banner("🐜⚠ アリクイ襲来！！ 舌を噛んで撃退しろ！", "#f77");
  sfx("roar"); shake=12;
}
function entranceCell(){
  for (let d=0; d<14; d++){
    for (const s of [1,-1]){
      const cx=colonyCx+d*s;
      if (cx<1||cx>=COLS-1) continue;
      if (cellAt(cx,surfaceH[cx])===AIR) return {cx, cy:surfaceH[cx]};
    }
  }
  return null;
}
function rebuildTongue(){
  const a=anteater;
  const pts=[[a.x+a.dir*34, a.y-2]];
  const e=entranceCell();
  if (!e){ a.tongue=pts; return; }
  pts.push([e.cx*CELL+13, (e.cy-1)*CELL+13]);
  let cur={cx:e.cx, cy:e.cy};
  pts.push([cur.cx*CELL+13, cur.cy*CELL+13]);
  const seen=new Set([cur.cx+","+cur.cy]);
  for (let i=0;i<22;i++){
    const opts=[[0,1],[1,0],[-1,0],[0,-1]]
      .map(([dx,dy])=>({cx:cur.cx+dx, cy:cur.cy+dy}))
      .filter(c=>inBounds(c.cx,c.cy)&&cellAt(c.cx,c.cy)===AIR&&c.cy>=surfaceH[c.cx]&&!seen.has(c.cx+","+c.cy));
    if (!opts.length) break;
    opts.sort((p,q)=> q.cy-p.cy || Math.random()-0.5);
    cur=opts[0]; seen.add(cur.cx+","+cur.cy);
    pts.push([cur.cx*CELL+13, cur.cy*CELL+13]);
  }
  a.tongue=pts;
}
function tonguePoint(t){
  const p=anteater.tongue;
  if (!p || p.length<2) return p&&p[0]?{x:p[0][0],y:p[0][1]}:null;
  const seg=t*(p.length-1);
  const i=Math.min(p.length-2, seg|0), f=seg-i;
  return {x:p[i][0]+(p[i+1][0]-p[i][0])*f, y:p[i][1]+(p[i+1][1]-p[i][1])*f};
}
function anteaterTip(){ return anteater ? tonguePoint(anteater.tt) : null; }
function hitAnteater(d, x, y){
  const a=anteater; if (!a) return;
  a.hp-=d; a.hit=0.3;
  dmgText(x, y-10, "-"+d, "#ffd0d0");
  sfx("bite"); shake=Math.max(shake,3.5);
  puff(x,y,5,"#ffb0c0",90,-40);
  if (a.hp<=0){
    for (let k=0;k<3;k++) foods.push({x:a.x+(k-1)*12, y:a.y+10, t:0});
    spawnCarcass(a.x, a.y, "anteater", 4);   // 死骸→食料庫→ゴミ→コイン（アリクイは5コイン）
    gainXp(15); killCount++;
    banner(L("🎉 アリクイを撃退した！！ 🍖×3 ＋ 死骸はコイン5枚に","🎉 Anteater repelled!! 🍖×3 + carcass = 5 coins"), "#ffd");
    shake=12; sfx("evolve");
    anteater=null;
  }
}
function updateAnteater(dt){
  const a=anteater; if (!a) return;
  a.hit=Math.max(0,a.hit-dt); a.atkT=Math.max(0,a.atkT-dt);
  // 接地（足元の地形が崩れたら落ちる）
  if (!solidPt(a.x, a.y+24) && !solidPt(a.x-20, a.y+24) && !solidPt(a.x+20, a.y+24)) a.y += 80*dt;
  if (a.flee){
    a.x += -a.dir*100*dt;
    if (a.x<CELL || a.x>WORLD_W-CELL) anteater=null;
    return;
  }
  a.rec-=dt;
  if (a.rec<=0){ rebuildTongue(); a.rec=1.5; }
  a.tt += a.ttd*dt*0.45;
  if (a.tt>1){ a.tt=1; a.ttd=-1; }
  if (a.tt<0.15){ a.tt=0.15; a.ttd=1; }
  const tip=tonguePoint(a.tt);
  if (!tip) return;
  // 吸引
  const pull=(o)=>{
    const dx=tip.x-o.x, dy=tip.y-o.y, d=Math.hypot(dx,dy);
    if (d<85 && d>2){ o.x+=dx/d*55*dt; o.y+=dy/d*55*dt; }
  };
  if (stage().speed>0) pull(ant);
  for (const w of workers) pull(w);
  for (const f of foods) pull(f);
  // 舌先ダメージ
  if (a.atkT<=0){
    if (stage().speed>0 && (tip.x-ant.x)**2+(tip.y-ant.y)**2 < 16*16){ damagePlayer(8); a.atkT=0.7; }
    else {
      for (const w of workers){
        if ((tip.x-w.x)**2+(tip.y-w.y)**2 < 14*14){ w.hp-=8; dmgText(w.x,w.y-10,"-8","#f99"); a.atkT=0.7; break; }
      }
    }
  }
  // プレイヤー攻撃（舌のどこでも噛める）
  if (stage().speed>0 && a.hit<=0 && Math.abs(ant.vx)+Math.abs(ant.vy)>10){
    for (let t=0; t<=1.0001; t+=0.08){
      const p=tonguePoint(t);
      if (p && (p.x-ant.x)**2+(p.y-ant.y)**2 < 15*15){ ant.attackFlash=0.15; hitAnteater(1, p.x, p.y); break; }
    }
  }
}

const aphids = [];
let aphidT = 18;
function updateAphids(dt){
  aphidT-=dt;
  if (aphidT<=0 && aphids.length<4){
    const cx=Math.max(3,Math.min(COLS-4, colonyCx+(Math.random()<0.5?-1:1)*(14+((Math.random()*12)|0))));
    const cy=groundY(cx);
    aphids.push({x:cx*CELL, y:(cy-1)*CELL+12, vx:10, state:"wild", t:0, prod:16});
    aphidT=28+Math.random()*15;
  }
  for (const a of aphids){
    a.t+=dt;
    // アリが積み上げた土に埋もれたら、その上に乗る（埋没防止）
    let safety=0; while (solidPt(a.x, a.y) && safety++<40) a.y -= 4;
    if (a.state==="wild"){
      if (Math.random()<0.01) a.vx*=-1;
      a.vx=Math.sign(a.vx||1)*10;
      walkGround(a, dt);
      if (stage().speed>0 && (a.x-ant.x)**2+(a.y-ant.y)**2 < 55*55){
        a.state="follow";
        toast("🐞 アブラムシがついてきた！地上づたいに巣の近くへ", "#cfc", 1.5);
      }
    } else if (a.state==="follow"){
      if (isAboveSurface()){
        const dx=ant.x-a.x, dy=ant.y-a.y, d=Math.hypot(dx,dy);
        if (d>30){ a.x+=dx/d*72*dt; a.y+=dy/d*72*dt; }
        const acx=Math.max(0,Math.min(COLS-1,(a.x/CELL)|0));
        if (Math.abs(acx-colonyCx)<=7 && ((a.y/CELL)|0)<surfaceH[acx] && d<60){
          a.state="ranched"; a.prod=14;
          toast("🐞 アブラムシを飼育開始！甘露(🍖)を出してくれる", "#cfa", 1.6);
          sfx("quest");
        }
      }
      if (!solidPt(a.x, a.y+8)) a.y+=40*dt;
    } else { // ranched
      if (!solidPt(a.x, a.y+8)) a.y+=40*dt;
      a.prod-=dt;
      if (a.prod<=0 && foods.length<25){
        a.prod=16;
        foods.push({x:a.x+(Math.random()*20-10), y:a.y-4, t:0});
        puff(a.x, a.y, 3, "#ffe9a0", 40, -30);
      }
    }
  }
}

function gainAphidReward(){      // クエスト報酬：飼育済みアブラムシ1匹（甘露で食料）

function updateParts(dt){

(function(){
  const joy=document.getElementById("joy"), knob=document.getElementById("joyKnob");
  if(!joy||!knob) return;
  let active=false, cx0=0, cy0=0; const R=46, TH=14;
  function setKeys(dx,dy){ keys["a"]=dx<-TH; keys["d"]=dx>TH; keys["w"]=dy<-TH; keys["s"]=dy>TH; }
  function clr(){ keys["a"]=keys["d"]=keys["w"]=keys["s"]=false; knob.style.transform="translate(0px,0px)"; }
  function start(e){ e.preventDefault(); bgmInit(); active=true; const r=joy.getBoundingClientRect(); cx0=r.left+r.width/2; cy0=r.top+r.height/2; try{joy.setPointerCapture(e.pointerId);}catch(_){} move(e); }
  function move(e){ if(!active) return; e.preventDefault(); let dx=e.clientX-cx0, dy=e.clientY-cy0; const d=Math.hypot(dx,dy)||1; if(d>R){ dx=dx/d*R; dy=dy/d*R; } knob.style.transform=`translate(${dx}px,${dy}px)`; setKeys(dx,dy); }
  function end(){ active=false; clr(); }
  joy.addEventListener("pointerdown",start);
  joy.addEventListener("pointermove",move);
  joy.addEventListener("pointerup",end);
  joy.addEventListener("pointercancel",end);
  joy.addEventListener("pointerleave",end);
})();

// ---- Player actions ----
function isAboveSurface(){
  const cx = Math.max(0, Math.min(COLS-1,(ant.x/CELL)|0));
  return ((ant.y/CELL)|0) < surfaceH[cx];
}
function cellClearOfAnt(cx,cy){
  const rx=Math.max(cx*CELL, Math.min(ant.x, cx*CELL+CELL));
  const ry=Math.max(cy*CELL, Math.min(ant.y, cy*CELL+CELL));
  return (ant.x-rx)**2+(ant.y-ry)**2 > (ant.r+2)**2;
}
function doDigOrDrop(){
  const st=stage();
  if (st.speed===0) return;
  if (ant.carrying){
    // 地上＝アリ塚づくり / 地中＝その場に埋め戻し（巣の再構築）。どこでも置ける
    const cx=(ant.x/CELL)|0, cy=(ant.y/CELL)|0, f=ant.facing;
    const tries=[[cx+f,cy],[cx-f,cy],[cx,cy+1],[cx+f,cy+1],[cx,cy-1]];
    for (const [tx,ty] of tries){
      if (inBounds(tx,ty)&&cellAt(tx,ty)===AIR&&cellClearOfAnt(tx,ty)){
        setCell(tx,ty,SAND);
        ant.carrying=false; droppedCount++;
        gainXp(1); sfx("drop");
        puff(tx*CELL+13, ty*CELL+13, 4, "#cfa55e", 60, -20);
        if (ty>=surfaceH[tx]) toast("🧱 土を埋め戻した（巣を再構築）", "#dca", 0.7);  // 地中
        else if (droppedCount===10) toast("⛰ アリ塚ができはじめた！", "#fea", 1.6);
        else if (droppedCount===30) toast("⛰ 立派なアリ塚になってきた！", "#fea", 1.6);
        else if (droppedCount===60) toast("⛰ 巨大アリ塚！すごい！", "#fea", 1.6);
        return;
      }
    }
    toast("ここには置けない", "#caa", 0.6);
    return;
  }
  if (ant.digCD>0) return;
  const tx=ant.x+ant.dir.x*ant.r*1.5, ty=ant.y+ant.dir.y*ant.r*1.5;
  const cx=(tx/CELL)|0, cy=(ty/CELL)|0;
  const v=cellAt(cx,cy);
  if (v===DIRT||v===SAND){
    setCell(cx,cy,AIR);
    ant.carrying=true; ant.digCD=0.18;
    sfx("dig");
    puff(cx*CELL+13, cy*CELL+13, 6, v===SAND?"#cfa55e":"#8a6035", 90, -40);
  } else if (v===ROCK){
    toast("⛰ 硬くて掘れない", "#caa", 0.5);
  }
}

// ---- Movement / collision ----
const solidCell=(cx,cy)=>{ const v=cellAt(cx,cy); return v===DIRT||v===ROCK||v===SAND; };
function circleHitsSolid(px,py,r){
  const minX=((px-r)/CELL)|0, maxX=((px+r)/CELL)|0;
  const minY=((py-r)/CELL)|0, maxY=((py+r)/CELL)|0;
  for (let cy=minY;cy<=maxY;cy++) for (let cx=minX;cx<=maxX;cx++)
    if (solidCell(cx,cy)){
      const rx=Math.max(cx*CELL,Math.min(px,cx*CELL+CELL));
      const ry=Math.max(cy*CELL,Math.min(py,cy*CELL+CELL));
      if ((px-rx)**2+(py-ry)**2 < r*r) return true;
    }
  return false;
}
function moveAnt(dt){
  const st=stage();
  let ax=0, ay=0;
  if (keys["a"]||keys["arrowleft"]) ax--;
  if (keys["d"]||keys["arrowright"]) ax++;
  if (keys["w"]||keys["arrowup"]) ay--;
  if (keys["s"]||keys["arrowdown"]) ay++;
  if (ax||ay){
    const L=Math.hypot(ax,ay);
    ant.dir={x:ax/L,y:ay/L};
    if (ax) ant.facing=ax>0?1:-1;
    ant.phase += dt*10;
  }
  ant.vx = ax*st.speed;
  const cxi=Math.max(0,Math.min(COLS-1,(ant.x/CELL)|0));
  const underground = ant.y > surfaceH[cxi]*CELL + 4;   // 地表より下＝巣の空間
  if (underground){
    ant.vy = ay*st.speed;                       // 巣の中（地中の空洞）は自由に移動できる
  } else {
    const grounded = solidPt(ant.x, ant.y+ant.r+3);
    const nearWall = solidPt(ant.x-ant.r-3, ant.y) || solidPt(ant.x+ant.r+3, ant.y);
    if (grounded || nearWall){
      ant.vy = ay*st.speed;                     // 地面・壁ぎわは自由
    } else {
      ant.vy += 1300*dt;                        // 空中：重力で落下（飛べない）
      if (ant.vy>460) ant.vy=460;
      if (ay<0){                                // 上昇入力は地表から2マスまで
        let fr=(ant.y/CELL)|0; while (fr<ROWS && cellAt(cxi,fr)===AIR) fr++;
        if (ant.y > fr*CELL - 2*CELL) ant.vy = ay*st.speed;
      }
    }
  }
  const stuck = circleHitsSolid(ant.x,ant.y,ant.r);
  const nx=ant.x+ant.vx*dt;
  if (stuck || !circleHitsSolid(nx,ant.y,ant.r)) ant.x=nx;
  const ny=ant.y+ant.vy*dt;
  if (stuck || !circleHitsSolid(ant.x,ny,ant.r)) ant.y=ny;
  else if (ant.vy>0) ant.vy=0;                  // 着地で落下リセット
  ant.x=Math.max(ant.r,Math.min(WORLD_W-ant.r,ant.x));
  ant.y=Math.max(ant.r,Math.min(WORLD_H-ant.r,ant.y));
}

// ---- Main loop ----
let last=performance.now();
function loop(now){
  const dt=Math.min(0.033,(now-last)/1000); last=now;
  update(dt);
  render();
  requestAnimationFrame(loop);
}

function update(dt){
  if (gameOver) return;
  const st=stage();
  ant.r=st.r;
  ant.digCD=Math.max(0,ant.digCD-dt);
  ant.layCD=Math.max(0,ant.layCD-dt);
  ant.attackFlash=Math.max(0,ant.attackFlash-dt);
  shake=Math.max(0, shake-dt*14);
  saveFlash=Math.max(0, saveFlash-dt);
  gatherT=Math.max(0, gatherT-dt);

  dayT=(dayT+dt/DAY_LEN)%1;
  daylight=Math.max(0,Math.min(1, 0.5+Math.sin(dayT*TAU)*1.2));
  const nowNight = dayT>=NIGHT_ON && dayT<NIGHT_OFF;
  if (nowNight && !isNight){ isNight=true; nightStart(); }
  if (!nowNight && isNight){ isNight=false; dawnFn(); }

  // --- 季節・天候 ---
  weatherT-=dt;
  if (weatherT<=0){
    const s=curSeason(), r=Math.random();
    weather = seasonIdx()===3 ? (r<0.6?"snow":"clear") : (r<s.rain?"rain":"clear");
    weatherT=15+Math.random()*22; drops.length=0;
    if (weather==="rain") banner("🌧 雨が降ってきた","#9cf",1.6);
    else if (weather==="snow") banner("❄ 雪が降ってきた","#cef",1.6);
  }
  envSlow = (1 - curSeason().cold*0.45) * (weather==="rain"?0.85:1);   // 冬・雨でNPCと敵が鈍る
  if (weather==="rain"){ erodeT-=dt; if (erodeT<=0){ erodeT=0.25;     // 雨はアリ塚を少しずつ浸食
    const cx=Math.max(2,Math.min(COLS-3, colonyCx+((Math.random()*60-30)|0)));
    for (let cy=surfaceH[cx]-1; cy>=surfaceH[cx]-8; cy--){ if (grid[gi(cx,cy)]===SAND){ grid[gi(cx,cy)]=AIR; break; } }
  }}
  // --- フェロモン減衰 ---
  pherDecayT-=dt; if (pherDecayT<=0){ pherDecayT=0.5; for (let i=0;i<pher.length;i++){ if(pher[i]>0.02) pher[i]*=0.9; else pher[i]=0; } }
  // --- 食料消費（コロニー維持）と飢餓 ---（消費は控えめ＝餌をたまに運べば維持できる）
  const pop=workers.length+1;
  colonyFood = Math.max(0, colonyFood - dt*(0.01 + pop*0.0025));
  starving = colonyFood < 0.02;
  if (starving){ for (const w of workers) w.hp -= dt*0.4/1.5; ant.hp -= dt*0.7/1.5; }  // 飢餓は緩やかに衰弱（体力の減りを1.5倍ゆっくり）
  // --- 女王は女王の間にいる間、自動で産卵（食料に余裕がある時だけ＝産み過ぎで餓死させない）---
  if (stage().key==="queen" && roomTypeAt(ant.x,ant.y)==="queen" && colonyFood>=4){
    ant.autoLayT=(ant.autoLayT||0)-dt; if (ant.autoLayT<=0){ ant.autoLayT=7; layEgg(true); }
  }

  if (st.speed===0){
    ant.hatchT+=dt;
    if (ant.hatchT>=st.hatch){
      ant.hatchT=0; ant.stage++;
      const ns=stage();
      ant.hp=ns.maxHp;
      if (ns.speed>0){ toast(L("🐜 孵化！ 働きアリ誕生","🐜 Hatched! A worker ant is born"), "#cfc"); sfx("hatch"); }
      else toast(L(ns.name+" になった…",L(ns.name,ns.nameEn)+" now…"), "#eed", 1);
    }
  } else {
    moveAnt(dt);
    ant.hp -= (st.key==="queen"?0.7:1.0)*dt/1.5;   // 体力の減りを1.5倍ゆっくり
  }
  // 咥えた死骸は追従＋食料庫で自動納品
  if (ant.cargo){
    ant.cargo.x=ant.x + ant.facing*(ant.r+4); ant.cargo.y=ant.y-2;
    if (roomTypeAt(ant.x,ant.y)==="food"){
      colonyFood += ant.cargo.value||1; ant.cargo=null;
      toast("🍖 食料庫に納品！", "#fd8", 1); puff(ant.x,ant.y,5,"#fd8",60,-30); sfx("eat");
    }
  }

  sandAcc+=dt; while (sandAcc>0.055){ stepSand(); sandAcc-=0.055; }
  // 入口の喉を常に開けておく（アリが掻き出す保険）＋完成後は入口を再構築で整える
  for (let dx=-1;dx<=1;dx++){ const ecx=colonyCx+dx; for (let ey=surfaceH[ecx]-4; ey<surfaceH[ecx]; ey++) if (grid[gi(ecx,ey)]===SAND) grid[gi(ecx,ey)]=AIR; }
  if (baseBuilt()) remodelEntrance();

  for (let i=workers.length-1;i>=0;i--){
    const w=workers[i];
    if (w.hp<=0){
      if (w.haul) releaseHaul(w);          // 運んでいた卵/餌を解放（放置バグ防止）
      workers.splice(i,1);
      puff(w.x,w.y,8,"#caa",90,-50);
      toast(L("😢 仲間がやられた…","😢 A comrade has fallen…"), "#f99", 1);
      continue;
    }
    w.phase+=dt*9;
    if (w.job==="soldier") updateSoldier(w,dt);
    else updateDigger(w,dt);
  }
  maxColony=Math.max(maxColony, workers.length+1);

  updateRooms();
  matureNest();
  maybeExpand();
  updateEggs(dt);
  updateBugs(dt);
  updateInvaders(dt);
  updateAnteater(dt);
  updateAphids(dt);
  updateCarcasses(dt);
  updateGarbage(dt);
  updateCoins(dt);
  updateFoods(dt);
  updateParts(dt);
  updateDmgs(dt);
  updateQuests();

  if (ant.hp<=0){
    if (workers.length>0 || eggsArr.length>0){
      toast(L("💀 力尽きた…コロニーは健在。たまごから再開","💀 You fell… the colony lives on. Restarting from an egg"), "#fbb", 2);
      sfx("hurt");
      spawnEgg();
    } else {
      gameOver=true; clearSave();
      document.getElementById("overStats").textContent = L(
        `生存 ${dayNum}日 ／ 巣の広さ ${nestCells}マス ／ 最大コロニー ${maxColony}匹 ／ 撃退 ${killCount}匹`,
        `Survived ${dayNum} days ／ Nest ${nestCells} cells ／ Max colony ${maxColony} ／ Repelled ${killCount}`);
      document.getElementById("over").style.display="flex";
      return;
    }
  }

  cam.x=Math.max(0,Math.min(WORLD_W-canvas.width, ant.x-canvas.width/2));
  cam.y=Math.max(0,Math.min(WORLD_H-canvas.height, ant.y-canvas.height/2));

  if (toastT>0){ toastT-=dt; if (toastT<=0) toastEl.style.opacity=0; }
  mmTimer-=dt; if (mmTimer<=0){ updateMinimap(); mmTimer=0.7; }
  for (const c of clouds){ c.x+=c.spd*dt; if (c.x>2400) c.x=-300; }

  // HUD
  document.getElementById("stage").textContent =

  } }
  const pb = L(BIOMES[biomeIdx(Math.max(0,Math.min(COLS-1,(ant.x/CELL)|0)))].name, BIOMES[biomeIdx(Math.max(0,Math.min(COLS-1,(ant.x/CELL)|0)))].nameEn);
  const wIcon = weather==="rain"?"🌧":weather==="snow"?"❄":(isNight?"🌙":"☀");
  document.getElementById("stats").textContent =
    `${L(curSeason().n,curSeason().nEn)} ${L('','Day ')}${dayNum}${L('日目','')} ${wIcon} ｜ ${pb} ｜ ${L('体力','HP')} ${Math.ceil(Math.max(0,ant.hp))}/${st.maxHp} ｜ ${ant.carrying?L("🟫 運搬中","🟫 Carrying"):L("手ぶら","Empty")}`;
  const dig=workers.filter(w=>w.job==="dig").length, sol=workers.length-dig;
