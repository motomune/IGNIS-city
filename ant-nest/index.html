// ---- Render ----
const mix=(a,b,t)=>a+(b-a)*t;
const DIRT_CACHE=new Array(60*16);
function dirtCol(depth,n){
  const d=Math.min(59,depth), i=d*16+n;
  if (!DIRT_CACHE[i]){
    const k=Math.max(0.55,1-d*0.008);
    DIRT_CACHE[i]=`rgb(${((110+n)*k)|0},${((76+n*0.8)*k)|0},${((46+n*0.5)*k)|0})`;
  }
  return DIRT_CACHE[i];
}
const SAND_COLS=Array.from({length:14},(_,n)=>`rgb(${198+n},${158+n},${92+n})`);
const DARK_COLS=Array.from({length:16},(_,d)=>`rgba(4,2,0,${Math.min(0.88,0.22+d*0.065).toFixed(3)})`);
function skyCol(t){
  const d=daylight;
  const top=[mix(10,126,d), mix(16,195,d), mix(42,234,d)];
  const bot=[mix(24,217,d), mix(34,239,d), mix(52,218,d)];
  return t===0?`rgb(${top[0]|0},${top[1]|0},${top[2]|0})`:`rgb(${bot[0]|0},${bot[1]|0},${bot[2]|0})`;
}

// ---- 生物の描画（外敵・昼の虫 共通）----
function drawCenti(e){
  // 頭が通った道(=トンネル内)を一定間隔でサンプルし、その上に体節を並べる→道に沿って屈曲・縦移動
  const f=e.facing||1, SP=9, pts=[[e.x,e.y]];
  let acc=0;
  for (let i=1;i<e.trail.length && pts.length<10;i++){
    const a=e.trail[i-1], b=e.trail[i];
    acc += Math.hypot(b[0]-a[0], b[1]-a[1]);
    if (acc>=SP){ acc=0; pts.push(b); }
  }
  while (pts.length<7){ const last=pts[pts.length-1]; pts.push([last[0]-f*SP, last[1]]); } // 出現直後の補完
  for (let i=pts.length-1;i>=0;i--){
    const sx=pts[i][0]-cam.x, sy=pts[i][1]-cam.y, r=i===0?10:Math.max(4.5,9-i*0.5);
    const p=pts[Math.max(0,i-1)], dx=p[0]-pts[i][0], dy=p[1]-pts[i][1];
    const len=Math.hypot(dx,dy)||1, nx=-dy/len, ny=dx/len;            // 進行方向に直交する脚
    const lw=2+Math.abs(Math.sin(performance.now()/120 + i));
    ctx.strokeStyle=e.hit>0?"#fff":"#4a1a0e"; ctx.lineWidth=1.7;
    ctx.beginPath(); ctx.moveTo(sx,sy); ctx.lineTo(sx+nx*(r+4*lw/2), sy+ny*(r+5)); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(sx,sy); ctx.lineTo(sx-nx*(r+5), sy-ny*(r+5)); ctx.stroke();
    ctx.fillStyle=e.hit>0?"#fff":(i===0?"#7a2a18":e.col);
    ctx.beginPath(); ctx.arc(sx,sy,r,0,TAU); ctx.fill();
    ctx.fillStyle="rgba(255,255,255,.14)"; ctx.beginPath(); ctx.ellipse(sx-r*0.2,sy-r*0.35,r*0.45,r*0.2,0,0,TAU); ctx.fill();
  }
  const hx=e.x-cam.x, hy=e.y-cam.y;                                   // 頭：目・触角
  ctx.fillStyle="#ffd84a"; ctx.beginPath(); ctx.arc(hx+f*4,hy-3,2,0,TAU); ctx.fill();
  ctx.strokeStyle="#4a1a0e"; ctx.lineWidth=1.4;
  ctx.beginPath(); ctx.moveTo(hx+f*7,hy-4); ctx.lineTo(hx+f*15,hy-11); ctx.stroke();
}
function drawCreature(e, flip){
  if (e.shape==="centi" && !flip){ drawCenti(e); return; }
  const x=e.x-cam.x, y=e.y-cam.y, f=e.facing||1, r=e.r||11;
  const col=e.hit>0?"#fff":(flip?"#6f6a5a":e.col);    // 死骸は色あせて脚が上向き
  ctx.save(); ctx.translate(x,y);
  if (!flip){ ctx.fillStyle="rgba(0,0,0,.16)"; ctx.beginPath(); ctx.ellipse(0,r*0.95,r*1.3,r*0.4,0,0,TAU); ctx.fill(); } // 影
  ctx.scale(f, flip?-1:1);
  ctx.strokeStyle=col; ctx.lineWidth=1.5;
  if (e.shape==="beetle"){
    for(let k=-1;k<=1;k++){ctx.beginPath();ctx.moveTo(k*5,r*0.5);ctx.lineTo(k*6,r*0.95);ctx.stroke();}
    ctx.fillStyle=col; ctx.beginPath(); ctx.ellipse(0,0,r,r*0.7,0,0,TAU); ctx.fill();
    ctx.strokeStyle="rgba(255,255,255,.18)"; ctx.beginPath(); ctx.moveTo(0,-r*0.6); ctx.lineTo(0,r*0.6); ctx.stroke();
    ctx.fillStyle="#10151f"; ctx.beginPath(); ctx.arc(r*0.7,-1,r*0.32,0,TAU); ctx.fill();
    ctx.strokeStyle=col; ctx.lineWidth=2.5; ctx.beginPath(); ctx.moveTo(r*0.95,-2); ctx.quadraticCurveTo(r*1.6,-r,r*1.7,-r*0.2); ctx.stroke();
  } else if (e.shape==="stag"){
    for(let k=-1;k<=1;k++){ctx.beginPath();ctx.moveTo(k*5,r*0.5);ctx.lineTo(k*6,r*0.95);ctx.stroke();}
    ctx.fillStyle=col; ctx.beginPath(); ctx.ellipse(0,0,r,r*0.7,0,0,TAU); ctx.fill();
    ctx.fillStyle="#1a1006"; ctx.beginPath(); ctx.arc(r*0.7,0,r*0.4,0,TAU); ctx.fill();
    ctx.strokeStyle="#1a1006"; ctx.lineWidth=2.5; ctx.lineCap="round";
    ctx.beginPath(); ctx.moveTo(r*1.0,-3); ctx.quadraticCurveTo(r*1.9,-9,r*1.5,-2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(r*1.0,3); ctx.quadraticCurveTo(r*1.9,9,r*1.5,2); ctx.stroke();
    ctx.lineCap="butt";
  } else if (e.shape==="mantis"){
    for(let k=-1;k<=1;k++){ctx.beginPath();ctx.moveTo(k*5,r*0.3);ctx.lineTo(k*6,r*0.9);ctx.stroke();}
    ctx.fillStyle=col; ctx.beginPath(); ctx.ellipse(-r*0.3,0,r*0.95,r*0.42,0,0,TAU); ctx.fill();
    ctx.beginPath(); ctx.moveTo(r*0.55,-r*0.35); ctx.lineTo(r*1.15,-r*0.6); ctx.lineTo(r*1.05,r*0.05); ctx.closePath(); ctx.fill();
    ctx.fillStyle="#15300c"; ctx.beginPath(); ctx.arc(r*1.0,-r*0.45,1.8,0,TAU); ctx.fill();
    ctx.strokeStyle=col; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.moveTo(r*0.5,r*0.1); ctx.lineTo(r*1.0,r*0.55); ctx.lineTo(r*1.5,r*0.15); ctx.stroke();
  } else if (e.shape==="locust"){
    ctx.fillStyle=col; ctx.beginPath(); ctx.ellipse(0,0,r,r*0.5,0,0,TAU); ctx.fill();
    ctx.fillStyle="#5e5e22"; ctx.beginPath(); ctx.arc(r*0.8,-1,r*0.34,0,TAU); ctx.fill();
    ctx.strokeStyle=col; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.moveTo(-r*0.2,r*0.2); ctx.lineTo(-r*0.6,-r*0.55); ctx.lineTo(-r*1.0,r*0.7); ctx.stroke();
    ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(r*1.05,-3); ctx.lineTo(r*1.6,-r*0.9); ctx.stroke();
  } else if (e.shape==="cater"){
    ctx.fillStyle=col;
    for(let k=-2;k<=2;k++){ ctx.beginPath(); ctx.arc(k*r*0.42,0,r*0.45,0,TAU); ctx.fill(); }
    ctx.strokeStyle=col; ctx.lineWidth=1.5;
    for(let k=-2;k<=2;k++){ ctx.beginPath(); ctx.moveTo(k*r*0.42,r*0.4); ctx.lineTo(k*r*0.42,r*0.75); ctx.stroke(); }
    ctx.fillStyle="#3a5618"; ctx.beginPath(); ctx.arc(r*0.9,-2,r*0.45,0,TAU); ctx.fill();
    ctx.fillStyle="#fff"; ctx.beginPath(); ctx.arc(r*1.05,-3,1.4,0,TAU); ctx.fill();
  } else if (e.shape==="roach"){
    for(let k=-1;k<=1;k++){ctx.beginPath();ctx.moveTo(k*5,r*0.5);ctx.lineTo(k*7,r*0.9);ctx.stroke();}
    ctx.fillStyle=col; ctx.beginPath(); ctx.ellipse(0,0,r,r*0.62,0,0,TAU); ctx.fill();
    ctx.fillStyle="rgba(255,255,255,.12)"; ctx.beginPath(); ctx.ellipse(-r*0.2,-r*0.2,r*0.5,r*0.24,0,0,TAU); ctx.fill();
    ctx.fillStyle="#2a1808"; ctx.beginPath(); ctx.arc(r*0.7,0,r*0.3,0,TAU); ctx.fill();
    ctx.strokeStyle="#2a1808"; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(r*0.9,-2); ctx.quadraticCurveTo(r*1.8,-r,r*2.1,-r*1.3); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(r*0.9,2); ctx.quadraticCurveTo(r*1.8,r*0.2,r*2.1,r*0.6); ctx.stroke();
  } else if (e.shape==="spider"){
    ctx.strokeStyle=col; ctx.lineWidth=1.6;
    for(let k=0;k<4;k++){ const ang=0.45+k*0.36;
      ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(Math.cos(ang)*r*1.6,Math.sin(ang)*r*1.2-r*0.3); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-Math.cos(ang)*r*1.6,Math.sin(ang)*r*1.2-r*0.3); ctx.stroke();
    }
    ctx.fillStyle=col; ctx.beginPath(); ctx.arc(-r*0.35,0,r*0.72,0,TAU); ctx.fill();
    ctx.beginPath(); ctx.arc(r*0.5,0,r*0.42,0,TAU); ctx.fill();
    ctx.fillStyle="#f55"; ctx.beginPath(); ctx.arc(r*0.6,-2,1.3,0,TAU); ctx.fill();
  } else { // 既定の虫
    for(let k=-1;k<=1;k++){ctx.beginPath();ctx.moveTo(k*5,r*0.5);ctx.lineTo(k*6,r*0.9);ctx.stroke();}
    ctx.fillStyle=col; ctx.beginPath(); ctx.ellipse(0,0,r,r*0.7,0,0,TAU); ctx.fill();
    ctx.fillStyle="#324a18"; ctx.beginPath(); ctx.arc(r*0.7,-2,r*0.4,0,TAU); ctx.fill();
    ctx.fillStyle="#ff6"; ctx.beginPath(); ctx.arc(r*0.8,-3,1.5,0,TAU); ctx.fill();
  }
  if (!flip){ ctx.fillStyle="rgba(255,255,255,0.13)"; ctx.beginPath(); ctx.ellipse(-r*0.1,-r*0.4,r*0.55,r*0.22,0,0,TAU); ctx.fill(); } // 艶
  ctx.restore();
}

// ---- バイオーム背景（森 / 畑 / 都市）視差スクロール ----
function bgRnd(s){ const x=Math.sin(s*127.1)*43758.5; return x-Math.floor(x); }
function drawBgElement(b, sx, hy, seed){
  const dl=daylight, t=(v)=>(v*(0.35+0.65*dl))|0;
  if (b===2){ // 都市：ビル
    const h=80+bgRnd(seed)*150, w=58+bgRnd(seed+9)*44, base=44+bgRnd(seed+2)*26;
    ctx.fillStyle=`rgb(${t(base+12)},${t(base+18)},${t(base+30)})`;
    ctx.fillRect(sx, hy-h, w, h);
    for (let yy=hy-h+10; yy<hy-10; yy+=16)
      for (let xx=sx+6; xx<sx+w-8; xx+=13){
        const lit=bgRnd(seed+xx*0.7+yy)> (dl>0.4?0.72:0.3);
        ctx.fillStyle= lit ? `rgba(255,228,150,${0.35+0.55*(1-dl)})` : "rgba(15,20,30,.45)";
        ctx.fillRect(xx,yy,7,9);
      }
  } else if (b===0){ // 森：木
    const h=70+bgRnd(seed)*70;
    ctx.fillStyle=`rgb(${t(70)},${t(48)},${t(28)})`;
    ctx.fillRect(sx+30, hy-h*0.42, 9, h*0.42);
    const g=120+bgRnd(seed+3)*60;
    ctx.fillStyle=`rgb(${t(28)},${t(g)},${t(44)})`;
    ctx.beginPath(); ctx.arc(sx+34, hy-h*0.58, h*0.44, 0, TAU); ctx.fill();
    ctx.beginPath(); ctx.arc(sx+18, hy-h*0.42, h*0.3, 0, TAU); ctx.fill();
    ctx.beginPath(); ctx.arc(sx+50, hy-h*0.42, h*0.3, 0, TAU); ctx.fill();
  } else { // 畑：納屋／作物の列
    if (bgRnd(seed)>0.72){
      const h=58+bgRnd(seed+1)*30;
      ctx.fillStyle=`rgb(${t(140)},${t(60)},${t(48)})`;
      ctx.fillRect(sx+34, hy-h, 40, h);
      ctx.fillStyle=`rgb(${t(110)},${t(46)},${t(36)})`;
      ctx.beginPath(); ctx.moveTo(sx+30,hy-h); ctx.lineTo(sx+54,hy-h-18); ctx.lineTo(sx+78,hy-h); ctx.closePath(); ctx.fill();
    } else {
      ctx.strokeStyle=`rgb(${t(120)},${t(150)},${t(60)})`; ctx.lineWidth=3;
      for (let xx=sx+8; xx<sx+140; xx+=18){
        ctx.beginPath(); ctx.moveTo(xx,hy); ctx.lineTo(xx,hy-18-((seed+xx)%10)); ctx.stroke();
        ctx.fillStyle=`rgb(${t(180)},${t(170)},${t(70)})`;
        ctx.beginPath(); ctx.arc(xx, hy-20-((seed+xx)%10), 3,0,TAU); ctx.fill();
      }
    }
  }
}
function drawBackground(){
  const W=canvas.width;
  const hy=(SURFACE+1)*CELL - cam.y;          // 画面上の地平線
  if (hy < -120) return;                       // 地中深くでは描かない
  const par=0.55, spacing=160, left=cam.x*par;
  const startX=Math.floor(left/spacing)*spacing;
  for (let wx=startX; wx < left + W + spacing; wx+=spacing){
    const sx=wx-left, trueWX=cam.x+sx;
    const b=biomeIdx(Math.max(0,Math.min(COLS-1,(trueWX/CELL)|0)));
    drawBgElement(b, sx, hy, (wx/spacing)|0);
  }
}

function drawWeather(){
  const W=canvas.width, H=canvas.height;
  if (weather==="rain"){
    ctx.fillStyle="rgba(60,72,92,0.13)"; ctx.fillRect(0,0,W,H);   // 雨の薄暗さ
    while(drops.length<150) drops.push({x:Math.random()*W,y:Math.random()*H,v:420+Math.random()*220});
    ctx.strokeStyle="rgba(165,198,235,0.5)"; ctx.lineWidth=1.4; ctx.beginPath();
    for (const d of drops){ d.y+=d.v*0.016; d.x+=58*0.016; if(d.y>H){d.y=-12;d.x=Math.random()*W;} if(d.x>W)d.x-=W;
      ctx.moveTo(d.x,d.y); ctx.lineTo(d.x-6,d.y-14); }
    ctx.stroke();
  } else if (weather==="snow"){
    ctx.fillStyle="rgba(210,225,245,0.10)"; ctx.fillRect(0,0,W,H);
    while(drops.length<90) drops.push({x:Math.random()*W,y:Math.random()*H,v:28+Math.random()*30,ph:Math.random()*6});
    ctx.fillStyle="rgba(255,255,255,0.88)";
    for (const d of drops){ d.ph+=0.02; d.y+=d.v*0.016; d.x+=Math.sin(d.ph)*0.6; if(d.y>H){d.y=-6;d.x=Math.random()*W;}
      ctx.beginPath(); ctx.arc(d.x,d.y,2,0,TAU); ctx.fill(); }
  }
}

function render(){
  const W=canvas.width, H=canvas.height;
  if (W<2 || H<2) return;                  // ビューポートが潰れている時は描画しない
  const night=1-daylight;
  // 画面シェイク
  const _cx=cam.x, _cy=cam.y;
  cam.x+= (Math.random()-0.5)*shake*2;
  cam.y+= (Math.random()-0.5)*shake*2;

  // --- 空 ---
  const sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,skyCol(0)); sky.addColorStop(1,skyCol(1));
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);
  if (night>0.1){
    ctx.fillStyle=`rgba(255,255,240,${0.9*night})`;
    for (const s of stars) ctx.fillRect(s.x*W, s.y*H, s.s, s.s);
  }
  if (dayT<0.5){
    const p=dayT*2;
    const sx=W*(0.05+0.9*p), sy=H*0.42-Math.sin(p*Math.PI)*H*0.33;
    const g=ctx.createRadialGradient(sx,sy,4,sx,sy,46);
    g.addColorStop(0,"rgba(255,236,150,1)"); g.addColorStop(1,"rgba(255,236,150,0)");
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(sx,sy,46,0,TAU); ctx.fill();
    ctx.fillStyle="#ffe27a"; ctx.beginPath(); ctx.arc(sx,sy,17,0,TAU); ctx.fill();
  } else {
    const p=(dayT-0.5)*2;
    const sx=W*(0.05+0.9*p), sy=H*0.42-Math.sin(p*Math.PI)*H*0.33;
    ctx.fillStyle="#e8eef2"; ctx.beginPath(); ctx.arc(sx,sy,14,0,TAU); ctx.fill();
    ctx.fillStyle="rgba(160,170,185,.6)"; ctx.beginPath(); ctx.arc(sx-4,sy-3,4,0,TAU); ctx.fill();
  }
  ctx.fillStyle=`rgba(255,255,255,${0.5*daylight+0.06})`;
  for (const c of clouds){
    const x=((c.x - cam.x*0.3)%2700+2700)%2700-300;
    ctx.beginPath();
    ctx.ellipse(x,c.y,c.w,c.w*0.32,0,0,TAU);
    ctx.ellipse(x+c.w*0.5,c.y+6,c.w*0.6,c.w*0.22,0,0,TAU);
    ctx.fill();
  }

  // --- バイオーム背景 ---
  drawBackground();

  // --- 地形 ---
  const c0x=Math.max(0,(cam.x/CELL)|0), c1x=Math.min(COLS,(((cam.x+W)/CELL)|0)+1);
  const c0y=Math.max(0,(cam.y/CELL)|0), c1y=Math.min(ROWS,(((cam.y+H)/CELL)|0)+1);
  for (let cy=c0y;cy<c1y;cy++){
    for (let cx=c0x;cx<c1x;cx++){
      const v=grid[gi(cx,cy)];
      const x=cx*CELL-cam.x, y=cy*CELL-cam.y;
      if (v===DIRT){
        const depth=Math.max(0,cy-SURFACE);
        const n=((cx*73856093 ^ cy*19349663)>>>0)%16;
        ctx.fillStyle=dirtCol(depth,n);
        ctx.fillRect(x,y,CELL+1,CELL+1);
        ctx.fillStyle="rgba(0,0,0,.10)"; ctx.fillRect(x+((cx*5)%18), y+((cy*7)%18), 3,3); // 粒
        // ベベル（立体感）。空気に接した面は陽が当たって明るい
        ctx.fillStyle = cellAt(cx,cy-1)===AIR ? "rgba(255,242,205,.14)" : "rgba(255,240,210,.05)";
        ctx.fillRect(x,y,CELL+1,3);
        ctx.fillStyle="rgba(0,0,0,.12)"; ctx.fillRect(x,y+CELL-3,CELL+1,3);
      } else if (v===ROCK){
        ctx.fillStyle="#5b5550"; ctx.fillRect(x,y,CELL+1,CELL+1);
        ctx.fillStyle="rgba(255,255,255,.10)"; ctx.fillRect(x,y,CELL+1,3);
        ctx.fillStyle="rgba(0,0,0,.18)"; ctx.fillRect(x,y+CELL-3,CELL+1,3);
        ctx.fillStyle="rgba(255,255,255,.05)"; ctx.fillRect(x+4,y+4,CELL-8,CELL-8);
      } else if (v===SAND){
        const n=((cx*9781 ^ cy*6151)>>>0)%14;
        ctx.fillStyle=SAND_COLS[n];
        ctx.fillRect(x,y,CELL+1,CELL+1);
        ctx.fillStyle="rgba(255,245,210,.12)"; ctx.fillRect(x,y,CELL+1,3);            // 陽の当たる上面
        ctx.fillStyle="rgba(120,85,40,.22)"; ctx.fillRect(x+((cx*3)%16)+3, y+((cy*5)%16)+3, 3,3);
      } else if (cy>=surfaceH[cx]){
        // トンネル（巣の空洞）を陰影で立体的に：天井の影・床の光・壁のAO
        ctx.fillStyle="#26150b"; ctx.fillRect(x,y,CELL+1,CELL+1);
        if (solidCell(cx,cy-1)){ ctx.fillStyle="rgba(0,0,0,.34)"; ctx.fillRect(x,y,CELL+1,6); }
        if (solidCell(cx,cy+1)){ ctx.fillStyle="rgba(255,232,185,.06)"; ctx.fillRect(x,y+CELL-3,CELL+1,3); }
        if (solidCell(cx-1,cy)){ ctx.fillStyle="rgba(0,0,0,.20)"; ctx.fillRect(x,y,5,CELL+1); }
        if (solidCell(cx+1,cy)){ ctx.fillStyle="rgba(0,0,0,.20)"; ctx.fillRect(x+CELL-4,y,5,CELL+1); }
      }
    }
  }
  // 草
  ctx.strokeStyle=`rgba(70,${(130+60*daylight)|0},60,.9)`; ctx.lineWidth=2;
  for (let cx=c0x;cx<c1x;cx++){
    const gy=surfaceH[cx];
    if (cellAt(cx,gy)===DIRT && cellAt(cx,gy-1)===AIR){
      const bx=cx*CELL-cam.x, by=gy*CELL-cam.y;
      for (let k=0;k<2+((cx*37)%3)%2;k++){
        ctx.beginPath();
        ctx.moveTo(bx+5+k*8, by);
        ctx.lineTo(bx+5+k*8+((cx+k)%3-1)*3, by-6-((cx*13+k*7)%6));
        ctx.stroke();
      }
    }
  }

  // --- 餌道フェロモン（青白い光の道）---
  for (let cy=c0y;cy<c1y;cy++) for (let cx=c0x;cx<c1x;cx++){
    const p=pher[cy*COLS+cx];
    if (p>0.15){
      ctx.fillStyle=`rgba(130,225,255,${Math.min(0.38,p*0.06)})`;
      ctx.beginPath(); ctx.arc(cx*CELL-cam.x+13, cy*CELL-cam.y+13, 2.5+Math.min(5,p), 0, TAU); ctx.fill();
    }
  }

  // --- 巣の設計図（まだ掘ってない予定地を薄く表示）---
  ctx.strokeStyle="rgba(255,228,170,0.13)"; ctx.lineWidth=1;
  for (const p of nestPlan){
    if (!nestPlanSet.has(p.k)) continue;
    if (p.cx<c0x||p.cx>=c1x||p.cy<c0y||p.cy>=c1y) continue;
    const v=grid[p.k];
    if (v===DIRT||v===SAND) ctx.strokeRect(p.cx*CELL-cam.x+3, p.cy*CELL-cam.y+3, CELL-6, CELL-6);
  }
  // --- 役割別の部屋を色分け ---
  for (const r of rooms){
    if (!r.built) continue;
    ctx.fillStyle=ROOM_META[r.type].tint;
    for (const c of r.cells){
      if (c.cx<c0x||c.cx>=c1x||c.cy<c0y||c.cy>=c1y) continue;
      if (grid[c.k]===AIR) ctx.fillRect(c.cx*CELL-cam.x, c.cy*CELL-cam.y, CELL+1, CELL+1);
    }
  }

  // --- 卵・幼虫・蛹（育つ）---
  for (const e of eggsArr){
    const x=e.x-cam.x, y=e.y-cam.y, s2=e.stage2||"egg";
    if (s2==="larva"){                          // 幼虫：クリーム色のC字
      ctx.fillStyle="#efe0bd";
      ctx.beginPath(); ctx.ellipse(x,y,8,5,0.6,0,TAU); ctx.fill();
      ctx.strokeStyle="rgba(120,100,60,.3)"; ctx.lineWidth=1;
      for (let k=-2;k<=2;k++){ ctx.beginPath(); ctx.moveTo(x+k*2-2,y-3); ctx.lineTo(x+k*2,y+3); ctx.stroke(); }
    } else if (s2==="pupa"){                     // 蛹：繭(まゆ)状のカプセル
      ctx.fillStyle="#d8c298";
      ctx.beginPath(); ctx.ellipse(x,y,5.5,8,0,0,TAU); ctx.fill();
      ctx.fillStyle="rgba(90,70,40,.35)";
      ctx.beginPath(); ctx.ellipse(x,y+3,4,3,0,0,TAU); ctx.fill(); // 中のアリの輪郭
    } else {                                     // 卵：白い楕円
      const pulse=e.t>13?1+Math.sin(e.t*9)*0.1:1;
      ctx.fillStyle="#f6ecd8";
      ctx.beginPath(); ctx.ellipse(x,y,5*pulse,7*pulse,0,0,TAU); ctx.fill();
      ctx.fillStyle="rgba(255,255,255,.6)";
      ctx.beginPath(); ctx.ellipse(x-1.5,y-2,1.5,2.5,0,0,TAU); ctx.fill();
    }
  }
  // --- 餌（アブラムシの甘露など）---
  ctx.font="14px serif"; ctx.textAlign="center";
  for (const f of foods) ctx.fillText("🍖", f.x-cam.x, f.y-cam.y+5);
  ctx.textAlign="left";
  // --- 死骸（ひっくり返った虫）---
  for (const c of carcasses) drawCreature(c, true);
  // --- ゴミ ---
  for (const g of garbage){
    const x=g.x-cam.x, y=g.y-cam.y;
    ctx.fillStyle=g.inMidden?"rgba(110,100,80,.8)":"#7a6b4a";
    ctx.beginPath(); ctx.arc(x,y,4,0,TAU); ctx.arc(x+3,y+1,3,0,TAU); ctx.fill();
  }
  // --- コイン（ゴミの成れの果て。光って点滅）---
  for (const c of coins){
    const x=c.x-cam.x, y=c.y-cam.y, pulse=0.7+0.3*Math.sin(c.t*6);
    ctx.fillStyle=`rgba(255,220,90,${pulse})`;
    ctx.beginPath(); ctx.arc(x,y,6,0,TAU); ctx.fill();
    ctx.strokeStyle="#caa040"; ctx.lineWidth=1.5; ctx.stroke();
    ctx.fillStyle="#8a6a10"; ctx.font="bold 8px sans-serif"; ctx.textAlign="center"; ctx.fillText("¢",x,y+3); ctx.textAlign="left";
  }
  // --- パーティクル ---
  for (const p of parts){
    ctx.globalAlpha=1-p.t/p.life;
    ctx.fillStyle=p.color;
    ctx.fillRect(p.x-cam.x-p.size/2, p.y-cam.y-p.size/2, p.size, p.size);
  }
  ctx.globalAlpha=1;

  // --- アブラムシ ---
  for (const a of aphids){
    const x=a.x-cam.x, y=a.y-cam.y;
    ctx.fillStyle = a.state==="ranched" ? "#8fd45f" : "#a8d878";
    ctx.beginPath(); ctx.ellipse(x,y,7,5,0,0,TAU); ctx.fill();
    ctx.fillStyle="#3d5a20";
    ctx.beginPath(); ctx.arc(x+5,y-1,2,0,TAU); ctx.fill();
    if (a.state==="ranched" && (a.t%4)<0.6){
      ctx.font="10px serif"; ctx.fillText("✨", x-4, y-8);
    }
  }

  // --- NPCアリ ---
  for (const w of workers){
    const sol=w.job==="soldier";
    const col = w.col || (sol?"#7a3b20":"#6b4a2c");   // 赤アリ/白アリは固有色
    drawAntShape(w.x-cam.x, w.y-cam.y, (sol?8:7)*(w.size||1), col, w.facing, w.carrying, w.phase, false, w.path!==null, sol);
    if (w.hp<w.maxHp){
      ctx.fillStyle="rgba(0,0,0,.5)"; ctx.fillRect(w.x-cam.x-9, w.y-cam.y-14, 18, 3);
      ctx.fillStyle="#5f5"; ctx.fillRect(w.x-cam.x-9, w.y-cam.y-14, 18*Math.max(0,w.hp/w.maxHp), 3);
    }
  }
  // --- 昼の生き物（バイオーム別）---
  for (const b of bugs) drawCreature(b);
  // --- 侵入者（バイオーム別）---
  for (const e of invaders){
    ctx.globalAlpha = e.flee ? Math.max(0,e.fade) : 1;
    drawCreature(e);
    const x=e.x-cam.x, y=e.y-cam.y;
    if (e.hp<e.maxHp && !e.flee){
      ctx.fillStyle="rgba(0,0,0,.5)"; ctx.fillRect(x-10,y-e.r-7,20,3);
      ctx.fillStyle="#f55"; ctx.fillRect(x-10,y-e.r-7,20*Math.max(0,e.hp/e.maxHp),3);
    }
    ctx.globalAlpha=1;
  }
  // --- アリクイ ---
  if (anteater) drawAnteater();

  // --- プレイヤー ---
  drawPlayer();
  if (ant.cargo) drawCreature(ant.cargo, true);   // 咥えた死骸

  // --- 暗闇 ---
  dctx.clearRect(0,0,W,H);
  dctx.globalCompositeOperation="source-over";
  if (night>0.02){ dctx.fillStyle=`rgba(6,8,26,${0.5*night})`; dctx.fillRect(0,0,W,H); }
  for (let cy=c0y;cy<c1y;cy++){
    for (let cx=c0x;cx<c1x;cx++){
      if (cy>=surfaceH[cx]){
        dctx.fillStyle=DARK_COLS[Math.min(15, cy-surfaceH[cx])];
        dctx.fillRect(cx*CELL-cam.x, cy*CELL-cam.y, CELL+1, CELL+1);
      }
    }
  }
  dctx.globalCompositeOperation="destination-out";
  const punch=(x,y,rad,s)=>{
    const g=dctx.createRadialGradient(x,y,2,x,y,rad);
    g.addColorStop(0,`rgba(255,255,255,${s})`); g.addColorStop(1,"rgba(255,255,255,0)");
    dctx.fillStyle=g; dctx.beginPath(); dctx.arc(x,y,rad,0,TAU); dctx.fill();
  };
  // 部屋の灯り（ラベルが闇に消えないよう光を抜く）
  for (const r of rooms) if (r.built) punch(r.cx*CELL-cam.x, r.cy*CELL-cam.y, 60, 0.5);
  punch(ant.x-cam.x, ant.y-cam.y, stage().key==="queen"?200:150, 1);
  for (const w of workers) punch(w.x-cam.x, w.y-cam.y, 70, 0.85);
  for (const e of eggsArr) punch(e.x-cam.x, e.y-cam.y, 40, 0.7);
  for (const e of invaders) punch(e.x-cam.x, e.y-cam.y, 45, 0.6);
  ctx.drawImage(darkC,0,0);

  // --- 部屋ラベル（暗闇の上に描く）---
  ctx.font="bold 11px sans-serif"; ctx.textAlign="center";
  for (const r of rooms){
    if (!r.built) continue;
    const lx=r.cx*CELL-cam.x, ly=r.cy*CELL-cam.y;
    if (lx<-40||lx>W+40||ly<-40||ly>H+40) continue;
    ctx.fillStyle="rgba(0,0,0,.5)"; ctx.fillText(ROOM_META[r.type].label, lx+1, ly-r.cells.length*0+18+1);
    ctx.fillStyle="rgba(255,255,255,.9)"; ctx.fillText(ROOM_META[r.type].label, lx, ly+18);
  }
  ctx.textAlign="left";

  // --- ダメージ数字 ---
  ctx.font="bold 13px sans-serif"; ctx.textAlign="center";
  for (const d of dmgs){
    ctx.globalAlpha=1-d.t/0.8;
    ctx.fillStyle=d.color;
    ctx.fillText(d.txt, d.x-cam.x, d.y-cam.y-30*d.t);
  }
  ctx.globalAlpha=1; ctx.textAlign="left";

  // --- ヒント・マーカー ---
  if (ant.carrying && isAboveSurface()){
    ctx.fillStyle="rgba(255,255,130,.95)"; ctx.font="bold 14px sans-serif"; ctx.textAlign="center";
    ctx.fillText("Space で砂を捨てる！", ant.x-cam.x, ant.y-cam.y-30);
    ctx.textAlign="left";
  }
  ctx.fillStyle="rgba(255,220,60,.9)";
  ctx.beginPath();
  ctx.moveTo(ant.x-cam.x, ant.y-cam.y-ant.r-14);
  ctx.lineTo(ant.x-cam.x-5, ant.y-cam.y-ant.r-21);
  ctx.lineTo(ant.x-cam.x+5, ant.y-cam.y-ant.r-21);
  ctx.fill();

  // --- 低体力ビネット ---
  const hpRatio=ant.hp/stage().maxHp;
  if (hpRatio<0.3 && stage().speed>0){
    const a=(0.3-hpRatio)/0.3*(0.45+0.2*Math.sin(performance.now()/150));
    const g=ctx.createRadialGradient(W/2,H/2,H*0.32,W/2,H/2,H*0.75);
    g.addColorStop(0,"rgba(120,0,0,0)"); g.addColorStop(1,`rgba(120,0,0,${Math.max(0,Math.min(0.6,a))})`);
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  }

  // --- 天候（雨・雪）---
  drawWeather();

  // --- ミニマップ ---
  const ms=mmShrunk?0.8:1.5;
  const mw=COLS*ms, mh=ROWS*ms, mx=W-mw-10, my=10;
  ctx.imageSmoothingEnabled=false;
  ctx.globalAlpha=0.92;
  ctx.drawImage(mm, mx, my, mw, mh);
  ctx.globalAlpha=1;
  ctx.strokeStyle="rgba(0,0,0,.6)"; ctx.lineWidth=2; ctx.strokeRect(mx,my,mw,mh);
  // 地図右上の縮小/拡大トグルボタン（タップで切替）
  const bs=22; mmBtn.w=bs; mmBtn.h=bs; mmBtn.x=mx+mw-bs; mmBtn.y=my;
  ctx.fillStyle="rgba(20,24,34,0.85)"; ctx.fillRect(mmBtn.x,mmBtn.y,bs,bs);
  ctx.strokeStyle="rgba(180,210,255,0.7)"; ctx.lineWidth=1.5; ctx.strokeRect(mmBtn.x,mmBtn.y,bs,bs);
  ctx.fillStyle="#cfe6ff"; ctx.font="bold 15px sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.fillText(mmShrunk?"＋":"－", mmBtn.x+bs/2, mmBtn.y+bs/2+1);
  ctx.textAlign="left"; ctx.textBaseline="alphabetic";
  const dot=(wx,wy,col,s)=>{ ctx.fillStyle=col; ctx.fillRect(mx+wx/WORLD_W*mw-s/2, my+wy/WORLD_H*mh-s/2, s, s); };
  for (const w of workers) dot(w.x,w.y, w.job==="soldier"?"#ff8030":"#ffb000", 3);
  for (const b of bugs) dot(b.x,b.y,"#7fff5f",3);
  for (const e of eggsArr) dot(e.x,e.y,"#fff",2);
  for (const e of invaders) if(!e.flee) dot(e.x,e.y,"#ff2020",4);
  if (anteater) dot(anteater.x,anteater.y,"#ff30c0",6);
  dot(ant.x,ant.y,"#ff3030",4);

  // セーブ表示
  if (saveFlash>0){
    ctx.globalAlpha=Math.min(1,saveFlash);
    ctx.fillStyle="rgba(0,0,0,.5)"; ctx.fillRect(W-130, H-34, 120, 24);
    ctx.fillStyle="#bfe8c0"; ctx.font="12px sans-serif"; ctx.textAlign="center";
    ctx.fillText("💾 自動セーブ済み", W-70, H-18); ctx.textAlign="left"; ctx.globalAlpha=1;
  }

  cam.x=_cx; cam.y=_cy;
}

// ---- 描画: アリ / アリクイ / プレイヤー ----
function drawAntShape(x,y,r,color,facing,carrying,phase,wings,moving,mandibles){
  ctx.save(); ctx.translate(x,y);
  // 柔らかい影
  ctx.fillStyle="rgba(0,0,0,0.16)";
  ctx.beginPath(); ctx.ellipse(0, r*1.15, r*1.5, r*0.45, 0,0,TAU); ctx.fill();
  ctx.scale(facing,1);
  ctx.strokeStyle=color; ctx.lineWidth=2;
  for (let k=-1;k<=1;k++){
    const sw=moving?Math.sin(phase+k*2.1)*4:0;
    ctx.beginPath(); ctx.moveTo(k*4, r*0.3); ctx.lineTo(k*5+sw, r*1.1); ctx.stroke();
  }
  if (wings){
    const fl=moving?Math.sin(phase*3)*0.18:0;
    ctx.fillStyle="rgba(220,235,255,.5)";
    ctx.save(); ctx.rotate(-0.5+fl);
    ctx.beginPath(); ctx.ellipse(-r*0.2,-r*0.6,r*1.4,r*0.55,0,0,TAU); ctx.fill();
    ctx.restore();
    ctx.save(); ctx.rotate(-0.75-fl);
    ctx.beginPath(); ctx.ellipse(-r*0.5,-r*0.4,r*1.1,r*0.45,0,0,TAU); ctx.fill();
    ctx.restore();
  }
  ctx.fillStyle=color;
  ctx.beginPath(); ctx.arc(-r*0.9,0,r*0.72,0,TAU); ctx.fill();   // 腹
  ctx.beginPath(); ctx.arc(0,0,r*0.55,0,TAU); ctx.fill();        // 胸
  ctx.beginPath(); ctx.arc(r*0.85,0,r*0.6,0,TAU); ctx.fill();    // 頭
  // 上面のハイライト（艶）
  ctx.fillStyle="rgba(255,255,255,0.16)";
  ctx.beginPath(); ctx.ellipse(-r*0.9,-r*0.28,r*0.5,r*0.22,0,0,TAU); ctx.fill();
  ctx.beginPath(); ctx.ellipse(r*0.85,-r*0.3,r*0.34,r*0.18,0,0,TAU); ctx.fill();
  const aw=Math.sin(phase*0.7)*2;
  ctx.beginPath(); ctx.moveTo(r*1.2,-3); ctx.lineTo(r*1.9,-r*0.7+aw); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(r*1.2,2); ctx.lineTo(r*1.95,-r*0.15+aw); ctx.stroke();
  if (mandibles){
    ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.moveTo(r*1.3,-2); ctx.quadraticCurveTo(r*1.9,-5, r*2.1,-1); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(r*1.3,3); ctx.quadraticCurveTo(r*1.9,6, r*2.1,2); ctx.stroke();
    ctx.lineWidth=2;
  }
  ctx.fillStyle="rgba(255,255,255,.85)";
  ctx.beginPath(); ctx.arc(r*1.05,-r*0.18,r*0.14,0,TAU); ctx.fill();
  if (carrying){
    ctx.fillStyle="#cfa55e"; ctx.fillRect(r*1.25,-5.5,11,11);
    ctx.strokeStyle="#7a5a2a"; ctx.lineWidth=1; ctx.strokeRect(r*1.25,-5.5,11,11);
  }
  ctx.restore();
}
function drawAnteater(){
  const a=anteater;
  const x=a.x-cam.x, y=a.y-cam.y;
  // 舌
  if (a.tongue.length>1){
    ctx.strokeStyle=a.hit>0?"#fff":"#ff7d9c"; ctx.lineWidth=5; ctx.lineCap="round";
    ctx.beginPath();
    ctx.moveTo(a.tongue[0][0]-cam.x, a.tongue[0][1]-cam.y);
    const segN=Math.max(1, Math.ceil(a.tt*(a.tongue.length-1)));
    for (let i=1;i<=segN && i<a.tongue.length;i++){
      // 先端パラメータまでの折れ線
      const t=Math.min(1, i/(a.tongue.length-1)/Math.max(a.tt,0.001));
      if (t>=1){
        const p=tonguePoint(a.tt);
        ctx.lineTo(p.x-cam.x, p.y-cam.y);
        break;
      }
      ctx.lineTo(a.tongue[i][0]-cam.x, a.tongue[i][1]-cam.y);
    }
    ctx.stroke();
    const tip=tonguePoint(a.tt);
    if (tip){
      ctx.fillStyle="#ff9db6";
      ctx.beginPath(); ctx.arc(tip.x-cam.x, tip.y-cam.y, 6, 0, TAU); ctx.fill();
    }
    ctx.lineCap="butt";
  }
  // 体
  ctx.save(); ctx.translate(x,y);
  if (a.hit>0){ ctx.shadowColor="#fff"; ctx.shadowBlur=14; }
  ctx.scale(a.dir,1);
  ctx.fillStyle="#6e5743";
  ctx.beginPath(); ctx.ellipse(-46,-6,26,17,0.4,0,TAU); ctx.fill();   // ふさふさ尻尾
  ctx.beginPath(); ctx.ellipse(0,-12,42,22,0,0,TAU); ctx.fill();      // 胴体
  ctx.fillStyle="#5a4736";
  ctx.beginPath(); ctx.ellipse(36,-10,22,9,0.45,0,TAU); ctx.fill();   // 鼻先
  ctx.fillStyle="#2e2218";
  ctx.beginPath(); ctx.arc(28,-18,2.6,0,TAU); ctx.fill();             // 目
  ctx.strokeStyle="#4a3a2c"; ctx.lineWidth=5;
  for (const lx of [-22,-8,10,24]){ ctx.beginPath(); ctx.moveTo(lx,6); ctx.lineTo(lx,18); ctx.stroke(); }
  ctx.restore();
  // HPバー
  ctx.fillStyle="rgba(0,0,0,.55)"; ctx.fillRect(x-34, y-44, 68, 6);
  ctx.fillStyle="#ff5fb0"; ctx.fillRect(x-34, y-44, 68*Math.max(0,a.hp/a.maxHp), 6);
}
function drawPlayer(){
  const st=stage();
  const x=ant.x-cam.x, y=ant.y-cam.y, r=st.r;
  if (ant.attackFlash>0){ ctx.save(); ctx.shadowColor="#fff"; ctx.shadowBlur=14; }
  if (st.key==="egg"){
    ctx.fillStyle=st.color;
    ctx.beginPath(); ctx.ellipse(x,y,r,r*1.3,0,0,TAU); ctx.fill();
    ctx.fillStyle="rgba(255,255,255,.5)";
    ctx.beginPath(); ctx.ellipse(x-2,y-3,2,3.5,0,0,TAU); ctx.fill();
  } else if (st.key==="larva"){
    ctx.fillStyle=st.color;
    const wob=Math.sin(performance.now()/180)*1.5;
    ctx.beginPath(); ctx.ellipse(x,y+wob*0.3,r*1.3,r*0.8,wob*0.05,0,TAU); ctx.fill();
    ctx.strokeStyle="rgba(0,0,0,.18)"; ctx.lineWidth=1.5;
    for (let i=-1;i<=1;i++){ ctx.beginPath(); ctx.moveTo(x+i*5,y-r*0.6); ctx.lineTo(x+i*5,y+r*0.6); ctx.stroke(); }
  } else if (st.key==="pupa"){
    ctx.fillStyle=st.color;
    ctx.beginPath(); ctx.ellipse(x,y,r,r*1.4,0,0,TAU); ctx.fill();
    ctx.strokeStyle="rgba(0,0,0,.25)"; ctx.lineWidth=1.5;
    for (let i=-1;i<=1;i++){ ctx.beginPath(); ctx.moveTo(x-r,y+i*5); ctx.lineTo(x+r,y+i*5); ctx.stroke(); }
  } else {
    const moving=Math.abs(ant.vx)+Math.abs(ant.vy)>10;
    drawAntShape(x,y,r,st.color,ant.facing,ant.carrying,ant.phase,
                 st.key==="winged"||st.key==="queen", moving, false);
    if (st.key==="queen"){
      ctx.font="14px serif"; ctx.textAlign="center";
      ctx.fillText("👑", x, y-r-4);
      ctx.textAlign="left";
    }
  }
  if (ant.attackFlash>0) ctx.restore();
}

// ---- セーブ / 再開（localStorage）----
const SAVE_KEY="antNest_save_v6";
function saveGame(){
  try{
    const s={
      grid:Array.from(grid), surfaceH:Array.from(surfaceH),
      planKeys:nestPlan.map(p=>p.k),
      rooms:rooms.map(r=>({type:r.type,cx:r.cx,cy:r.cy,built:r.built,cells:r.cells.map(c=>c.k)})),
      fillKeys:[...fillSet], expandTier,
      ant:{x:ant.x,y:ant.y,stage:ant.stage,hp:ant.hp,xp:ant.xp,carrying:ant.carrying,facing:ant.facing,hatchT:ant.hatchT,
           cargo: ant.cargo?{x:ant.cargo.x,y:ant.cargo.y,kind:ant.cargo.kind,value:ant.cargo.value}:null},
      workers:workers.map(w=>({x:w.x,y:w.y,job:w.job,hp:w.hp,maxHp:w.maxHp,facing:w.facing,size:w.size,variant:w.variant})),
      eggs:eggsArr.map(e=>({x:e.x,y:e.y,t:e.t,state:e.state,stage2:e.stage2})),
      carcasses:carcasses.filter(c=>!c.carrier).map(c=>({x:c.x,y:c.y,kind:c.kind,value:c.value,stored:!!c.stored})),
      garbage:garbage.filter(g=>!g.carrier).map(g=>({x:g.x,y:g.y,inMidden:g.inMidden,t:g.t,coinVal:g.coinVal||1})),
      aphids:aphids.map(a=>({x:a.x,y:a.y,state:a.state,prod:a.prod,vx:a.vx})),
      colonyFood,droppedCount,killCount,laidCount,maxColony,dayNum,survivedNights,dayT,isNight,questIdx,nextSurvN,
      weather,weatherT,
      coins:coins.map(c=>({x:c.x,y:c.y,val:c.val||1})), coinCount, coinsToday, matured, roomsCompleted
    };
    localStorage.setItem(SAVE_KEY, JSON.stringify(s)); saveFlash=1.4;
  }catch(err){ console.warn("save failed", err); }
}
function loadGame(){
  try{
    const raw=localStorage.getItem(SAVE_KEY); if(!raw) return false;
    const s=JSON.parse(raw); if(!s||!s.grid||s.grid.length!==grid.length) return false;
    grid.set(s.grid); surfaceH.set(s.surfaceH);
    nestPlan.length=0; nestPlanSet.clear();
    for(const k of s.planKeys){ nestPlanSet.add(k); nestPlan.push({cx:k%COLS,cy:(k/COLS)|0,k}); }
    rooms.length=0; roomCellType.clear(); planRoom.clear();
    for(const k of s.planKeys) planRoom.set(k,-1);                      // 通路は-1
    for(const r of s.rooms){ const cells=r.cells.map(k=>({cx:k%COLS,cy:(k/COLS)|0,k}));
      const id=rooms.length; rooms.push({type:r.type,cx:r.cx,cy:r.cy,built:r.built,cells});
      for(const c of cells) planRoom.set(c.k,id);                       // 部屋タグを復元
      if(r.built) for(const c of cells) roomCellType.set(c.k,r.type); }
    fillSet.clear(); fillTargets.length=0;
    for(const k of s.fillKeys){ fillSet.add(k); if(grid[k]===AIR) fillTargets.push({cx:k%COLS,cy:(k/COLS)|0,k}); }
    expandTier=s.expandTier||0;
    Object.assign(ant,{x:s.ant.x,y:s.ant.y,stage:s.ant.stage,hp:s.ant.hp,xp:s.ant.xp,carrying:s.ant.carrying,
      facing:s.ant.facing,hatchT:s.ant.hatchT||0,vx:0,vy:0,dir:{x:0,y:1},digCD:0,layCD:0,attackFlash:0,phase:0});
    ant.r=STAGES[ant.stage].r;
    ant.cargo = s.ant.cargo ? (()=>{ const d=ENEMY[s.ant.cargo.kind]||{shape:"bug",col:"#777",r:11};
      return {x:s.ant.cargo.x,y:s.ant.cargo.y,kind:s.ant.cargo.kind,value:s.ant.cargo.value,shape:d.shape,col:d.col,r:d.r,carrier:"player",facing:1}; })() : null;
    workers.length=0;
    for(const w of s.workers){ const v=VARIANTS[w.variant]||VARIANTS.normal;
      workers.push(Object.assign(makeWorker(w.x,w.y),{job:w.job,hp:w.hp,maxHp:w.maxHp,facing:w.facing,size:w.size||1,load:0,
        variant:w.variant||"normal", col:v.col, speedMul:v.speedMul, atkMul:v.atkMul, hpMul:v.hpMul, carryCap:v.carryCap})); }
    eggsArr.length=0;
    for(const e of s.eggs) eggsArr.push({x:e.x,y:e.y,t:e.t,state:e.state,stage2:e.stage2||"egg",carrier:null});
    carcasses.length=0;
    for(const c of s.carcasses){ const d=ENEMY[c.kind]||{shape:"bug",col:"#777",r:11};
      carcasses.push({x:c.x,y:c.y,kind:c.kind,value:c.value,shape:d.shape,col:d.col,r:d.r,carrier:null,vy:0,facing:1,stored:!!c.stored}); }
    garbage.length=0;
    for(const g of s.garbage) garbage.push({x:g.x,y:g.y,inMidden:g.inMidden,t:g.t,carrier:null,vy:0,coinVal:g.coinVal||1});
    aphids.length=0;
    for(const a of s.aphids) aphids.push({x:a.x,y:a.y,state:a.state,prod:a.prod,vx:a.vx,t:0});
    colonyFood=s.colonyFood; droppedCount=s.droppedCount; killCount=s.killCount; laidCount=s.laidCount;
    maxColony=s.maxColony; dayNum=s.dayNum; survivedNights=s.survivedNights; dayT=s.dayT;
    isNight=s.isNight; questIdx=s.questIdx; nextSurvN=s.nextSurvN;
    weather=s.weather||"clear"; weatherT=s.weatherT||14;
    coins.length=0; if(s.coins) for(const c of s.coins) coins.push({x:c.x,y:c.y,t:0,vy:0,val:c.val||1});
    coinCount=s.coinCount||0; coinsToday=s.coinsToday||0; matured=!!s.matured;
    roomsCompleted = (s.roomsCompleted!=null) ? s.roomsCompleted : rooms.filter(r=>r.built).length;
    for(const r of rooms) if(r.built) r.counted=true;   // ロード済みの完成部屋を再カウントしない
    return true;
  }catch(err){ console.warn("load failed", err); return false; }
}
function clearSave(){ try{ localStorage.removeItem(SAVE_KEY); }catch(e){} }

// ---- Boot ----
genWorld();
if (loadGame()){
  setTimeout(()=>banner("💾 続きからロードしました", "#cfe", 2), 500);
} else {
  buildBaseNest();              // 女王の間→育児室→食料庫→ゴミ捨て場の設計図
  for (const dx of [-5,-3,-1,1,3,5]) workers.push(makeWorker((colonyCx+dx)*CELL, (surfaceH[colonyCx+dx]-1)*CELL+13));
  spawnEgg();
  setTimeout(()=>banner("🐜 コロニーを育て、夜の襲撃から卵を守り抜け！", "#ffe"), 600);
}
updateMinimap();
setInterval(()=>{ if(!gameOver) saveGame(); }, 8000);            // 自動セーブ
addEventListener("visibilitychange", ()=>{ if(document.hidden && !gameOver) saveGame(); });
addEventListener("beforeunload", ()=>{ if(!gameOver) saveGame(); });
requestAnimationFrame(loop);

/* ===== IGNIS CITY 連携：コインHUD表示＋獲得コインを親へ報告（IGNIS反映は1日30枚まで） ===== */
(function(){
  var hud=document.createElement('div');
  hud.id='ign-coinhud';
  hud.style.cssText='position:fixed;top:8px;left:50%;transform:translateX(-50%);z-index:99999;'
    +'background:rgba(10,8,4,0.82);border:1px solid rgba(255,210,90,0.5);color:#ffe27a;'
    +'font:700 12px/1.3 system-ui,sans-serif;padding:6px 13px;border-radius:999px;pointer-events:none;white-space:nowrap;';
  document.body.appendChild(hud);
  var DCAP=Math.max(1,parseInt(new URLSearchParams(location.search).get('cap'),10)||30);  // 会員ティアの1日反映上限（親から）
  window.updateCoinHud=function(){
    try{ var refl=Math.min(coinsToday,DCAP);
      hud.textContent = JA ? ('🪙 '+coinCount+'枚　(IGNIS反映 '+refl+'/'+DCAP+')')
                           : ('🪙 '+coinCount+'  (to IGNIS '+refl+'/'+DCAP+')'); }catch(e){}
  };
  var _t=0;
  window.reportCoinsToIgnis=function(force){
    var now=Date.now();
    if(!force && now-_t<1500) return;
    _t=now;
    try{ if(window.parent && window.parent!==window)
      window.parent.postMessage({type:'IGNIS_ANTGAME_REPORT', today:coinsToday, total:coinCount, v:1}, '*'); }catch(e){}
  };
  addEventListener('visibilitychange', function(){ if(document.hidden) reportCoinsToIgnis(true); });
  addEventListener('pagehide', function(){ reportCoinsToIgnis(true); });
  updateCoinHud();
})();
</script>
