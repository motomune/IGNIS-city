<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IGNIS CITY</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0f; color: #fff; font-family: 'Helvetica Neue', sans-serif; overflow: hidden; }
    #renderCanvas { width: 100vw; height: 100vh; touch-action: none; }

    #ui { position: fixed; top: 0; left: 0; width: 100%; pointer-events: none; z-index: 10; }
    #header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 24px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
    }
    #logo {
      font-size: 20px; font-weight: 900; letter-spacing: 0.2em;
      background: linear-gradient(135deg, #ff6a00, #ee0979);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    #stats { display: flex; gap: 24px; font-size: 13px; color: rgba(255,255,255,0.7); }
    #stats span { font-weight: 700; color: #ff6a00; }
    #user-area { display: flex; align-items: center; gap: 10px; pointer-events: all; }
    #lang-btn {
      background: linear-gradient(135deg, #ff6a00, #ee0979); border: none; color: #fff;
      padding: 5px 14px; border-radius: 20px; font-size: 12px; font-weight: 700; cursor: pointer;
    }
    #lang-btn:hover { opacity: 0.85; }
    #user-name { font-size: 13px; color: rgba(255,255,255,0.8); font-weight: 600; }
    #logout-btn {
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.7); padding: 5px 14px; border-radius: 20px; font-size: 12px; cursor: pointer;
    }
    #logout-btn:hover { background: rgba(255,255,255,0.2); color: #fff; }
    #login-btn-header {
      background: linear-gradient(135deg, #ff6a00, #ee0979); border: none; color: #fff;
      padding: 6px 18px; border-radius: 20px; font-size: 12px; font-weight: 700; cursor: pointer; pointer-events: all;
    }

    /* ② ガチャボタン（画面上に常時表示） */
    #gacha-float-btn {
      position: fixed; bottom: 32px; right: 24px;
      background: linear-gradient(135deg, #a855f7, #6366f1);
      color: #fff; border: none; padding: 14px 22px;
      font-size: 14px; font-weight: 900; border-radius: 40px; cursor: pointer;
      box-shadow: 0 4px 30px rgba(168,85,247,0.5);
      transition: transform 0.15s, box-shadow 0.15s;
      pointer-events: all; z-index: 10; letter-spacing: 0.05em;
    }
    #gacha-float-btn:hover { transform: scale(1.06); box-shadow: 0 8px 40px rgba(168,85,247,0.7); }

    #bottom-btns {
      position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 12px; align-items: center; pointer-events: all; z-index: 10;
    }
    #build-btn {
      background: linear-gradient(135deg, #ff6a00, #ee0979); color: #fff; border: none;
      padding: 14px 40px; font-size: 15px; font-weight: 700; letter-spacing: 0.1em;
      border-radius: 40px; cursor: pointer; box-shadow: 0 4px 30px rgba(255,106,0,0.4);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    #build-btn:hover { transform: scale(1.05); box-shadow: 0 8px 40px rgba(255,106,0,0.6); }
    #mode-btn {
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.25); color: #fff;
      padding: 12px 22px; font-size: 13px; font-weight: 700; border-radius: 30px;
      cursor: pointer; transition: background 0.2s; backdrop-filter: blur(6px); white-space: nowrap;
    }
    #mode-btn:hover { background: rgba(255,255,255,0.2); }
    #mode-btn.fly-active {
      background: linear-gradient(135deg, rgba(100,180,255,0.3), rgba(50,120,255,0.3));
      border-color: rgba(100,180,255,0.5); color: #aaddff;
    }

    #fly-hint {
      position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.6); border: 1px solid rgba(100,180,255,0.3);
      color: rgba(200,230,255,0.8); padding: 8px 20px; border-radius: 20px;
      font-size: 12px; font-weight: 600; display: none; z-index: 10;
      pointer-events: none; backdrop-filter: blur(6px); white-space: nowrap;
    }
    #fly-hint.visible { display: block; }

    #loading {
      position: fixed; inset: 0; background: #0a0a0f; display: flex;
      flex-direction: column; align-items: center; justify-content: center; z-index: 100; transition: opacity 0.8s;
    }
    #loading-logo {
      font-size: 36px; font-weight: 900; letter-spacing: 0.3em;
      background: linear-gradient(135deg, #ff6a00, #ee0979);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 24px;
    }
    #loading-bar-wrap { width: 200px; height: 2px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
    #loading-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #ff6a00, #ee0979); border-radius: 2px; transition: width 0.3s; }

    #toast {
      position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
      background: rgba(255,106,0,0.9); color: #fff; padding: 10px 24px;
      border-radius: 20px; font-size: 14px; font-weight: 700; opacity: 0;
      transition: opacity 0.3s; z-index: 25; pointer-events: none; white-space: nowrap;
    }
    #fire-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 201; display: none; }

    /* ① 土地パネル（より鮮明に） */
    #land-panel {
      position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
      background: rgba(6,6,16,0.97);
      border: 2px solid rgba(255,106,0,0.8);
      border-radius: 20px; padding: 22px 28px 20px; min-width: 300px; max-width: 92vw;
      z-index: 15; pointer-events: all; display: none;
      backdrop-filter: blur(20px);
      box-shadow: 0 0 0 1px rgba(255,106,0,0.2), 0 8px 40px rgba(0,0,0,0.8), 0 0 40px rgba(255,106,0,0.15);
    }
    #land-panel.open { display: block; }
    #land-panel-close {
      position: absolute; top: 12px; right: 16px; background: rgba(255,255,255,0.08); border: none;
      color: rgba(255,255,255,0.6); font-size: 18px; cursor: pointer; width: 28px; height: 28px;
      border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: all 0.2s;
    }
    #land-panel-close:hover { background: rgba(255,255,255,0.2); color: #fff; }
    #land-panel-title {
      font-size: 10px; font-weight: 800; color: #ff6a00;
      letter-spacing: 0.2em; margin-bottom: 6px; text-transform: uppercase;
    }
    #land-panel-coord { font-size: 20px; font-weight: 900; color: #fff; margin-bottom: 6px; letter-spacing: 0.05em; }
    #land-panel-owner { font-size: 13px; color: rgba(255,255,255,0.6); margin-bottom: 4px; }
    #land-panel-owner .owner-name { color: #1d9bf0; font-weight: 800; }
    #land-panel-building {
      font-size: 12px; color: rgba(255,255,255,0.45); margin-bottom: 14px;
      padding: 6px 10px; background: rgba(255,255,255,0.05); border-radius: 8px; min-height: 28px;
    }
    .land-panel-btn {
      width: 100%; border: none; color: #fff; padding: 12px; border-radius: 12px;
      font-size: 14px; font-weight: 700; cursor: pointer; transition: opacity 0.2s, transform 0.1s; margin-top: 8px;
    }
    .land-panel-btn:first-of-type { margin-top: 0; }
    .land-panel-btn:hover { opacity: 0.88; transform: scale(1.01); }
    .land-panel-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
    #land-buy-btn { background: linear-gradient(135deg, #ff6a00, #ee0979); }
    #land-gacha-btn { background: linear-gradient(135deg, #a855f7, #6366f1); }
    #land-rebuild-btn { background: linear-gradient(135deg, #f59e0b, #ef4444); }

    /* =====================
       ⑤ ガチャ演出オーバーレイ（3D風）
    ===================== */
    #gacha-overlay {
      display: none; position: fixed; inset: 0; z-index: 300;
      background: radial-gradient(ellipse at center, #1a0a2e 0%, #0a0a0f 100%);
      align-items: center; justify-content: center; flex-direction: column;
    }
    #gacha-overlay.show { display: flex; }

    /* ガチャガチャマシン */
    #gacha-machine {
      width: 220px; height: 280px; position: relative; margin-bottom: 20px;
      animation: machineEntry 0.6s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }
    @keyframes machineEntry {
      0% { transform: translateY(-80px) scale(0.7); opacity: 0; }
      100% { transform: translateY(0) scale(1); opacity: 1; }
    }

    /* マシン本体（SVGで描画） */
    #gacha-machine svg { width: 100%; height: 100%; filter: drop-shadow(0 10px 30px rgba(168,85,247,0.5)); }

    /* カプセル */
    #gacha-capsule {
      width: 100px; height: 100px; position: absolute;
      left: 50%; top: 50%; transform: translate(-50%, -50%) scale(0);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 36px; transition: none;
    }
    #gacha-capsule.drop {
      animation: capsuleDrop 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    }
    @keyframes capsuleDrop {
      0%   { transform: translate(-50%, -200%) scale(0.4); opacity: 0; }
      40%  { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
      55%  { transform: translate(-50%, -50%) scale(0.95); }
      65%  { transform: translate(-50%, -50%) scale(1.05); }
      75%  { transform: translate(-50%, -50%) scale(1); }
      100% { transform: translate(-50%, 120%) scale(1); opacity: 1; }
    }

    /* カプセル割れ演出エリア */
    #gacha-break-area {
      position: relative; width: 200px; height: 200px;
      display: flex; align-items: center; justify-content: center;
      display: none;
    }
    #gacha-break-area.show { display: flex; }

    /* 割れるカプセル */
    #capsule-top, #capsule-bottom {
      position: absolute; width: 90px; height: 45px;
      border-radius: 45px 45px 0 0;
      display: flex; align-items: center; justify-content: center;
    }
    #capsule-top {
      top: 50px; background: rgba(255,255,255,0.15);
      border: 2px solid rgba(255,255,255,0.3);
      animation: none;
    }
    #capsule-bottom {
      top: 95px; background: rgba(255,255,255,0.1);
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 0 0 45px 45px;
      animation: none;
    }
    #capsule-top.break { animation: capBreakTop 0.5s ease-out forwards; }
    #capsule-bottom.break { animation: capBreakBottom 0.5s ease-out forwards; }
    @keyframes capBreakTop { to { transform: translateY(-40px) rotate(-15deg); opacity: 0; } }
    @keyframes capBreakBottom { to { transform: translateY(40px) rotate(10deg); opacity: 0; } }

    /* ビル出現 */
    #capsule-building {
      position: absolute; font-size: 52px;
      transform: scale(0); transition: none;
      filter: drop-shadow(0 0 20px rgba(255,255,255,0.8));
    }
    #capsule-building.appear { animation: buildingAppear 0.6s cubic-bezier(0.34,1.56,0.64,1) forwards; }
    @keyframes buildingAppear {
      0%   { transform: scale(0) rotate(-10deg); opacity: 0; }
      60%  { transform: scale(1.2) rotate(3deg); opacity: 1; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    /* ★4以上の光演出 */
    #gacha-flash {
      position: fixed; inset: 0; background: #fff;
      opacity: 0; pointer-events: none; z-index: 301;
      transition: opacity 0.1s;
    }
    #gacha-flash.flash { animation: flashAnim 0.6s ease-out forwards; }
    @keyframes flashAnim {
      0%   { opacity: 0.9; }
      100% { opacity: 0; }
    }

    /* パーティクル */
    #gacha-particles {
      position: absolute; inset: 0; pointer-events: none;
      overflow: visible;
    }
    .particle {
      position: absolute; width: 8px; height: 8px; border-radius: 50%;
      animation: particleFly 1s ease-out forwards;
    }
    @keyframes particleFly {
      0% { transform: translate(0,0) scale(1); opacity: 1; }
      100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
    }

    /* 結果テキスト */
    #gacha-result-text {
      text-align: center; display: none; animation: resultFadeIn 0.5s ease forwards;
    }
    #gacha-result-text.show { display: block; }
    @keyframes resultFadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    #gacha-result-rank { font-size: 28px; font-weight: 900; letter-spacing: 0.1em; margin-bottom: 6px; }
    #gacha-result-floors { font-size: 16px; color: rgba(255,255,255,0.7); font-weight: 700; margin-bottom: 20px; }
    #gacha-result-close {
      background: linear-gradient(135deg, #a855f7, #6366f1); border: none; color: #fff;
      padding: 12px 40px; border-radius: 30px; font-size: 15px; font-weight: 700; cursor: pointer;
    }
    #gacha-result-close:hover { opacity: 0.85; }

    /* ガチャ設定モーダル（土地選択または即回し） */
    #gacha-modal {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.85); backdrop-filter: blur(12px);
      z-index: 160; align-items: center; justify-content: center;
    }
    #gacha-modal.open { display: flex; }
    #gacha-box {
      background: #0a0a14; border: 1px solid rgba(168,85,247,0.5); border-radius: 24px;
      padding: 28px 28px 24px; width: 360px; max-width: 94vw; position: relative;
      box-shadow: 0 0 60px rgba(168,85,247,0.2), 0 20px 60px rgba(0,0,0,0.8); text-align: center;
    }
    #gacha-modal-close { position: absolute; top: 14px; right: 18px; background: none; border: none; color: rgba(255,255,255,0.3); font-size: 22px; cursor: pointer; }
    #gacha-modal-close:hover { color: #fff; }
    #gacha-title {
      font-size: 22px; font-weight: 900; letter-spacing: 0.1em;
      background: linear-gradient(135deg, #a855f7, #6366f1);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 4px;
    }
    #gacha-land-info { font-size: 12px; color: rgba(255,255,255,0.3); margin-bottom: 18px; }
    .gacha-rates { margin-bottom: 18px; }
    .rate-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 7px 12px; border-radius: 8px; margin-bottom: 4px;
      background: rgba(255,255,255,0.04); font-size: 13px;
    }
    .rate-row .stars { font-weight: 900; }
    .rate-row .floors-range { color: rgba(255,255,255,0.4); font-size: 12px; }
    .rate-row .prob { font-weight: 700; color: #a855f7; }
    .star1{color:#94a3b8;}.star2{color:#22c55e;}.star3{color:#3b82f6;}.star4{color:#f59e0b;}.star5{color:#ee0979;}
    #gacha-cost-info { font-size: 13px; color: rgba(255,255,255,0.45); margin-bottom: 18px; }
    #gacha-cost-info span { color: #a855f7; font-weight: 700; }
    #gacha-spin-btn {
      width: 100%; background: linear-gradient(135deg, #a855f7, #6366f1); border: none;
      color: #fff; padding: 14px; border-radius: 12px; font-size: 16px; font-weight: 900;
      cursor: pointer; box-shadow: 0 4px 30px rgba(168,85,247,0.4); transition: opacity 0.2s;
    }
    #gacha-spin-btn:hover { opacity: 0.85; }
    #gacha-spin-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* 形状選択モーダル */
    #build-modal {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.75); backdrop-filter: blur(10px);
      z-index: 150; align-items: center; justify-content: center;
    }
    #build-modal.open { display: flex; }
    #build-box {
      background: #0f0f18; border: 1px solid rgba(255,106,0,0.35); border-radius: 22px;
      padding: 28px 28px 24px; width: 360px; max-width: 94vw; position: relative;
      box-shadow: 0 20px 60px rgba(0,0,0,0.7);
    }
    #build-modal-close { position: absolute; top: 14px; right: 18px; background: none; border: none; color: rgba(255,255,255,0.3); font-size: 22px; cursor: pointer; }
    #build-modal-close:hover { color: #fff; }
    #build-modal-title {
      font-size: 18px; font-weight: 900; letter-spacing: 0.1em;
      background: linear-gradient(135deg, #ff6a00, #ee0979);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 4px;
    }
    #build-modal-info { font-size: 13px; color: rgba(255,255,255,0.4); margin-bottom: 20px; }
    .custom-label { font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.4); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 8px; }
    .shape-grid { display: flex; gap: 8px; margin-bottom: 22px; }
    .shape-btn { flex: 1; background: rgba(255,255,255,0.06); border: 1.5px solid rgba(255,255,255,0.12); border-radius: 10px; padding: 10px 4px; text-align: center; cursor: pointer; transition: all 0.2s; color: rgba(255,255,255,0.6); }
    .shape-btn:hover { background: rgba(255,255,255,0.1); }
    .shape-btn.selected { border-color: #ff6a00; background: rgba(255,106,0,0.15); color: #fff; }
    .shape-btn .shape-icon { font-size: 22px; display: block; margin-bottom: 4px; }
    .shape-btn .shape-name { font-size: 11px; font-weight: 700; }
    #build-confirm-btn { width: 100%; background: linear-gradient(135deg, #ff6a00, #ee0979); border: none; color: #fff; padding: 13px; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; transition: opacity 0.2s; }
    #build-confirm-btn:hover { opacity: 0.85; }
    #build-confirm-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* 認証モーダル */
    #auth-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 200; align-items: center; justify-content: center; }
    #auth-modal.open { display: flex; }
    #auth-box { background: #0f0f18; border: 1px solid rgba(255,106,0,0.35); border-radius: 22px; padding: 36px 36px 28px; width: 400px; max-width: 92vw; box-shadow: 0 20px 60px rgba(0,0,0,0.7); position: relative; overflow: hidden; }
    #auth-box::before { content: ''; position: absolute; top: -40px; left: 50%; transform: translateX(-50%); width: 200px; height: 80px; background: radial-gradient(ellipse, rgba(255,106,0,0.2) 0%, transparent 70%); pointer-events: none; }
    #auth-header-fire { text-align: center; font-size: 30px; margin-bottom: 4px; animation: fireFlicker 1.5s ease-in-out infinite alternate; }
    @keyframes fireFlicker { 0%{filter:brightness(1) drop-shadow(0 0 6px #ff6a00);transform:scaleY(1);}50%{filter:brightness(1.4) drop-shadow(0 0 14px #ff3300);transform:scaleY(1.06);}100%{filter:brightness(0.9) drop-shadow(0 0 4px #ff9900);transform:scaleY(0.97);} }
    #auth-title { font-size: 22px; font-weight: 900; letter-spacing: 0.15em; background: linear-gradient(135deg, #ff6a00, #ee0979); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; margin-bottom: 4px; }
    #auth-subtitle { font-size: 12px; color: rgba(255,255,255,0.35); text-align: center; margin-bottom: 22px; }
    .auth-tab-wrap { display: flex; margin-bottom: 18px; background: rgba(255,255,255,0.05); border-radius: 10px; padding: 4px; }
    .auth-tab { flex: 1; padding: 8px; text-align: center; font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.4); cursor: pointer; border-radius: 7px; transition: all 0.2s; }
    .auth-tab.active { background: linear-gradient(135deg, #ff6a00, #ee0979); color: #fff; }
    .auth-input-wrap { position: relative; margin-bottom: 10px; }
    .auth-input { width: 100%; background: rgba(255,255,255,0.05); border: 1.5px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 12px 16px; color: #fff; font-size: 14px; outline: none; transition: border-color 0.25s, box-shadow 0.25s; }
    .auth-input::placeholder { color: rgba(255,255,255,0.25); }
    .auth-input:focus { border-color: rgba(255,106,0,0.7) !important; box-shadow: 0 0 12px rgba(255,106,0,0.2) !important; animation: none !important; }
    .auth-input.blink { animation: inputBlink 1.1s ease-in-out infinite; }
    @keyframes inputBlink { 0%,100%{border-color:rgba(255,80,0,0.45);box-shadow:0 0 6px rgba(255,80,0,0.15);}50%{border-color:rgba(255,80,0,0.95);box-shadow:0 0 14px rgba(255,80,0,0.45);} }
    .auth-input.done { border-color: #22c55e !important; box-shadow: 0 0 10px rgba(34,197,94,0.3) !important; animation: none !important; }
    #username-field { display: none; }
    /* ③ Xユーザー名フィールド */
    #x-username-field { display: none; }
    .auth-input-prefix { display: flex; align-items: center; background: rgba(255,255,255,0.05); border: 1.5px solid rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; margin-bottom: 10px; transition: border-color 0.25s, box-shadow 0.25s; }
    .auth-input-prefix:focus-within { border-color: rgba(255,106,0,0.7); box-shadow: 0 0 12px rgba(255,106,0,0.2); }
    .auth-prefix-at { padding: 12px 0 12px 16px; color: #1d9bf0; font-weight: 900; font-size: 14px; }
    .auth-input-prefix input { flex: 1; background: transparent; border: none; padding: 12px 16px 12px 4px; color: #fff; font-size: 14px; outline: none; }
    .auth-input-prefix input::placeholder { color: rgba(255,255,255,0.25); }
    #pw-checks { display: none; background: rgba(255,255,255,0.04); border-radius: 10px; padding: 12px 16px; margin-bottom: 12px; flex-direction: column; gap: 7px; }
    #pw-checks.visible { display: flex; }
    .pw-check-item { display: flex; align-items: center; gap: 9px; font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.32); transition: color 0.25s; }
    .pw-check-item.ok { color: #22c55e; }

      fields.forEach(id=>{const el=document.getElementById(id);if(!el)return;const val=el.value.trim(),focused=document.activeElement===el;el.classList.remove('blink','done');if(focused)return;if(!val){el.classList.add('blink');return;}if(id==='input-password'&&authMode==='signup')el.classList.add(checkPassword(val).every(v=>v)?'done':'blink');else if(id==='input-password')el.classList.add(val.length>=6?'done':'blink');else el.classList.add('done');});
    }

      showToast(`👋 おかえり、${xName?'@'+xName:displayName}！`);
    }
    async function handleLogout(){await db.auth.signOut();currentUser=null;document.getElementById('login-btn-header').style.display='block';document.getElementById('logged-in-area').style.display='none';document.getElementById('user-name').textContent='';document.getElementById('coin-count').textContent='0';showToast('ログアウトしました');}
    async function restoreSession(){const{data:{session}}=await db.auth.getSession();if(session)await onLoginSuccess(session.user);}

    // Babylon.js
    const canvas=document.getElementById('renderCanvas');
    const engine=new BABYLON.Engine(canvas,true);
    const scene=new BABYLON.Scene(engine);
    scene.clearColor=new BABYLON.Color4(0.04,0.04,0.06,1);

    const arcCamera=new BABYLON.ArcRotateCamera('arcCam',-Math.PI/4,Math.PI/3.5,60,BABYLON.Vector3.Zero(),scene);
    arcCamera.attachControl(canvas,true);
    arcCamera.lowerRadiusLimit=10;arcCamera.upperRadiusLimit=200;arcCamera.upperBetaLimit=Math.PI/2.2;

    const flyCamera=new BABYLON.FlyCamera('flyCam',new BABYLON.Vector3(0,30,-60),scene);
    flyCamera.setTarget(BABYLON.Vector3.Zero());
    flyCamera.speed=1.4;flyCamera.angularSensibility=800;flyCamera.rollCorrect=10;
    flyCamera.bankedTurn=true;flyCamera.bankedTurnLimit=Math.PI/4;flyCamera.bankedTurnMultiplier=0.5;flyCamera.minZ=0.1;
    flyCamera.keysUp=[87,38];flyCamera.keysDown=[83,40];flyCamera.keysLeft=[65,37];flyCamera.keysRight=[68,39];
    scene.activeCamera=arcCamera;
    let isFlying=false;

    function toggleFlyMode(){isFlying=!isFlying;setFlyMode(isFlying);}
    function setFlyMode(enabled){
      isFlying=enabled;
      const modeBtn=document.getElementById('mode-btn'),flyHint=document.getElementById('fly-hint');
      if(enabled){const p=arcCamera.position;flyCamera.position=new BABYLON.Vector3(p.x,p.y,p.z);flyCamera.setTarget(arcCamera.target||BABYLON.Vector3.Zero());scene.activeCamera=flyCamera;flyCamera.attachControl(canvas,true);arcCamera.detachControl();modeBtn.classList.add('fly-active');modeBtn.textContent='🏙 街づくりモード';flyHint.classList.add('visible');closeLandPanel();showToast('🕊 飛行モード ON');}
      else{scene.activeCamera=arcCamera;arcCamera.attachControl(canvas,true);flyCamera.detachControl();modeBtn.classList.remove('fly-active');modeBtn.textContent='🕊 飛行モード';flyHint.classList.remove('visible');showToast('🏙 街づくりモード ON');}
    }

    const hemiLight=new BABYLON.HemisphericLight('hemi',new BABYLON.Vector3(0,1,0),scene);
    hemiLight.intensity=0.6;hemiLight.groundColor=new BABYLON.Color3(0.1,0.05,0.1);
    const dirLight=new BABYLON.DirectionalLight('dir',new BABYLON.Vector3(-1,-2,-1),scene);
    dirLight.intensity=0.8;dirLight.position=new BABYLON.Vector3(50,50,50);

    const ground=BABYLON.MeshBuilder.CreateGround('ground',{width:200,height:200,subdivisions:20},scene);
    const groundMat=new BABYLON.StandardMaterial('groundMat',scene);
    groundMat.diffuseColor=new BABYLON.Color3(0.06,0.06,0.1);groundMat.specularColor=new BABYLON.Color3(0,0,0);
    ground.material=groundMat;
    const lineMat=new BABYLON.StandardMaterial('lineMat',scene);
    lineMat.emissiveColor=new BABYLON.Color3(0.15,0.1,0.2);
    for(let i=-GRID_HALF;i<=GRID_HALF;i+=CELL){
      const hL=BABYLON.MeshBuilder.CreateBox('hl',{width:200,height:0.02,depth:0.05},scene);hL.position=new BABYLON.Vector3(0,0.01,i);hL.material=lineMat;hL.isPickable=false;
      const vL=BABYLON.MeshBuilder.CreateBox('vl',{width:0.05,height:0.02,depth:200},scene);vL.position=new BABYLON.Vector3(i,0.01,0);vL.material=lineMat;vL.isPickable=false;
    }

    // 土地システム
    const landMap={};
    let selectedLandKey=null;
    function worldToGrid(wx,wz){return{gx:Math.round(wx/CELL)*CELL,gz:Math.round(wz/CELL)*CELL};}
    function landKey(gx,gz){return`${gx}_${gz}`;}
    function keyToCoord(key){const[gx,gz]=key.split('_').map(Number);return{gx,gz};}

    let highlightTile=null;
    function showHighlight(gx,gz,owned){
      if(highlightTile)highlightTile.dispose();
      highlightTile=BABYLON.MeshBuilder.CreateGround('hl_tile',{width:CELL-0.3,height:CELL-0.3},scene);
      highlightTile.position=new BABYLON.Vector3(gx,0.05,gz);
      const mat=new BABYLON.StandardMaterial('hl_mat_'+Date.now(),scene);
      mat.emissiveColor=owned?new BABYLON.Color3(1.0,0.4,0.0):new BABYLON.Color3(0.1,1.0,0.3);
      mat.alpha=0.55;highlightTile.material=mat;highlightTile.isPickable=false;
    }
    function hideHighlight(){if(highlightTile){highlightTile.dispose();highlightTile=null;}}

    function drawOwnedTile(gx,gz,key){
      const tile=BABYLON.MeshBuilder.CreateGround('lt_'+key,{width:CELL-0.4,height:CELL-0.4},scene);
      tile.position=new BABYLON.Vector3(gx,0.02,gz);
      const mat=new BABYLON.StandardMaterial('ltm_'+key,scene);
      mat.emissiveColor=new BABYLON.Color3(1.0,0.45,0.0);mat.alpha=0.28;
      tile.material=mat;tile.isPickable=false;return tile;
    }

    async function loadLands(){
      try{
        const{data,error}=await db.from('lands').select('grid_x,grid_z,owner_id,users(username,x_username)');
        if(error)throw error;
        data.forEach(l=>{
          const k=landKey(l.grid_x,l.grid_z);
          const u=l.users;
          const ownerDisplay=u&&u.x_username?`@${u.x_username}`:u&&u.username?u.username:'?';
          const tile=drawOwnedTile(l.grid_x,l.grid_z,k);
          landMap[k]={owner_id:l.owner_id,owner_display:ownerDisplay,tile};
        });
      }catch(e){console.warn('land load error:',e.message);}
    }

    function openLandPanel(gx,gz){
      selectedLandKey=landKey(gx,gz);
      const land=landMap[selectedLandKey];
      document.getElementById('land-panel-coord').textContent=`X:${gx} / Z:${gz}`;
      const ownerEl=document.getElementById('land-panel-owner');
      const buildingEl=document.getElementById('land-panel-building');
      const buyBtn=document.getElementById('land-buy-btn');
      const gachaBtn=document.getElementById('land-gacha-btn');
      const rebuildBtn=document.getElementById('land-rebuild-btn');
      const building=buildingMap[selectedLandKey];

      if(land){
        const isMe=currentUser&&land.owner_id===currentUser.id;
        // ③ Xユーザー名で表示
        ownerEl.innerHTML=`Xユーザー：<span class="owner-name">${land.owner_display}</span>`;
        if(building){
          const colorInfo=getColorByEmployees(building.employees||0);
          buildingEl.textContent=`${building.totalFloors}階 ｜ 従業員 ${building.employees||0}人 ${colorInfo.label}`;
        } else {buildingEl.textContent='ビルなし';}
        if(isMe){
          buyBtn.style.display='none';
          if(building){gachaBtn.style.display='none';rebuildBtn.style.display='block';}
          else{gachaBtn.style.display='block';rebuildBtn.style.display='none';}
        } else {
          buyBtn.style.display='block';buyBtn.textContent='🔒 購入済みの土地です';buyBtn.disabled=true;
          gachaBtn.style.display='none';rebuildBtn.style.display='none';
        }
      } else {
        ownerEl.textContent='空き地（未取得）';
        buildingEl.textContent='';
        buyBtn.style.display='block';buyBtn.textContent='🔥 この土地を取得（無料）';buyBtn.disabled=false;
        gachaBtn.style.display='none';rebuildBtn.style.display='none';
      }
      showHighlight(gx,gz,!!land);
      document.getElementById('land-panel').classList.add('open');
    }

    function closeLandPanel(){document.getElementById('land-panel').classList.remove('open');hideHighlight();selectedLandKey=null;}

    async function handleLandBuy(){
      if(!currentUser){closeLandPanel();openAuthModal();showToast('ログインが必要です');return;}
      const{gx,gz}=keyToCoord(selectedLandKey);
      const buyBtn=document.getElementById('land-buy-btn');
      buyBtn.disabled=true;buyBtn.textContent='処理中...';
      try{
        const{data:ud}=await db.from('users').select('coin_column,username,x_username').eq('id',currentUser.id).single();
        const{error:landErr}=await db.from('lands').insert({grid_x:gx,grid_z:gz,owner_id:currentUser.id});
        if(landErr)throw landErr;
        const xName=ud&&ud.x_username?`@${ud.x_username}`:ud&&ud.username?ud.username:'?';
        const tile=drawOwnedTile(gx,gz,selectedLandKey);
        landMap[selectedLandKey]={owner_id:currentUser.id,owner_display:xName,tile};
        showToast('🏡 土地を取得しました！');
        openLandPanel(gx,gz);
      }catch(e){
        console.warn('land buy error:',e.message);
        showToast('取得に失敗しました');
        buyBtn.disabled=false;buyBtn.textContent='🔥 この土地を取得（無料）';
      }
    }

    // ガチャシステム
    let gachaState={result:null,isRebuild:false,landKey:null};

    function openGachaModal(isRebuild=false){
      // 土地なしで直接ガチャボタンを押した場合（土地選択が必要）
      if(!selectedLandKey&&!isRebuild){
        showToast('まず土地をタップして選択してください');return;
      }
      gachaState.isRebuild=isRebuild;
      gachaState.landKey=selectedLandKey;
      const info=selectedLandKey?`${keyToCoord(selectedLandKey).gx} / ${keyToCoord(selectedLandKey).gz}`:'土地未選択';
      document.getElementById('gacha-land-info').textContent=selectedLandKey?`対象：X:${info}`:'';
      closeLandPanel();
      document.getElementById('gacha-modal').classList.add('open');
    }
    function closeGachaModal(){document.getElementById('gacha-modal').classList.remove('open');}

    async function handleGachaSpin(){
      if(!currentUser){closeGachaModal();openAuthModal();return;}
      if(!gachaState.landKey){showToast('土地を選択してください');closeGachaModal();return;}
      const ja=currentLang==='ja';
      const btn=document.getElementById('gacha-spin-btn');
      const{data:ud}=await db.from('users').select('coin_column').eq('id',currentUser.id).single();
      const balance=ud?ud.coin_column||0:0;
      if(balance<GACHA_COST){showToast(`コインが足りません（必要：${GACHA_COST}）`);return;}
      btn.disabled=true;btn.textContent='抽選中...';
      const newCoins=balance-GACHA_COST;
      await db.from('users').update({coin_column:newCoins}).eq('id',currentUser.id);
      document.getElementById('coin-count').textContent=newCoins;
      const result=rollGacha();
      gachaState.result=result;
      closeGachaModal();
      playGachaAnimation(result);
      btn.disabled=false;btn.textContent='🎰 ガチャを回す';
    }

    // ⑤ ガチャアニメーション
    function playGachaAnimation(result){
      const overlay=document.getElementById('gacha-overlay');
      const phase1=document.getElementById('gacha-phase1');
      const phase2=document.getElementById('gacha-phase2');
      const capsule=document.getElementById('gacha-capsule');
      const flash=document.getElementById('gacha-flash');

      // カプセルの色を★に応じて変える
      const capsuleColors={5:'#ee0979',4:'#f59e0b',3:'#3b82f6',2:'#22c55e',1:'#94a3b8'};
      capsule.style.background=`radial-gradient(circle at 35% 35%, ${capsuleColors[result.star]}, ${capsuleColors[result.star]}88)`;
      capsule.style.boxShadow=`0 0 30px ${capsuleColors[result.star]}88`;
      capsule.textContent=result.emoji;

      // リセット
      phase1.style.display='block';
      phase2.style.display='none';
      document.getElementById('gacha-result-text').classList.remove('show');
      capsule.className='';
      overlay.classList.add('show');

      // フェーズ1: カプセルが落ちる
      setTimeout(()=>{
        capsule.className='drop';
      },600);

      // フェーズ2: カプセル割れ
      setTimeout(()=>{
        phase1.style.display='none';
        phase2.style.display='flex';

        // ★4以上は光演出
        if(result.star>=4){
          flash.classList.remove('flash');
          void flash.offsetWidth; // reflow
          flash.classList.add('flash');
        }

        // カプセルの色設定
        const top=document.getElementById('capsule-top');
        const bottom=document.getElementById('capsule-bottom');
        top.style.background=`linear-gradient(180deg, ${capsuleColors[result.star]}aa, ${capsuleColors[result.star]}44)`;
        bottom.style.background=`linear-gradient(0deg, ${capsuleColors[result.star]}88, ${capsuleColors[result.star]}22)`;

        // パーティクル生成
        spawnGachaParticles(result.star);

        // 割れアニメ
        top.className='';bottom.className='';
        void top.offsetWidth;
        top.classList.add('break');bottom.classList.add('break');

        // ビルアイコン表示
        const buildingIcons={5:'🏙',4:'🏢',3:'🏬',2:'🏪',1:'🏠'};
        const bEl=document.getElementById('capsule-building');
        bEl.textContent=buildingIcons[result.star];
        bEl.style.filter=`drop-shadow(0 0 20px ${capsuleColors[result.star]})`;
        bEl.className='';
        setTimeout(()=>bEl.classList.add('appear'),200);

        // 結果テキスト
        setTimeout(()=>{
          const rankEl=document.getElementById('gacha-result-rank');
          rankEl.textContent=result.label;
          rankEl.style.color=capsuleColors[result.star];
          document.getElementById('gacha-result-floors').textContent=`${result.floors}階建てのビルをGET！`;
          document.getElementById('gacha-result-text').classList.add('show');
        },700);
      },2200);
    }

    function spawnGachaParticles(star){
      const container=document.getElementById('gacha-particles');
      container.innerHTML='';
      const count=star*8+10;
      const colors=['#ff6a00','#ee0979','#a855f7','#6366f1','#f59e0b','#22c55e','#3b82f6','#fff'];
      for(let i=0;i<count;i++){
        const p=document.createElement('div');
        p.className='particle';
        const angle=Math.random()*Math.PI*2;
        const dist=60+Math.random()*80;
        p.style.cssText=`
          left:50%;top:50%;
          background:${colors[Math.floor(Math.random()*colors.length)]};
          --tx:${Math.cos(angle)*dist}px;
          --ty:${Math.sin(angle)*dist}px;
          animation-delay:${Math.random()*0.3}s;
          animation-duration:${0.6+Math.random()*0.6}s;
          width:${4+star*2}px;height:${4+star*2}px;
        `;
        container.appendChild(p);
      }
    }

    function onGachaResultClose(){
      document.getElementById('gacha-overlay').classList.remove('show');
      openBuildModal();
    }

    // 形状選択
    let selectedShape='box';
    function selectShape(el){selectedShape=el.getAttribute('data-shape');document.querySelectorAll('.shape-btn').forEach(b=>b.classList.remove('selected'));el.classList.add('selected');}

    const SHAPES={box:{w:5.5,d:5.5},slim:{w:3.0,d:3.0},wide:{w:8.0,d:8.0},cylinder:{w:5.0,d:5.0}};

    function openBuildModal(){
      if(!gachaState.result)return;
      selectedShape='box';
      document.querySelectorAll('.shape-btn').forEach((b,i)=>b.classList.toggle('selected',i===0));
      document.getElementById('build-modal-info').textContent=`${gachaState.result.label}　${gachaState.result.floors}階建て`;
      document.getElementById('build-modal').classList.add('open');
    }
    function closeBuildModal(){document.getElementById('build-modal').classList.remove('open');}

    async function handleBuildConfirm(){
      if(!gachaState.result||!gachaState.landKey||!currentUser)return;
      const{gx,gz}=keyToCoord(gachaState.landKey);
      const{floors}=gachaState.result;
      const btn=document.getElementById('build-confirm-btn');
      btn.disabled=true;btn.textContent='建設中...';
      try{
        let employees=0;
        const existingBuilding=buildingMap[gachaState.landKey];

        // ④ 建て替え：既存ビルを完全に削除してから新しいビルを建てる
        if(gachaState.isRebuild&&existingBuilding){
          employees=existingBuilding.employees||0;
          // 3Dメッシュ削除
          if(existingBuilding.mesh){
            existingBuilding.mesh.dispose();
            existingBuilding.mesh=null;
          }
          // buildings配列から削除
          buildings=buildings.filter(b=>b.landKey!==gachaState.landKey);
          delete buildingMap[gachaState.landKey];
          document.getElementById('building-count').textContent=buildings.length;
          // DBから削除
          await db.from('buildings').delete().eq('x',gx).eq('z',gz);
        }

        // DB保存
        const{error}=await db.from('buildings').insert({x:gx,z:gz,floors,style:`${selectedShape}_gacha`,owner_id:currentUser.id,employees});
        if(error)throw error;

        // 3Dビル追加
        addBuilding(gx,gz,floors,selectedShape,employees,false,gachaState.landKey);
        closeBuildModal();
        const colorInfo=getColorByEmployees(employees);
        showToast(`🏢 ${floors}階建て完成！${colorInfo.label}`);
        gachaState={result:null,isRebuild:false,landKey:null};
      }catch(e){
        console.warn('build error:',e.message);showToast('建設に失敗しました');
        btn.disabled=false;btn.textContent='🏢 建設する';
      }
    }

    // ビル管理
    let buildings=[];
    const buildingMap={};

    function addBuilding(x,z,baseFloors,shape='box',employees=0,fromDB=false,lKey=null){
      const totalFloors=calcTotalFloors(baseFloors,employees);
      const height=totalFloors*0.5;
      const w=SHAPES[shape]?.w||5.5,d=SHAPES[shape]?.d||5.5;
      let mesh;
      if(shape==='cylinder'){mesh=BABYLON.MeshBuilder.CreateCylinder('b_'+Date.now(),{height,diameter:w,tessellation:16},scene);}
      else{mesh=BABYLON.MeshBuilder.CreateBox('b_'+Date.now(),{width:w,height,depth:d},scene);}
      mesh.position=new BABYLON.Vector3(x,height/2,z);
      const mat=new BABYLON.StandardMaterial('bm_'+Date.now(),scene);
      const colorInfo=getColorByEmployees(employees);
      mat.diffuseColor=new BABYLON.Color3(colorInfo.r,colorInfo.g,colorInfo.b);
      mat.specularColor=new BABYLON.Color3(0.5,0.5,0.7);
      if(colorInfo.name==='gold')mat.emissiveColor=new BABYLON.Color3(0.3,0.2,0.0);
      else if(colorInfo.name==='rainbow')mat.emissiveColor=new BABYLON.Color3(0.2,0.0,0.2);
      mesh.material=mat;
      const key=lKey||landKey(x,z);
      const buildingData={x,z,baseFloors,totalFloors,shape,employees,mesh,landKey:key};
      buildings.push(buildingData);
      buildingMap[key]=buildingData;
      document.getElementById('building-count').textContent=buildings.length;
    }

    async function loadBuildings(){
      try{
        const{data,error}=await db.from('buildings').select('*');
        if(error)throw error;
        data.forEach(b=>{let shape='box';if(b.style&&b.style!=='default'){const parts=b.style.split('_');if(parts.length>=1)shape=parts[0];}addBuilding(b.x,b.z,b.floors,shape,b.employees||0,true);});
      }catch(e){
        console.warn('Supabase error:',e.message);
        [[0,0,20,'box',0],[10,5,35,'slim',30],[-8,12,15,'wide',100],[15,-10,50,'cylinder',300],[-15,-5,28,'box',1000]].forEach(([x,z,f,s,emp])=>addBuilding(x,z,f,s,emp,true));
      }
      finishLoading();
    }

    // ランダム建設ボタン
    document.getElementById('build-btn').addEventListener('click',async()=>{
      const x=(Math.floor(Math.random()*20)-10)*CELL,z=(Math.floor(Math.random()*20)-10)*CELL;
      const floors=Math.floor(Math.random()*50)+5;
      const shapes=Object.keys(SHAPES),shape=shapes[Math.floor(Math.random()*shapes.length)];
      const employees=Math.floor(Math.random()*400);
      addBuilding(x,z,floors,shape,employees,false);
      showToast(`🏢 ${floors}階建て建設！`);
      if(!currentUser)return;
      try{
        const{error}=await db.from('buildings').insert({x,z,floors,style:`${shape}_random`,owner_id:currentUser.id,employees});
        if(error)throw error;
        const{data:ud}=await db.from('users').select('coin_column').eq('id',currentUser.id).single();
        if(ud){const nb=(ud.coin_column||0)+100;await db.from('users').update({coin_column:nb}).eq('id',currentUser.id);document.getElementById('coin-count').textContent=nb;}
      }catch(e){console.warn('保存エラー:',e.message);}
    });

    // グリッドクリック
    scene.onPointerObservable.add((pointerInfo)=>{
      if(isFlying)return;
      if(pointerInfo.type!==BABYLON.PointerEventTypes.POINTERTAP)return;
      const pick=scene.pick(scene.pointerX,scene.pointerY);
      if(!pick.hit||!pick.pickedMesh)return;
      if(pick.pickedMesh.name==='ground'){
        const wp=pick.pickedPoint;
        const{gx,gz}=worldToGrid(wp.x,wp.z);
        if(Math.abs(gx)<=GRID_HALF&&Math.abs(gz)<=GRID_HALF)openLandPanel(gx,gz);
      }
    });

    engine.runRenderLoop(()=>scene.render());
    window.addEventListener('resize',()=>engine.resize());
    (async()=>{await restoreSession();await Promise.all([loadBuildings(),loadLands()]);})();
  </script>
</body>
</html>
