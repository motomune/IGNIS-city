<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IGNIS CITY</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0f; color: #fff; font-family: 'Helvetica Neue', sans-serif; overflow: hidden; }
    #renderCanvas { width: 100vw; height: 100vh; touch-action: none; }

    #ui { position: fixed; top: 0; left: 0; width: 100%; pointer-events: none; z-index: 10; }
    #header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 24px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
    }
    #logo {
      font-size: 20px; font-weight: 900; letter-spacing: 0.2em;
      background: linear-gradient(135deg, #ff6a00, #ee0979);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    #stats { display: flex; gap: 24px; font-size: 13px; color: rgba(255,255,255,0.7); }
    #stats span { font-weight: 700; color: #ff6a00; }
    #user-area { display: flex; align-items: center; gap: 10px; pointer-events: all; }
    #lang-btn {
      background: linear-gradient(135deg, #ff6a00, #ee0979); border: none; color: #fff;
      padding: 5px 14px; border-radius: 20px; font-size: 12px; font-weight: 700; cursor: pointer;
    }
    #lang-btn:hover { opacity: 0.85; }
    #user-name { font-size: 13px; color: rgba(255,255,255,0.8); font-weight: 600; }
    #logout-btn {
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.7); padding: 5px 14px; border-radius: 20px; font-size: 12px; cursor: pointer;
    }
    #logout-btn:hover { background: rgba(255,255,255,0.2); color: #fff; }
    #login-btn-header {
      background: linear-gradient(135deg, #ff6a00, #ee0979); border: none; color: #fff;
      padding: 6px 18px; border-radius: 20px; font-size: 12px; font-weight: 700; cursor: pointer; pointer-events: all;
    }

    #bottom-btns {
      position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 12px; align-items: center; pointer-events: all; z-index: 10;
    }
    #build-btn {
      background: linear-gradient(135deg, #ff6a00, #ee0979); color: #fff; border: none;
      padding: 14px 40px; font-size: 15px; font-weight: 700; letter-spacing: 0.1em;
      border-radius: 40px; cursor: pointer; box-shadow: 0 4px 30px rgba(255,106,0,0.4);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    #build-btn:hover { transform: scale(1.05); box-shadow: 0 8px 40px rgba(255,106,0,0.6); }
    #mode-btn {
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.25); color: #fff;
      padding: 12px 22px; font-size: 13px; font-weight: 700; border-radius: 30px;
      cursor: pointer; transition: background 0.2s; backdrop-filter: blur(6px); white-space: nowrap;
    }
    #mode-btn:hover { background: rgba(255,255,255,0.2); }
    #mode-btn.fly-active {
      background: linear-gradient(135deg, rgba(100,180,255,0.3), rgba(50,120,255,0.3));
      border-color: rgba(100,180,255,0.5); color: #aaddff;
    }

    #fly-hint {
      position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.6); border: 1px solid rgba(100,180,255,0.3);
      color: rgba(200,230,255,0.8); padding: 8px 20px; border-radius: 20px;
      font-size: 12px; font-weight: 600; display: none; z-index: 10;
      pointer-events: none; backdrop-filter: blur(6px); white-space: nowrap;
    }
    #fly-hint.visible { display: block; }

    #loading {
      position: fixed; inset: 0; background: #0a0a0f; display: flex;
      flex-direction: column; align-items: center; justify-content: center; z-index: 100; transition: opacity 0.8s;
    }
    #loading-logo {
      font-size: 36px; font-weight: 900; letter-spacing: 0.3em;
      background: linear-gradient(135deg, #ff6a00, #ee0979);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 24px;
    }
    #loading-bar-wrap { width: 200px; height: 2px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
    #loading-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #ff6a00, #ee0979); border-radius: 2px; transition: width 0.3s; }

    #toast {
      position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
      background: rgba(255,106,0,0.9); color: #fff; padding: 10px 24px;
      border-radius: 20px; font-size: 14px; font-weight: 700; opacity: 0;
      transition: opacity 0.3s; z-index: 25; pointer-events: none; white-space: nowrap;
    }

    #fire-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 201; display: none; }

    /* 土地パネル */
    #land-panel {
      position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
      background: rgba(10,10,20,0.92); border: 1px solid rgba(255,106,0,0.4);
      border-radius: 18px; padding: 20px 28px 18px; min-width: 280px; max-width: 92vw;
      z-index: 15; pointer-events: all; display: none;
      backdrop-filter: blur(12px); box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    }
    #land-panel.open { display: block; }
    #land-panel-close {
      position: absolute; top: 10px; right: 14px; background: none; border: none;
      color: rgba(255,255,255,0.3); font-size: 20px; cursor: pointer;
    }
    #land-panel-close:hover { color: #fff; }
    #land-panel-title { font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.35); letter-spacing: 0.12em; margin-bottom: 5px; }
    #land-panel-coord { font-size: 18px; font-weight: 900; color: #fff; margin-bottom: 8px; }
    #land-panel-owner { font-size: 13px; color: rgba(255,255,255,0.55); margin-bottom: 14px; }
    #land-panel-owner .owner-name { color: #ff6a00; font-weight: 700; }
    #land-panel-building { font-size: 12px; color: rgba(255,255,255,0.4); margin-bottom: 10px; min-height: 16px; }
    .land-panel-btn {
      width: 100%; border: none; color: #fff; padding: 11px; border-radius: 10px;
      font-size: 14px; font-weight: 700; cursor: pointer; transition: opacity 0.2s; margin-top: 8px;
    }
    .land-panel-btn:first-of-type { margin-top: 0; }
    .land-panel-btn:hover { opacity: 0.85; }
    .land-panel-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    #land-buy-btn { background: linear-gradient(135deg, #ff6a00, #ee0979); }
    #land-gacha-btn { background: linear-gradient(135deg, #a855f7, #6366f1); }
    #land-rebuild-btn { background: linear-gradient(135deg, #f59e0b, #ef4444); }

    /* =====================
       ガチャモーダル
    ===================== */
    #gacha-modal {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.85); backdrop-filter: blur(12px);
      z-index: 160; align-items: center; justify-content: center;
    }
    #gacha-modal.open { display: flex; }
    #gacha-box {
      background: #0a0a14; border: 1px solid rgba(168,85,247,0.4); border-radius: 24px;
      padding: 32px 32px 28px; width: 360px; max-width: 94vw; position: relative;
      box-shadow: 0 0 60px rgba(168,85,247,0.2), 0 20px 60px rgba(0,0,0,0.8);
      text-align: center;
    }
    #gacha-modal-close {
      position: absolute; top: 14px; right: 18px; background: none; border: none;
      color: rgba(255,255,255,0.3); font-size: 22px; cursor: pointer;
    }
    #gacha-modal-close:hover { color: #fff; }
    #gacha-title {
      font-size: 22px; font-weight: 900; letter-spacing: 0.1em;
      background: linear-gradient(135deg, #a855f7, #6366f1);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 4px;
    }
    #gacha-coord { font-size: 12px; color: rgba(255,255,255,0.3); margin-bottom: 20px; }

    /* 確率表 */
    .gacha-rates { margin-bottom: 20px; }
    .rate-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 7px 12px; border-radius: 8px; margin-bottom: 4px;
      background: rgba(255,255,255,0.04); font-size: 13px;
    }
    .rate-row .stars { font-weight: 900; }
    .rate-row .floors-range { color: rgba(255,255,255,0.5); font-size: 12px; }
    .rate-row .prob { font-weight: 700; color: #a855f7; }
    .star1 { color: #94a3b8; }
    .star2 { color: #22c55e; }
    .star3 { color: #3b82f6; }
    .star4 { color: #f59e0b; }
    .star5 { color: #ee0979; }

    #gacha-cost-info {
      font-size: 13px; color: rgba(255,255,255,0.5); margin-bottom: 18px;
    }
    #gacha-cost-info span { color: #a855f7; font-weight: 700; }

    #gacha-spin-btn {
      width: 100%; background: linear-gradient(135deg, #a855f7, #6366f1); border: none;
      color: #fff; padding: 14px; border-radius: 12px; font-size: 16px; font-weight: 900;
      cursor: pointer; letter-spacing: 0.05em; transition: opacity 0.2s;
      box-shadow: 0 4px 30px rgba(168,85,247,0.4);
    }
    #gacha-spin-btn:hover { opacity: 0.85; }
    #gacha-spin-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ガチャ演出オーバーレイ */
    #gacha-result-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.92); z-index: 300;
      align-items: center; justify-content: center; flex-direction: column;
    }
    #gacha-result-overlay.show { display: flex; }
    #gacha-result-star {
      font-size: 60px; margin-bottom: 12px;
      animation: starPop 0.5s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes starPop {
      0% { transform: scale(0) rotate(-20deg); opacity: 0; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    #gacha-result-rank {
      font-size: 32px; font-weight: 900; letter-spacing: 0.15em; margin-bottom: 8px;
    }
    #gacha-result-floors {
      font-size: 18px; color: rgba(255,255,255,0.7); margin-bottom: 24px; font-weight: 700;
    }
    #gacha-result-close {
      background: linear-gradient(135deg, #a855f7, #6366f1); border: none; color: #fff;
      padding: 12px 40px; border-radius: 30px; font-size: 15px; font-weight: 700;
      cursor: pointer; transition: opacity 0.2s;
    }
    #gacha-result-close:hover { opacity: 0.85; }

    /* ビル設計モーダル（ガチャ後の形状選択） */
    #build-modal {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.75); backdrop-filter: blur(10px);
      z-index: 150; align-items: center; justify-content: center;
    }
    #build-modal.open { display: flex; }
    #build-box {
      background: #0f0f18; border: 1px solid rgba(255,106,0,0.35); border-radius: 22px;
      padding: 28px 28px 24px; width: 360px; max-width: 94vw; position: relative;
      box-shadow: 0 20px 60px rgba(0,0,0,0.7);
    }
    #build-modal-close {
      position: absolute; top: 14px; right: 18px; background: none; border: none;
      color: rgba(255,255,255,0.3); font-size: 22px; cursor: pointer;
    }
    #build-modal-close:hover { color: #fff; }
    #build-modal-title {
      font-size: 18px; font-weight: 900; letter-spacing: 0.1em;
      background: linear-gradient(135deg, #ff6a00, #ee0979);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 4px;
    }
    #build-modal-info { font-size: 13px; color: rgba(255,255,255,0.4); margin-bottom: 20px; }
    .custom-label {
      font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.4);
      letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 8px;
    }
    .shape-grid { display: flex; gap: 8px; margin-bottom: 22px; }
    .shape-btn {
      flex: 1; background: rgba(255,255,255,0.06); border: 1.5px solid rgba(255,255,255,0.12);
      border-radius: 10px; padding: 10px 4px; text-align: center;
      cursor: pointer; transition: all 0.2s; color: rgba(255,255,255,0.6);
    }
    .shape-btn:hover { background: rgba(255,255,255,0.1); }
    .shape-btn.selected { border-color: #ff6a00; background: rgba(255,106,0,0.15); color: #fff; }
    .shape-btn .shape-icon { font-size: 22px; display: block; margin-bottom: 4px; }
    .shape-btn .shape-name { font-size: 11px; font-weight: 700; }
    #build-confirm-btn {
      width: 100%; background: linear-gradient(135deg, #ff6a00, #ee0979); border: none;
      color: #fff; padding: 13px; border-radius: 10px; font-size: 15px; font-weight: 700;
      cursor: pointer; transition: opacity 0.2s;
    }
    #build-confirm-btn:hover { opacity: 0.85; }
    #build-confirm-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* 認証モーダル */
    #auth-modal {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8);
      backdrop-filter: blur(10px); z-index: 200; align-items: center; justify-content: center;
    }
    #auth-modal.open { display: flex; }
    #auth-box {
      background: #0f0f18; border: 1px solid rgba(255,106,0,0.35); border-radius: 22px;
      padding: 36px 36px 28px; width: 380px; max-width: 92vw;
      box-shadow: 0 20px 60px rgba(0,0,0,0.7); position: relative; overflow: hidden;
    }
    #auth-box::before {
      content: ''; position: absolute; top: -40px; left: 50%; transform: translateX(-50%);
      width: 200px; height: 80px;
      background: radial-gradient(ellipse, rgba(255,106,0,0.2) 0%, transparent 70%); pointer-events: none;
    }
    #auth-header-fire { text-align: center; font-size: 30px; margin-bottom: 4px; animation: fireFlicker 1.5s ease-in-out infinite alternate; }
    @keyframes fireFlicker {
      0%   { filter: brightness(1) drop-shadow(0 0 6px #ff6a00); transform: scaleY(1); }
      50%  { filter: brightness(1.4) drop-shadow(0 0 14px #ff3300); transform: scaleY(1.06); }
      100% { filter: brightness(0.9) drop-shadow(0 0 4px #ff9900); transform: scaleY(0.97); }
    }
    #auth-title {
      font-size: 22px; font-weight: 900; letter-spacing: 0.15em;
      background: linear-gradient(135deg, #ff6a00, #ee0979);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; margin-bottom: 4px;
    }
    #auth-subtitle { font-size: 12px; color: rgba(255,255,255,0.35); text-align: center; margin-bottom: 22px; }
    .auth-tab-wrap { display: flex; margin-bottom: 18px; background: rgba(255,255,255,0.05); border-radius: 10px; padding: 4px; }
    .auth-tab { flex: 1; padding: 8px; text-align: center; font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.4); cursor: pointer; border-radius: 7px; transition: all 0.2s; }
    .auth-tab.active { background: linear-gradient(135deg, #ff6a00, #ee0979); color: #fff; }
    .auth-input-wrap { position: relative; margin-bottom: 10px; }
    .auth-input {
      width: 100%; background: rgba(255,255,255,0.05); border: 1.5px solid rgba(255,255,255,0.1);
      border-radius: 10px; padding: 12px 16px; color: #fff; font-size: 14px; outline: none; transition: border-color 0.25s, box-shadow 0.25s;
    }
    .auth-input::placeholder { color: rgba(255,255,255,0.25); }
    .auth-input:focus { border-color: rgba(255,106,0,0.7) !important; box-shadow: 0 0 12px rgba(255,106,0,0.2) !important; animation: none !important; }
    .auth-input.blink { animation: inputBlink 1.1s ease-in-out infinite; }
    @keyframes inputBlink {
      0%,100% { border-color: rgba(255,80,0,0.45); box-shadow: 0 0 6px rgba(255,80,0,0.15); }
      50%      { border-color: rgba(255,80,0,0.95); box-shadow: 0 0 14px rgba(255,80,0,0.45); }
    }
    .auth-input.done { border-color: #22c55e !important; box-shadow: 0 0 10px rgba(34,197,94,0.3) !important; animation: none !important; }
    #username-field { display: none; }
    #pw-checks { display: none; background: rgba(255,255,255,0.04); border-radius: 10px; padding: 12px 16px; margin-bottom: 12px; flex-direction: column; gap: 7px; }
    #pw-checks.visible { display: flex; }
    .pw-check-item { display: flex; align-items: center; gap: 9px; font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.32); transition: color 0.25s; }
    .pw-check-item.ok { color: #22c55e; }
    .pw-check-item .check-icon { width: 17px; height: 17px; border-radius: 50%; border: 1.5px solid rgba(255,255,255,0.18); display: flex; align-items: center; justify-content: center; font-size: 10px; flex-shrink: 0; transition: all 0.25s; color: transparent; }
    .pw-check-item.ok .check-icon { background: #22c55e; border-color: #22c55e; color: #fff; }
    #auth-submit { width: 100%; background: linear-gradient(135deg, #ff6a00, #ee0979); border: none; color: #fff; padding: 13px; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 2px; transition: opacity 0.2s; }
    #auth-submit:hover { opacity: 0.85; }
    #auth-submit:disabled { opacity: 0.5; cursor: not-allowed; }
    #auth-error { font-size: 12px; margin-top: 10px; text-align: center; min-height: 18px; color: #ff4444; }
    #auth-close { position: absolute; top: 14px; right: 18px; background: none; border: none; color: rgba(255,255,255,0.3); font-size: 22px; cursor: pointer; }
    #auth-close:hover { color: #fff; }

    /* 金・虹アニメーション */
    @keyframes goldShine {
      0%,100% { filter: brightness(1) drop-shadow(0 0 8px #f59e0b); }
      50% { filter: brightness(1.6) drop-shadow(0 0 20px #fbbf24) drop-shadow(0 0 40px #f59e0b); }
    }
    @keyframes rainbowHue {
      0%   { filter: hue-rotate(0deg) brightness(1.3) drop-shadow(0 0 12px #ff0000); }
      25%  { filter: hue-rotate(90deg) brightness(1.3) drop-shadow(0 0 12px #00ff00); }
      50%  { filter: hue-rotate(180deg) brightness(1.3) drop-shadow(0 0 12px #0000ff); }
      75%  { filter: hue-rotate(270deg) brightness(1.3) drop-shadow(0 0 12px #ff00ff); }
      100% { filter: hue-rotate(360deg) brightness(1.3) drop-shadow(0 0 12px #ff0000); }
    }
  </style>
</head>
<body>

  <div id="loading">
    <div id="loading-logo">IGNIS CITY</div>
    <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
  </div>

  <canvas id="renderCanvas"></canvas>
  <canvas id="fire-canvas"></canvas>

  <div id="ui">
    <div id="header">
      <div id="logo">IGNIS CITY</div>
      <div id="stats">
        <span data-i18n="buildings">ビル数</span>&nbsp;<span id="building-count">0</span><span data-i18n="buildings-unit">棟</span>
        &nbsp;|&nbsp;
        <span data-i18n="coins">コイン</span>&nbsp;<span id="coin-count">0</span>
      </div>
      <div id="user-area">
        <button id="lang-btn" onclick="toggleLang()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-1px;">
            <circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/>
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
          </svg>
          <span id="lang-label">EN</span>
        </button>
        <button id="login-btn-header" onclick="openAuthModal()" data-i18n="login-btn">ログイン / 登録</button>
        <div id="logged-in-area" style="display:none; align-items:center; gap:12px;">
          <span id="user-name"></span>
          <button id="logout-btn" onclick="handleLogout()" data-i18n="logout">ログアウト</button>
        </div>
      </div>
    </div>
  </div>

  <div id="fly-hint">🕊 WASD / スワイプで飛行</div>

  <div id="bottom-btns">
    <button id="build-btn" data-i18n="build-btn">＋ ビルを建てる</button>
    <button id="mode-btn" onclick="toggleFlyMode()">🕊 飛行モード</button>
  </div>

  <!-- 土地パネル -->
  <div id="land-panel">
    <button id="land-panel-close" onclick="closeLandPanel()">×</button>
    <div id="land-panel-title">📍 LAND</div>
    <div id="land-panel-coord">-</div>
    <div id="land-panel-owner"></div>
    <div id="land-panel-building"></div>
    <button id="land-buy-btn" class="land-panel-btn" onclick="handleLandBuy()">🔥 この土地を購入（0コイン）</button>
    <button id="land-gacha-btn" class="land-panel-btn" onclick="openGachaModal()" style="display:none;">🎰 ガチャでビルを建てる（50コイン）</button>
    <button id="land-rebuild-btn" class="land-panel-btn" onclick="openGachaModal(true)" style="display:none;">🔄 ガチャで建て替える（50コイン）</button>
  </div>

  <!-- ガチャモーダル -->
  <div id="gacha-modal">
    <div id="gacha-box">
      <button id="gacha-modal-close" onclick="closeGachaModal()">×</button>
      <div id="gacha-title">🎰 ビルガチャ</div>
      <div id="gacha-coord"></div>
      <div class="gacha-rates">
        <div class="rate-row"><span class="stars star5">★★★★★</span><span class="floors-range">48〜50階</span><span class="prob">0.8%</span></div>
        <div class="rate-row"><span class="stars star4">★★★★</span><span class="floors-range">40〜47階</span><span class="prob">2.2%</span></div>
        <div class="rate-row"><span class="stars star3">★★★</span><span class="floors-range">30〜39階</span><span class="prob">17%</span></div>

    function drawFire() {
      fCtx.clearRect(0,0,fireCanvas.width,fireCanvas.height); for(let i=0;i<4;i++) spawnParticle();

        const{data,error}=await db.from('lands').select('grid_x,grid_z,owner_id,users(username)');
        if(error)throw error;
        data.forEach(l=>{const k=landKey(l.grid_x,l.grid_z);const ownerName=l.users?l.users.username:'?';const tile=drawOwnedTile(l.grid_x,l.grid_z,k);landMap[k]={owner_id:l.owner_id,owner_name:ownerName,tile};});
      }catch(e){console.warn('land load error:',e.message);}
    }

    function openLandPanel(gx,gz){
      selectedLandKey=landKey(gx,gz);
      const land=landMap[selectedLandKey],ja=currentLang==='ja';
      document.getElementById('land-panel-coord').textContent=`X:${gx} / Z:${gz}`;
      const ownerEl=document.getElementById('land-panel-owner');
      const buildingEl=document.getElementById('land-panel-building');
      const buyBtn=document.getElementById('land-buy-btn');
      const gachaBtn=document.getElementById('land-gacha-btn');
      const rebuildBtn=document.getElementById('land-rebuild-btn');

      // ビルがあるかチェック
      const building=buildingMap[selectedLandKey];

      if(land){
        const isMe=currentUser&&land.owner_id===currentUser.id;
        ownerEl.innerHTML=ja?`オーナー：<span class="owner-name">@${land.owner_name}</span>`:`Owner: <span class="owner-name">@${land.owner_name}</span>`;
        if(building){
          const colorInfo=getColorByEmployees(building.employees||0);
          buildingEl.textContent=`${building.totalFloors}階 | 従業員 ${building.employees||0}人 ${colorInfo.label}`;
        } else { buildingEl.textContent=''; }
        if(isMe){
          buyBtn.style.display='none';
          if(building){ gachaBtn.style.display='none'; rebuildBtn.style.display='block'; }
          else { gachaBtn.style.display='block'; rebuildBtn.style.display='none'; }
        } else {
          buyBtn.style.display='block';buyBtn.textContent=ja?'🔒 購入済みの土地です':'🔒 Already owned';buyBtn.disabled=true;
          gachaBtn.style.display='none';rebuildBtn.style.display='none';
        }
      } else {
        ownerEl.textContent=ja?'空き地（未購入）':'Empty lot';
        buildingEl.textContent='';
        buyBtn.style.display='block';buyBtn.textContent=ja?`🔥 この土地を購入（${LAND_COST===0?'無料':LAND_COST+'コイン'}）`:`🔥 Buy this land (${LAND_COST===0?'Free':LAND_COST+' coins'})`;
        buyBtn.disabled=false;gachaBtn.style.display='none';rebuildBtn.style.display='none';
      }
      showHighlight(gx,gz,!!land);
      document.getElementById('land-panel').classList.add('open');
    }

    function closeLandPanel(){document.getElementById('land-panel').classList.remove('open');hideHighlight();selectedLandKey=null;}

    async function handleLandBuy(){
      if(!currentUser){closeLandPanel();openAuthModal();showToast(currentLang==='ja'?'ログインが必要です':'Login required');return;}
      const{gx,gz}=keyToCoord(selectedLandKey),ja=currentLang==='ja';
      const buyBtn=document.getElementById('land-buy-btn');
      buyBtn.disabled=true;buyBtn.textContent=ja?'処理中...':'Processing...';
      try{
        const{data:ud}=await db.from('users').select('coin_column,username').eq('id',currentUser.id).single();
        if(LAND_COST>0&&(!ud||(ud.coin_column||0)<LAND_COST)){showToast(ja?`コインが足りません`:` Not enough coins`);buyBtn.disabled=false;buyBtn.textContent=ja?'🔥 この土地を購入':'🔥 Buy land';return;}
        const{error:landErr}=await db.from('lands').insert({grid_x:gx,grid_z:gz,owner_id:currentUser.id});
        if(landErr)throw landErr;
        if(LAND_COST>0){const newCoins=(ud.coin_column||0)-LAND_COST;await db.from('users').update({coin_column:newCoins}).eq('id',currentUser.id);document.getElementById('coin-count').textContent=newCoins;}
        const tile=drawOwnedTile(gx,gz,selectedLandKey);
        landMap[selectedLandKey]={owner_id:currentUser.id,owner_name:(ud&&ud.username)||'?',tile};
        showToast(ja?'🏡 土地を取得しました！':'🏡 Land acquired!');
        openLandPanel(gx,gz);
      }catch(e){console.warn('land buy error:',e.message);showToast(ja?'購入に失敗しました':'Failed');buyBtn.disabled=false;buyBtn.textContent=ja?'🔥 この土地を購入':'🔥 Buy land';}
    }

    // =====================
    // ガチャシステム
    // =====================
    let gachaState = { result: null, isRebuild: false, landKey: null };

    function openGachaModal(isRebuild=false){
      if(!selectedLandKey)return;
      gachaState.isRebuild=isRebuild;
      gachaState.landKey=selectedLandKey;
      const{gx,gz}=keyToCoord(selectedLandKey);
      document.getElementById('gacha-coord').textContent=`X:${gx} / Z:${gz}`;
      closeLandPanel();
      document.getElementById('gacha-modal').classList.add('open');
    }
    function closeGachaModal(){document.getElementById('gacha-modal').classList.remove('open');}

    async function handleGachaSpin(){
      if(!currentUser)return;
      const ja=currentLang==='ja';
      const btn=document.getElementById('gacha-spin-btn');

      // コインチェック
      const{data:ud}=await db.from('users').select('coin_column').eq('id',currentUser.id).single();
      const balance=ud?ud.coin_column||0:0;
      if(balance<GACHA_COST){showToast(ja?`コインが足りません（必要：${GACHA_COST}）`:`Not enough coins (need ${GACHA_COST})`);return;}

      btn.disabled=true;btn.textContent=ja?'抽選中...':'Rolling...';

      // コイン消費
      const newCoins=balance-GACHA_COST;
      await db.from('users').update({coin_column:newCoins}).eq('id',currentUser.id);
      document.getElementById('coin-count').textContent=newCoins;

      // 抽選
      const result=rollGacha();
      gachaState.result=result;

      // 演出
      closeGachaModal();
      showGachaResult(result);

      btn.disabled=false;btn.textContent='🎰 ガチャを回す';
    }

    function showGachaResult(result){
      const starEmojis={5:'🌟',4:'💫',3:'⭐',2:'✨',1:'☆'};
      const starColors={5:'#ee0979',4:'#f59e0b',3:'#3b82f6',2:'#22c55e',1:'#94a3b8'};
      const overlay=document.getElementById('gacha-result-overlay');
      document.getElementById('gacha-result-star').textContent=starEmojis[result.star]||'⭐';
      const rankEl=document.getElementById('gacha-result-rank');
      rankEl.textContent=result.label;
      rankEl.style.color=starColors[result.star]||'#fff';
      document.getElementById('gacha-result-floors').textContent=`${result.floors}階建てのビルをGET！`;
      overlay.classList.add('show');
    }

    function onGachaResultClose(){
      document.getElementById('gacha-result-overlay').classList.remove('show');
      // 形状選択モーダルへ
      openBuildModal();
    }

    // =====================
    // 建設モーダル（形状選択）
    // =====================
    let selectedShape='box';

    function selectShape(el){
      selectedShape=el.getAttribute('data-shape');
      document.querySelectorAll('.shape-btn').forEach(b=>b.classList.remove('selected'));
      el.classList.add('selected');
    }

    function openBuildModal(){
      if(!gachaState.result)return;
      selectedShape='box';
      document.querySelectorAll('.shape-btn').forEach((b,i)=>b.classList.toggle('selected',i===0));
      const{floors,label}=gachaState.result;
      document.getElementById('build-modal-info').textContent=`${label}　${floors}階建て`;
      document.getElementById('build-modal').classList.add('open');
    }
    function closeBuildModal(){document.getElementById('build-modal').classList.remove('open');}

    const SHAPES={box:{w:5.5,d:5.5},slim:{w:3.0,d:3.0},wide:{w:8.0,d:8.0},cylinder:{w:5.0,d:5.0}};

    async function handleBuildConfirm(){
      if(!gachaState.result||!gachaState.landKey||!currentUser)return;
      const{gx,gz}=keyToCoord(gachaState.landKey);
      const{floors}=gachaState.result;
      const ja=currentLang==='ja';
      const btn=document.getElementById('build-confirm-btn');
      btn.disabled=true;btn.textContent=ja?'建設中...':'Building...';

      try{
        // 既存ビルの取得（建て替えの場合は従業員数を引き継ぎ）
        let employees=0;
        const existingBuilding=buildingMap[gachaState.landKey];
        if(gachaState.isRebuild&&existingBuilding){
          employees=existingBuilding.employees||0;
          // 既存ビルをDBから削除
          await db.from('buildings').delete().eq('x',gx).eq('z',gz).eq('owner_id',currentUser.id);
          // 3Dメッシュ削除
          if(existingBuilding.mesh){existingBuilding.mesh.dispose();}
          delete buildingMap[gachaState.landKey];
          buildings=buildings.filter(b=>b.landKey!==gachaState.landKey);
          document.getElementById('building-count').textContent=buildings.length;
        }

        const styleKey=`${selectedShape}_gacha`;
        const{error}=await db.from('buildings').insert({x:gx,z:gz,floors,style:styleKey,owner_id:currentUser.id,employees});
        if(error)throw error;

        // 3Dビル追加
        addBuilding(gx,gz,floors,selectedShape,employees,false,gachaState.landKey);
        closeBuildModal();

        const colorInfo=getColorByEmployees(employees);
        showToast(ja?`🏢 ${floors}階建て完成！${colorInfo.label}`:`🏢 ${floors}F built! ${colorInfo.label}`);
        gachaState={result:null,isRebuild:false,landKey:null};

      }catch(e){console.warn('build error:',e.message);showToast(ja?'建設に失敗しました':'Build failed');}
      finally{btn.disabled=false;btn.textContent=ja?'🏢 建設する':'🏢 Build';}
    }

    // =====================
    // ビル管理
    // =====================
    let buildings=[];
    const buildingMap={}; // landKey -> building data

    function addBuilding(x,z,baseFloors,shape='box',employees=0,fromDB=false,lKey=null){
      const totalFloors=calcTotalFloors(baseFloors,employees);
      const height=totalFloors*0.5;
      const w=SHAPES[shape]?.w||5.5;
      const d=SHAPES[shape]?.d||5.5;
      let mesh;
      if(shape==='cylinder'){
        mesh=BABYLON.MeshBuilder.CreateCylinder('b_'+Date.now(),{height,diameter:w,tessellation:16},scene);
      } else {
        mesh=BABYLON.MeshBuilder.CreateBox('b_'+Date.now(),{width:w,height,depth:d},scene);
      }
      mesh.position=new BABYLON.Vector3(x,height/2,z);

      const mat=new BABYLON.StandardMaterial('bm_'+Date.now(),scene);
      const colorInfo=getColorByEmployees(employees);
      mat.diffuseColor=new BABYLON.Color3(colorInfo.r,colorInfo.g,colorInfo.b);
      mat.specularColor=new BABYLON.Color3(0.5,0.5,0.7);

      // 金・虹はemissiveで光らせる
      if(colorInfo.name==='gold'){
        mat.emissiveColor=new BABYLON.Color3(0.3,0.2,0.0);
      } else if(colorInfo.name==='rainbow'){
        mat.emissiveColor=new BABYLON.Color3(0.2,0.0,0.2);
      }
      mesh.material=mat;

      const key=lKey||landKey(x,z);
      const buildingData={x,z,baseFloors,totalFloors,shape,employees,mesh,landKey:key};
      buildings.push(buildingData);
      buildingMap[key]=buildingData;
      document.getElementById('building-count').textContent=buildings.length;
    }

    async function loadBuildings(){
      try{
        const{data,error}=await db.from('buildings').select('*');
        if(error)throw error;
        data.forEach(b=>{
          let shape='box';
          if(b.style&&b.style!=='default'){const parts=b.style.split('_');if(parts.length>=1)shape=parts[0];}
          addBuilding(b.x,b.z,b.floors,shape,b.employees||0,true);
        });
      }catch(e){
        console.warn('Supabase error:',e.message);
        [[0,0,20,'box',0],[10,5,35,'slim',30],[-8,12,15,'wide',100],[15,-10,50,'cylinder',300],[-15,-5,28,'box',1000]].forEach(([x,z,f,s,emp])=>addBuilding(x,z,f,s,emp,true));
      }
      finishLoading();
    }

    // ランダム建設ボタン（デモ用）
    document.getElementById('build-btn').addEventListener('click',async()=>{
      const x=(Math.floor(Math.random()*20)-10)*CELL,z=(Math.floor(Math.random()*20)-10)*CELL;
      const floors=Math.floor(Math.random()*50)+5;
      const shapes=Object.keys(SHAPES);
      const shape=shapes[Math.floor(Math.random()*shapes.length)];
      const employees=Math.floor(Math.random()*200);
      addBuilding(x,z,floors,shape,employees,false);
      showToast(currentLang==='ja'?`🏢 ${floors}階建て建設！`:`🏢 ${floors}F built!`);
      if(!currentUser)return;
      try{
        const{error}=await db.from('buildings').insert({x,z,floors,style:`${shape}_random`,owner_id:currentUser.id,employees});
        if(error)throw error;
        const{data:ud}=await db.from('users').select('coin_column').eq('id',currentUser.id).single();
        if(ud){const nb=(ud.coin_column||0)+100;await db.from('users').update({coin_column:nb}).eq('id',currentUser.id);document.getElementById('coin-count').textContent=nb;}
      }catch(e){console.warn('保存エラー:',e.message);}
    });

    // グリッドクリック
    scene.onPointerObservable.add((pointerInfo)=>{
      if(isFlying)return;
      if(pointerInfo.type!==BABYLON.PointerEventTypes.POINTERTAP)return;
      const pick=scene.pick(scene.pointerX,scene.pointerY);
      if(!pick.hit||!pick.pickedMesh)return;
      if(pick.pickedMesh.name==='ground'){
        const wp=pick.pickedPoint;
        const{gx,gz}=worldToGrid(wp.x,wp.z);
        if(Math.abs(gx)<=GRID_HALF&&Math.abs(gz)<=GRID_HALF)openLandPanel(gx,gz);
      }
    });

    engine.runRenderLoop(()=>scene.render());
    window.addEventListener('resize',()=>engine.resize());

    (async()=>{await restoreSession();await Promise.all([loadBuildings(),loadLands()]);})();
  </script>
</body>
</html>
