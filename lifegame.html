<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<title>人生の灯 / Embers of a Life — IGNIS CITY</title>
<style>
  :root{
    --bg:#07070d; --bg2:#0e0e18; --panel:#14141f; --panel2:#1b1b29;
    --line:#2a2a3d; --txt:#f3efe9; --sub:#a9a6b8; --dim:#6f6c80;
    --fire:#ff8a3d; --mag:#ff3da1; --good:#46d39a; --bad:#ff6b6b;
    --money:#ffce4f; --trust:#7cc4ff; --health:#ff7a8a; --mind:#b58cff; --bond:#5be0c0;
    --accent:linear-gradient(90deg,#ff8a3d,#ff3da1);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%;}
  body{
    background:radial-gradient(1200px 700px at 50% -10%, #16101c 0%, var(--bg) 55%) fixed;
    color:var(--txt);
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    line-height:1.7;
    overflow:hidden;
  }
  #app{
    height:100%; height:100dvh;
    display:flex; flex-direction:column;
    max-width:760px; margin:0 auto;
    padding:max(10px,env(safe-area-inset-top)) 14px max(12px,env(safe-area-inset-bottom));
  }
  /* 広い/横長画面：中央から左＝ステータス、右＝物語/質問・ボード の2カラム */
  @media (min-width:680px){
    #app{ max-width:1000px; display:grid; column-gap:16px;
      grid-template-columns:minmax(150px,30%) 1fr; grid-template-rows:auto minmax(0,1fr) auto;
      grid-template-areas:"head head" "stats scene" "prog prog"; }
    #app>header{ grid-area:head; }
    #app>#stats{ grid-area:stats; grid-template-columns:1fr !important; align-content:start;
      margin-bottom:0; overflow-y:auto; min-height:0; }
    #app>#scene{ grid-area:scene; min-height:0; }
    #app>#progress{ grid-area:prog; }
  }
  /* ---- header ---- */
  header{display:flex; align-items:center; gap:10px; padding:4px 2px 8px; flex-shrink:0;}
  .logo{font-weight:800; letter-spacing:.04em; font-size:clamp(14px,3.6vw,17px);
    background:var(--accent); -webkit-background-clip:text; background-clip:text; color:transparent; white-space:nowrap;}
  .logo small{display:block; font-size:10px; letter-spacing:.18em; color:var(--dim); -webkit-text-fill-color:var(--dim); margin-top:1px;}
  .spacer{flex:1;}
  .iconbtn{
    background:var(--panel); border:1px solid var(--line); color:var(--txt);
    border-radius:10px; padding:7px 11px; font-size:12px; cursor:pointer; min-height:36px;
    display:inline-flex; align-items:center; gap:5px; transition:.15s;
  }
  .iconbtn:hover{border-color:var(--fire);}
  /* ---- stats ---- */
  #stats{display:grid; grid-template-columns:repeat(5,1fr); gap:6px; flex-shrink:0; margin-bottom:8px;}
  .stat{background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:6px 5px 7px; text-align:center;}
  .stat .ico{font-size:15px; line-height:1;}
  .stat .lbl{font-size:9px; color:var(--sub); margin:2px 0 4px; letter-spacing:.02em;}
  .bar{height:5px; border-radius:4px; background:#000; overflow:hidden;}
  .bar > i{display:block; height:100%; width:50%; border-radius:4px; transition:width .5s cubic-bezier(.2,.7,.2,1);}
  .stat .num{font-size:10px; color:var(--dim); margin-top:3px;}
  /* enlarged board status (top bars during sugoroku) */
  #stats.big-stats .ico{font-size:19px;}
  #stats.big-stats .lbl{font-size:12px; margin:3px 0 5px;}
  #stats.big-stats .num{font-size:15px; font-weight:800; color:var(--txt);}
  #stats.big-stats .bar{height:7px;}
  .s-money .bar>i{background:var(--money);} .s-trust .bar>i{background:var(--trust);}
  .s-health .bar>i{background:var(--health);} .s-mind .bar>i{background:var(--mind);}
  .s-bond .bar>i{background:var(--bond);}
  .flash{animation:flash .9s ease;}
  @keyframes flash{0%{filter:brightness(2.2);} 100%{filter:none;}}
  /* ---- scene ---- */
  #scene{
    flex:1; min-height:0; overflow-y:auto; -webkit-overflow-scrolling:touch;
    background:linear-gradient(180deg,var(--panel),var(--bg2));
    border:1px solid var(--line); border-radius:16px; padding:18px 16px 16px;
    display:flex; flex-direction:column;
  }
  .chapter-tag{font-size:11px; letter-spacing:.16em; color:var(--fire); text-transform:uppercase; margin-bottom:8px;}
  .scene-title{font-size:clamp(17px,4.6vw,22px); font-weight:800; margin:0 0 12px; line-height:1.4;}
  .scene-body{font-size:clamp(14px,3.7vw,15.5px); color:#e7e2da; white-space:pre-wrap; margin:0 0 4px;}
  .scene-body.result{color:var(--sub); border-left:3px solid var(--line); padding-left:12px; margin-top:14px;}
  .deltas{display:flex; flex-wrap:wrap; gap:6px; margin-top:12px;}
  .delta{font-size:11px; font-weight:700; border-radius:999px; padding:3px 9px; border:1px solid var(--line); background:#0008;}
  .delta.up{color:var(--good);} .delta.down{color:var(--bad);}
  .choices{margin-top:auto; padding-top:16px; display:flex; flex-direction:column; gap:9px;}
  .choice{
    text-align:left; background:var(--panel2); border:1px solid var(--line); color:var(--txt);
    border-radius:12px; padding:12px 14px; font-size:clamp(13.5px,3.6vw,15px); cursor:pointer;
    transition:.15s; position:relative; line-height:1.5;
  }
  .choice:hover{border-color:var(--fire); transform:translateY(-1px); background:#222031;}
  .choice .hint{display:block; font-size:11px; color:var(--dim); margin-top:3px;}
  .ch-letter{display:inline-flex; align-items:center; justify-content:center; width:20px; height:20px; min-width:20px;
    border-radius:6px; margin-right:9px; font-size:11px; font-weight:800; color:#1a0a05;
    background:linear-gradient(135deg,#ff8a3d,#ff3da1); vertical-align:middle;}
  .ch-letter:empty{display:none;}
  .btn-primary{
    background:var(--accent); border:none; color:#1a0a05; font-weight:800;
    border-radius:12px; padding:14px; font-size:15px; cursor:pointer; width:100%;
    box-shadow:0 6px 22px -8px var(--mag); transition:.15s;
  }
  .btn-primary:hover{filter:brightness(1.08);}
  .btn-ghost{background:transparent; border:1px solid var(--line); color:var(--sub); border-radius:12px; padding:12px; font-size:14px; cursor:pointer; width:100%;}
  .btn-skip{width:100%; border-radius:12px; padding:13px; font-size:14px; font-weight:800; cursor:pointer;
    color:#fff; border:1px solid var(--mag); background:linear-gradient(90deg,#3a1830,#5a1f3e);
    box-shadow:0 0 16px -4px var(--mag); position:relative; overflow:hidden;}
  .btn-skip::after{content:''; position:absolute; top:0; left:-60%; width:40%; height:100%;
    background:linear-gradient(90deg,transparent,#ffffff55,transparent); transform:skewX(-20deg); animation:skipSheen 2.6s ease-in-out infinite;}
  @keyframes skipSheen{0%{left:-60%;} 55%,100%{left:130%;}}
  .btn-skip:hover{filter:brightness(1.12);}
  .btn-resume{width:100%; border-radius:12px; padding:13px; font-size:14px; font-weight:800; cursor:pointer;
    color:#fff; border:1px solid var(--fire); background:linear-gradient(90deg,#3a2410,#5a3a14); box-shadow:0 0 16px -4px var(--fire);}
  .btn-resume:hover{filter:brightness(1.1);}
  .btn-again{width:100%; border-radius:12px; padding:14px; font-size:15px; font-weight:800; cursor:pointer;
    color:#1a0a05; border:none; background:linear-gradient(90deg,#ffce4f,#ff8a3d); box-shadow:0 6px 20px -8px #ffce4f;}
  .btn-again:hover{filter:brightness(1.07);}
  .btn-ghost:hover{border-color:var(--fire); color:var(--txt);}
  /* ---- title / result centered ---- */
  .center{align-items:center; text-align:center; justify-content:center;}
  .center .scene-body{text-align:center;}
  .big-emoji{font-size:54px; line-height:1; margin-bottom:6px; filter:drop-shadow(0 0 24px #ff3da155);}
  .ending-name{font-size:clamp(22px,6vw,30px); font-weight:900; background:var(--accent); -webkit-background-clip:text; background-clip:text; color:transparent; margin:6px 0 2px;}
  .coin-box{margin:18px 0 6px; padding:14px 18px; border:1px solid var(--fire); border-radius:14px; background:#1a120a; min-width:200px;}
  .coin-box .amt{font-size:34px; font-weight:900; color:var(--money);}
  .coin-box .cap{font-size:11px; color:var(--dim); margin-top:4px;}
  .carve{margin:16px 0; padding:14px 16px; border-left:3px solid var(--mag); background:#0008; border-radius:0 10px 10px 0; font-style:italic; color:#f0e6dd; font-size:clamp(14px,3.9vw,16px);}
  .carve small{display:block; font-style:normal; color:var(--dim); font-size:10px; letter-spacing:.16em; margin-bottom:5px;}
  .grant-line{font-size:13px; margin-top:10px; min-height:18px;}
  .grant-ok{color:var(--good);} .grant-no{color:var(--sub);}
  .actions{display:flex; flex-direction:column; gap:9px; width:100%; max-width:340px; margin-top:18px;}
  .muted{color:var(--dim); font-size:12px;}
  /* progress dots */
  #progress{display:flex; gap:5px; justify-content:center; padding:8px 0 2px; flex-shrink:0;}
  #progress i{width:7px; height:7px; border-radius:50%; background:var(--line);}
  #progress i.done{background:var(--fire);}
  #progress i.now{background:var(--mag); box-shadow:0 0 8px var(--mag);}
  .fade{animation:fade .35s ease;}
  @keyframes fade{from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:none;}}
  /* ---- board phase ---- */
  #board-hud{display:grid; grid-template-columns:repeat(4,1fr); gap:6px; margin-bottom:10px;}
  .hud{background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:6px 4px; text-align:center;}
  .hud .hl{font-size:9px; color:var(--sub); letter-spacing:.02em;}
  .hud .hv{font-size:clamp(13px,3.4vw,15px); font-weight:800; margin-top:2px;}
  .hud .hv small{font-size:9px; color:var(--dim); font-weight:600;}
  .hud.cash .hv{color:var(--money);} .hud.cash.neg .hv{color:var(--bad);}
  /* ---- 3D board track (perspective road of raised blocks) ---- */
  #board-track{
    overflow-x:auto; overflow-y:hidden; padding:38px 10px 18px; flex-shrink:0;
    -webkit-overflow-scrolling:touch; scrollbar-width:thin; perspective:760px;
    background:linear-gradient(180deg,#0c0c16 0%,#07070d 100%);
    border-radius:14px; border:1px solid #1c1c2c; box-shadow:inset 0 14px 30px -16px #000, inset 0 -10px 24px -14px #000;
  }
  #board-track::-webkit-scrollbar{height:6px;}
  #board-track::-webkit-scrollbar-thumb{background:var(--line); border-radius:3px;}
  .track-rail{
    display:flex; gap:11px; width:max-content; transform:rotateX(26deg); transform-style:preserve-3d;
    transform-origin:center bottom; padding:6px 8px 4px;
  }
  .tile{
    position:relative; flex:0 0 auto; width:50px; height:50px; border-radius:11px;
    display:flex; align-items:center; justify-content:center;
    font-size:22px; border:1px solid var(--line); background:var(--panel2); line-height:1;
    transform-style:preserve-3d; transition:transform .25s;
    box-shadow:0 7px 0 #00000080, 0 9px 8px -2px #000a;   /* extruded block depth */
  }
  .tile .ti{font-size:8px; color:var(--dim); position:absolute; top:2px; left:5px; transform:translateZ(1px);}
  .t-salary{background:linear-gradient(160deg,#274015,#16240c); border-color:#3c5a1e;}
  .t-good{background:linear-gradient(160deg,#15402f,#0c2218); border-color:#1e5a44;}
  .t-bad{background:linear-gradient(160deg,#401a1a,#240e0e); border-color:#5a1e1e;}
  .t-bonus{background:linear-gradient(160deg,#403515,#241f0c); border-color:#5a4a1e;}
  .t-event{background:linear-gradient(160deg,#2c2147,#160f24); border-color:#43306a;}
  .t-encounter{background:linear-gradient(160deg,#153642,#0c1e24); border-color:#1e4a5a;}
  .t-illness{background:linear-gradient(160deg,#3f1a2c,#240f18); border-color:#5a1e3a;}
  .t-branch{background:linear-gradient(160deg,#342147,#1a1024); border-color:#5a3d6a;}
  .t-rest{background:linear-gradient(160deg,#24243a,#13131f); border-color:#33334a;}
  .t-setback{background:linear-gradient(160deg,#401a26,#240e15); border-color:#5a1e2e;}
  .t-goal{background:linear-gradient(135deg,#ff8a3d,#ff3da1); border:none; color:#1a0a05; font-size:24px;
    box-shadow:0 7px 0 #7a1f3d, 0 12px 14px -2px #000, 0 0 22px -2px var(--mag);}
  .tile.here{transform:translateY(-13px) translateZ(22px) scale(1.1);
    box-shadow:0 16px 0 #00000080, 0 22px 20px -4px #000, 0 0 0 2px var(--fire), 0 0 22px var(--fire);}
  .tile .token{position:absolute; top:-26px; left:50%; transform:translateX(-50%) translateZ(8px); font-size:28px;
    filter:drop-shadow(0 6px 5px #000c); animation:tokenBob 1.1s ease-in-out infinite;}
  @keyframes tokenBob{0%,100%{transform:translateX(-50%) translateZ(8px) translateY(0);} 50%{transform:translateX(-50%) translateZ(8px) translateY(-5px);}}
  #board-stage{margin-top:auto; padding-top:8px;}
  .die{font-size:54px; line-height:1; text-align:center; color:var(--fire); filter:drop-shadow(0 0 16px var(--fire));}
  .board-msg{font-size:clamp(13.5px,3.6vw,15px); color:#e7e2da; white-space:pre-wrap;}
  .board-msg .mh{font-weight:800; font-size:clamp(15px,4vw,18px); margin:0 0 6px; color:var(--txt);}
  .comp{display:inline-flex; gap:2px; align-items:center;}
  #sound-btn.off{opacity:.5;}
  /* ambient ember background */
  #embers{position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden;}
  #embers i{position:absolute; bottom:-12px; width:5px; height:5px; border-radius:50%;
    background:radial-gradient(circle,#ffb060,#ff3da1); filter:blur(1px); opacity:0; animation:emberRise linear infinite;}
  @keyframes emberRise{0%{transform:translateY(0) translateX(0) scale(1); opacity:0;} 12%{opacity:.55;}
    90%{opacity:.25;} 100%{transform:translateY(-102vh) translateX(var(--dx,0)) scale(.4); opacity:0;}}
  #app{position:relative; z-index:1;}
  /* avatar (you) — ages & reacts */
  #avatar{font-size:22px; line-height:1; width:38px; height:38px; min-width:38px; border-radius:10px;
    display:flex; align-items:center; justify-content:center; background:var(--panel); border:1px solid var(--line);
    filter:drop-shadow(0 0 6px #ff8a3d55); transition:transform .2s;}
  #avatar.faceR{transform:scaleX(-1);}  /* すごろく中は進行方向（右）を向く */
  #avatar.bump{animation:avBump .5s ease;}
  @keyframes avBump{0%{transform:scale(1);} 40%{transform:scale(1.35) rotate(-6deg);} 100%{transform:scale(1);}}
  /* floating +/- stat & cash pops */
  .stat{position:relative;} .hud{position:relative;}
  .pop{position:absolute; top:-8px; right:5px; font-size:11px; font-weight:800; pointer-events:none; z-index:5;
    text-shadow:0 1px 4px #000, 0 0 6px currentColor; animation:popUp 1.25s ease-out forwards;}
  .pop.up{color:var(--good);} .pop.down{color:var(--bad);}
  @keyframes popUp{0%{opacity:0; transform:translateY(9px) scale(.8);} 18%{opacity:1; transform:translateY(0) scale(1.1);} 100%{opacity:0; transform:translateY(-20px) scale(1);}}
  /* ---- 3D dice ---- */
  .dice-area{display:flex; flex-direction:column; align-items:center; gap:4px; padding:6px 0 2px;}
  .dice-scene{width:64px; height:64px; perspective:300px;}
  .cube{position:relative; width:64px; height:64px; transform-style:preserve-3d; transition:transform 1s cubic-bezier(.2,.9,.25,1);}
  .cube.tumble{transition:transform .9s cubic-bezier(.3,.7,.3,1.2);}
  .face{position:absolute; width:64px; height:64px; border-radius:12px;
    background:linear-gradient(150deg,#fff,#ffe6d2); border:1px solid #e0b48a;
    display:grid; grid-template-columns:repeat(3,1fr); grid-template-rows:repeat(3,1fr);
    padding:9px; box-shadow:inset 0 0 10px #d59a6a55;}
  .pip{width:11px; height:11px; border-radius:50%; background:#b3361f; align-self:center; justify-self:center; box-shadow:0 1px 1px #0006;}
  .f1{transform:translateZ(32px);} .f2{transform:rotateY(90deg) translateZ(32px);}
  .f3{transform:rotateY(180deg) translateZ(32px);} .f4{transform:rotateY(-90deg) translateZ(32px);}
  .f5{transform:rotateX(90deg) translateZ(32px);} .f6{transform:rotateX(-90deg) translateZ(32px);}
  /* pip layouts via grid positions */
  .p-tl{grid-area:1/1;} .p-tc{grid-area:1/2;} .p-tr{grid-area:1/3;}
  .p-ml{grid-area:2/1;} .p-mc{grid-area:2/2;} .p-mr{grid-area:2/3;}
  .p-bl{grid-area:3/1;} .p-bc{grid-area:3/2;} .p-br{grid-area:3/3;}
  /* ---- central tile-scene演出 (rich themed scenes) ---- */
  #scene{position:relative;}
  #fx-overlay{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
    z-index:20; border-radius:16px; overflow:hidden; --a:#ff8a3d; --p1:#16101f; --p2:#07070d;
    background:radial-gradient(circle at 50% 42%, var(--p1) 0%, var(--p2) 72%); animation:fxFade .35s ease;}
  #fx-overlay::after{content:''; position:absolute; inset:0; pointer-events:none; box-shadow:inset 0 0 120px -20px var(--a); opacity:.5;}
  @keyframes fxFade{from{opacity:0;} to{opacity:1;}}
  .fx-motif{position:absolute; inset:0; overflow:hidden; pointer-events:none;}
  .fx-motif > i{position:absolute; display:block; will-change:transform,opacity;}
  .fx-core{position:relative; display:flex; align-items:center; justify-content:center; width:clamp(130px,40vw,180px); height:clamp(130px,40vw,180px);}
  .fx-ring{position:absolute; inset:0; border-radius:50%; border:2px solid var(--a); opacity:.55;
    box-shadow:0 0 40px -6px var(--a), inset 0 0 30px -10px var(--a); animation:fxRingIn .55s cubic-bezier(.2,1.5,.4,1), fxSpin 9s linear .55s infinite;}
  .fx-ring.r2{inset:14px; border-style:dashed; opacity:.35; animation:fxRingIn .55s cubic-bezier(.2,1.5,.4,1), fxSpin 14s linear .55s infinite reverse;}
  .fx-glow{position:absolute; width:62%; height:62%; border-radius:50%; background:radial-gradient(circle, var(--a) 0%, transparent 70%); opacity:.4; filter:blur(10px); animation:fxPulse 2s ease-in-out infinite;}
  .fx-emoji{font-size:clamp(54px,17vw,92px); line-height:1; position:relative; z-index:2;
    animation:fxPop .5s cubic-bezier(.2,1.7,.4,1), fxFloat 2.6s ease-in-out .5s infinite; filter:drop-shadow(0 4px 18px #000a);}
  .fx-label{margin-top:18px; font-size:clamp(16px,4.6vw,22px); font-weight:800; letter-spacing:.05em; text-align:center; padding:0 16px; max-width:90%;
    color:#fff; text-shadow:0 0 18px var(--a), 0 2px 6px #000; animation:fxRise .5s ease .15s both;}
  @keyframes fxPop{from{transform:scale(.2); opacity:0;} to{transform:scale(1); opacity:1;}}
  @keyframes fxFloat{0%,100%{transform:translateY(0) rotate(-2deg);} 50%{transform:translateY(-9px) rotate(2deg);}}
  @keyframes fxRise{from{opacity:0; transform:translateY(14px);} to{opacity:1; transform:none;}}
  @keyframes fxRingIn{from{transform:scale(.3); opacity:0;} to{transform:scale(1);}}
  @keyframes fxSpin{to{transform:rotate(360deg);}}
  @keyframes fxPulse{0%,100%{opacity:.35; transform:scale(.95);} 50%{opacity:.7; transform:scale(1.08);}}
  @keyframes mFall{0%{transform:translateY(-14vh) rotate(0); opacity:0;} 12%{opacity:1;} 100%{transform:translateY(88vh) rotate(320deg); opacity:.15;}}
  @keyframes mRain{0%{transform:translateY(-16vh); opacity:0;} 14%{opacity:.85;} 100%{transform:translateY(92vh); opacity:0;}}
  @keyframes mRise{0%{transform:translateY(12vh) scale(.6); opacity:0;} 18%{opacity:1;} 100%{transform:translateY(-72vh) scale(1); opacity:0;}}
  @keyframes mTwinkle{0%,100%{opacity:0; transform:scale(.4);} 50%{opacity:1; transform:scale(1.15);}}
  @keyframes mDrift{0%{transform:translate(0,0) scale(.8); opacity:0;} 30%{opacity:.5;} 100%{transform:translate(var(--dx),var(--dy)) scale(1.3); opacity:0;}}
  /* landscape phones: compress everything so the dice/roll button stays on screen */
  @media (max-height:480px){
    #app{padding:5px 12px;}
    header{padding:2px 2px 3px;}
    .die{font-size:30px;}
    .logo{font-size:13px;} .logo small{display:none;}
    #avatar{width:30px; height:30px; min-width:30px; font-size:18px;}
    .iconbtn{min-height:30px; padding:5px 8px; font-size:11px;}
    #stats{margin-bottom:5px;} .stat{padding:4px 4px;}
    #stats .lbl{display:none;} #stats.big-stats .lbl{display:none;}
    #stats.big-stats .num{font-size:12px;} #stats.big-stats .ico{font-size:15px;} #stats.big-stats .bar{height:5px;}
    .scene-title{margin-bottom:8px;}
    #scene{padding:10px 14px;}
    #board-hud{margin-bottom:5px; gap:5px;} .hud{padding:4px 3px;} .hud .hv{font-size:12px;} #board-hud .hl{display:none;}
    #board-track{padding:24px 8px 8px; perspective:620px;}
    .track-rail{transform:rotateX(15deg); gap:8px;}
    .tile{width:34px; height:34px; font-size:15px; box-shadow:0 5px 0 #00000080, 0 7px 7px -2px #000a;}
    .tile .token{top:-22px; font-size:22px;}

function decideEnding(){
  const {money,trust,health,mind,bond} = S;
  if(trust>=70 && quality>=6) return 'redeemer';
  if(mind>=58 && bond>=52) return 'reborn';
  if(mind<=22 || bond<=14) return 'lonely';
  if(money>=58 && health>=52) return 'quiet_peace';
  return 'survivor';
}

/* coin formula — driven by how you lived, not luck. cap 30. */
function calcCoins(endingId){
  let c = 5;
  c += Math.floor((S.mind + S.bond) / 16);          // heart + bonds (≈ up to 12)
  c += Math.floor(Math.max(0, S.money - 30) / 24);   // some self-reliance
  c += Math.min(8, quality);                          // good choices (0..8)
  c += ENDINGS[endingId].bonus;                       // ending bonus
  return Math.max(5, Math.min(30, Math.round(c)));
}

/* =========================================================================
   FLOW
   ========================================================================= */
function buildRun(){
  // お金（所持金/cash）は前回からの引き継ぎ（board.cash → gsave.carry）で反映。
  // それ以外のステータスは毎回30からスタート。
  S = {money:30, trust:30, health:30, mind:30, bond:30};
  quality = 0; bonusAllies = 0; storyDebt = 0;
  const a1 = shuffle(ACT1).slice(0,2);
  const a2 = shuffle(ACT2).slice(0, 3); // 3 trials → more of life's big upheavals each run
  const a3 = shuffle(ACT3).slice(0,2);
  picks = [...a1, ...a2, ...a3];
  totalChapters = picks.length;
  chapterIndex = 0;
}

const scene = () => document.getElementById('scene');
const statsEl = () => document.getElementById('stats');

function renderStats(changed){
  const el = statsEl(); el.setAttribute('aria-hidden','false');
  el.style.gridTemplateColumns='repeat(5,1fr)';
  el.classList.remove('big-stats');
  el.innerHTML = STAT_KEYS.map(k=>{
    const m = STAT_META[k];
    const d = changed && changed[k];
    const pop = d ? `<span class="pop ${d>0?'up':'down'}">${d>0?'▲+':'▼'}${d}</span>` : '';
    return `<div class="stat ${m.cls}${d?' flash':''}">
      ${pop}<div class="ico">${m.ico}</div>
      <div class="lbl">${T(UI[m.ui])}</div>
      <div class="bar"><i style="width:${S[k]}%"></i></div>
      <div class="num">${S[k]}</div>
    </div>`;
  }).join('');
  updateAvatar(!!changed);
}

function renderProgress(){
  const p = document.getElementById('progress');
  let h='';
  for(let i=0;i<totalChapters;i++){
    const cls = i<chapterIndex?'done':(i===chapterIndex?'now':'');
    h+=`<i class="${cls}"></i>`;
  }
  p.innerHTML = h;
}

function startRun(){

/* ---- a chapter ---- */
function showChapter(){
  renderProgress();
  const ev = picks[chapterIndex];
  scene().className='fade';
  scene().scrollTop = 0;
  scene().innerHTML = `
    <div class="chapter-tag">${T(ev.tag)}</div>
    <h2 class="scene-title">${T(ev.title)}</h2>
    <p class="scene-body">${T(ev.body)}</p>
    <div class="choices">
      ${ev.choices.map((c,i)=>`
        <button class="choice" onclick="choose(${i})">
          <b class="ch-letter">${'ABC'[i]||''}</b>${T(c.label)}
          ${c.hint?`<span class="hint">${T(c.hint)}</span>`:''}
        </button>`).join('')}
    </div>`;
}

function applyEff(eff){
  const changed={};
  for(const k in eff){ const before=S[k]; S[k]=clamp(S[k]+eff[k]); if(S[k]!==before) changed[k]=eff[k]; }
  return changed;
}

function choose(i){
  Sfx.play('choice');
  const ev = picks[chapterIndex];
  const c = ev.choices[i];
  let eff = c.eff, resultText = c.result, ok = true;

  if(c.check){
    const roll = S[c.check.stat] + rnd(21); // skill + luck
    ok = roll >= c.check.dc;
    if(!ok){ eff = c.check.eff_fail; resultText = c.check.result_fail; }
  }
  const changed = applyEff(eff);
  if(c.good && ok) quality += c.good;        // good choices reward only when they land
  else if(c.good && !ok) quality += Math.max(0, c.good-1);
  if(ok && c.allies) bonusAllies += c.allies;   // true friends found in the story → board companions
  if(ok && c.debt)  storyDebt   += c.debt;       // borrowing / lost it all → start the board in the red

  // cinematic themed scene, then reveal the result + per-stat jingles + pops
  const th = storyTheme(ev);
  showSceneFx(th, T(ev.title), ()=>{ renderStats(changed); playStatFx(changed); showResult(ev, resultText, eff); }, SCENE_THEMES[th].icon);
}

function showResult(ev, resultText, eff){
  const deltas = Object.keys(eff).map(k=>{
    const v = eff[k]; if(!v) return '';
    const m = STAT_META[k];
    return `<span class="delta ${v>0?'up':'down'}">${m.ico} ${v>0?'+':''}${v}</span>`;
  }).join('');
  scene().className='fade';
  scene().innerHTML = `
    <div class="chapter-tag">${T(ev.tag)}</div>
    <h2 class="scene-title">${T(ev.title)}</h2>
    <p class="scene-body result">${resultText}</p>
    <div class="deltas">${deltas}</div>
    <div class="choices">
      <button class="btn-primary" onclick="advance()">${T(UI.next)} ▶</button>
    </div>`;
}

function advance(){
  Sfx.play('click');
  chapterIndex++;
  if(chapterIndex >= totalChapters) showStoryEnding();
  else showChapter();
}

/* ---- story ending (transition to the board phase — NO reward yet) ---- */
let lastResult=null;
function showStoryEnding(){
  phase='storyend';
  renderProgress();

    <div class="big-emoji">${e.emoji}</div>

    <div class="ending-name">${T(e.name)}</div>

    </div>`;
}

/* ---- final result (after the board) + reward ---- */
function showFinalResult(){
  phase='final';
  clearBoardState();   // board finished — no resume; story stays for skip-story
  // carry only cash + companions to the next game (debt carries as negative cash)
  gsave.carry = {cash:board.cash, companions:board.companions}; persistSave();
  const id = decideBoardEnding();
  const coins = calcBoardCoins();
  const firstClaimToday = !daily.playedToday;
  lastResult = {ending:id, coins, firstClaim:firstClaimToday, cash:board.cash, reached:board.reachedGoal, occ:board.occ};

  if(firstClaimToday){
    daily.playedToday = true; saveDaily();
    sendResult(coins, id);   // notify parent (IGNIS) — server decides real grant & cap
    setTimeout(()=>Sfx.play('coin'), 350);
  }
  renderFinal();
}

function renderFinal(){
  const {ending:id, coins, firstClaim:firstClaimToday, cash, reached, occ} = lastResult;

      <span class="muted">${T(UI.final_cash)}: <b style="color:var(--money)">¥${cash}${T(UI.man)}</b></span>
      <span class="muted">${T(UI.reached)}: ${reached?'🏁 '+T(UI.yes):T(UI.no)}</span>
    </div>

    <div class="carve">
      <small>${T(UI.carve_label)}</small>
      “${T(e.carve)}”
    </div>

    <div class="coin-box">
      <div class="muted">${T(UI.reward_title)}</div>
      <div class="amt">+${firstClaimToday?coins:0} <span style="font-size:14px;color:var(--sub)">${T(UI.coins_unit)}</span></div>
      <div class="cap">${T(UI.cap_note)}</div>
    </div>
    <div class="grant-line" id="grant-line"></div>

    <div class="actions">
      <button class="btn-primary" onclick="requestClose()">🏙️ ${T(UI.back_city)}</button>
      <button class="btn-again" onclick="restart()">↻ ${T(UI.again)}</button>

  const gl = document.getElementById('grant-line');
  if(firstClaimToday && !grantAnswered){
    gl.className='grant-line grant-no';

    if(grantTimeout) clearTimeout(grantTimeout);

    }, 1500);
  } else if(firstClaimToday && grantAnswered && lastGrant){
    gl.className = lastGrant.ok ? 'grant-line grant-ok' : 'grant-line grant-no';
    gl.textContent = lastGrant.text();
  } else {
    gl.className='grant-line grant-no';
    gl.textContent = T(UI.denied);
  }
}

function restart(){ grantAnswered=false; lastGrant=null; board=null; if(grantTimeout) clearTimeout(grantTimeout); phase='story'; buildRun(); renderStats(); showChapter(); }

/* =========================================================================
   PARENT BRIDGE (postMessage)
   ========================================================================= */
let grantAnswered=false, grantTimeout=null, lastGrant=null;
function sendResult(coins, ending){
  try{
    window.parent && window.parent!==window &&
      window.parent.postMessage({type:'IGNIS_LIFEGAME_RESULT', coins, ending, v:1}, '*');
  }catch(e){}
}
function requestClose(){
  try{
    window.parent && window.parent!==window &&
      window.parent.postMessage({type:'IGNIS_LIFEGAME_CLOSE', v:1}, '*');
  }catch(e){}
}
window.addEventListener('message', (e)=>{
  const d = e.data; if(!d || typeof d!=='object') return;
  const gl = document.getElementById('grant-line');
  if(d.type==='IGNIS_LIFEGAME_GRANTED'){
    grantAnswered=true; if(grantTimeout) clearTimeout(grantTimeout);
    const g=d.granted, t=d.total, capped=d.capped;
    lastGrant={ok:true, text:()=> (capped?UI.granted_cap:UI.granted)[lang](g,t)};
    if(gl){ gl.className='grant-line grant-ok'; gl.textContent=lastGrant.text(); }
  } else if(d.type==='IGNIS_LIFEGAME_DENIED'){
    grantAnswered=true; if(grantTimeout) clearTimeout(grantTimeout);
    lastGrant={ok:false, text:()=>T(UI.denied)};
    if(gl){ gl.className='grant-line grant-no'; gl.textContent=lastGrant.text(); }
  }
});

/* =========================================================================

   ========================================================================= */
function todayStr(){ return new Date().toISOString().slice(0,10); } // UTC date, matches RPC
function loadDaily(){
  let raw=null; try{ raw=JSON.parse(localStorage.getItem('ignis_lifegame_daily')||'null'); }catch(e){}
  daily = (raw && raw.date===todayStr()) ? raw : {date:todayStr(), playedToday:false};
}
function saveDaily(){ try{ localStorage.setItem('ignis_lifegame_daily', JSON.stringify(daily)); }catch(e){} }

/* ---- progress save: skip-story (2nd+) and resume-board ---- */
let gsave = {story:null, board:null};
function loadSave(){ try{ const r=JSON.parse(localStorage.getItem('ignis_lifegame_save')||'null'); gsave = r||{story:null,board:null}; }catch(e){ gsave={story:null,board:null}; } }
function persistSave(){ try{ localStorage.setItem('ignis_lifegame_save', JSON.stringify(gsave)); }catch(e){} }
function saveStoryResult(){ gsave.story={S:Object.assign({},S), storyEndingId, quality, bonusAllies, storyDebt}; persistSave(); }
function saveBoardState(){
  if(!board) return;
  gsave.board={ occ:board.occ, cash:board.cash, pos:board.pos, turn:board.turn, maxTurns:board.maxTurns,
    companions:board.companions, boardQuality:board.boardQuality, reachedGoal:board.reachedGoal,
    skipNext:board.skipNext, firstSalaryHalf:board.firstSalaryHalf, tiles:board.tiles,
    S:Object.assign({},S), storyEndingId, quality };
  persistSave();
}
function clearBoardState(){ gsave.board=null; persistSave(); }

function skipToBoard(){
  if(!gsave || !gsave.story){ startRun(); return; }
  audioKick(); Sfx.play('start');
  const st=gsave.story;
  S=Object.assign({money:30,trust:50,health:70,mind:60,bond:40}, st.S);
  storyEndingId=st.storyEndingId; quality=st.quality||0;
  bonusAllies=st.bonusAllies||0; storyDebt=st.storyDebt||0;
  startBoard();
}
function resumeBoard(){
  if(!gsave || !gsave.board){ showTitle(); return; }
  audioKick(); Sfx.play('start');
  const b=gsave.board;
  S=Object.assign({money:30,trust:50,health:70,mind:60,bond:40}, b.S);
  storyEndingId=b.storyEndingId; quality=b.quality||0;
  board={ occ:b.occ, cash:b.cash, pos:b.pos, turn:b.turn, maxTurns:b.maxTurns,
    companions:b.companions, boardQuality:b.boardQuality, reachedGoal:!!b.reachedGoal,
    skipNext:!!b.skipNext, busy:false, cont:null, curEvent:null, tiles:b.tiles,
    firstSalaryHalf:!!b.firstSalaryHalf };
  phase='board';
  renderBoard();
}

function rerenderCurrent(){
  // re-render the current phase in the new language (keep earned state — never re-decide/re-send).
  if(phase==='final' && lastResult){ renderFinal(); }
  else if(phase==='board'){ renderBoardStats(); renderBoard(); }
  else if(phase==='storyend'){ showStoryEnding(); }
  else if(phase==='story'){ renderStats(); showChapter(); }
  else { showTitle(); }
}

/* =========================================================================
   AUDIO — synthesized SFX (no files) + optional BGM mp3
   ========================================================================= */
const Sfx = (function(){
  let ctx=null, master=null, muted=false;
  function ensure(){ if(ctx) return ctx; try{ ctx=new (window.AudioContext||window.webkitAudioContext)();
    master=ctx.createGain(); master.gain.value=1.8; master.connect(ctx.destination);}catch(e){ctx=null;} return ctx; }
  function now(){ return ctx?ctx.currentTime:0; }
  function blip(f,t,dur,type,vol){ if(!ctx)return; const o=ctx.createOscillator(),g=ctx.createGain();
    o.type=type||'sine'; o.frequency.setValueAtTime(f,t);
    g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(vol||0.25,t+0.012);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur); o.connect(g); g.connect(master); o.start(t); o.stop(t+dur+0.02); }
  function slide(f1,f2,t,dur,type,vol){ if(!ctx)return; const o=ctx.createOscillator(),g=ctx.createGain();
    o.type=type||'sine'; o.frequency.setValueAtTime(f1,t); o.frequency.exponentialRampToValueAtTime(f2,t+dur);
    g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(vol||0.22,t+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur); o.connect(g); g.connect(master); o.start(t); o.stop(t+dur+0.02); }
  function noise(t,dur,vol){ if(!ctx)return; const len=Math.max(1,Math.floor(ctx.sampleRate*dur));
    const b=ctx.createBuffer(1,len,ctx.sampleRate), d=b.getChannelData(0);
    for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*(1-i/len);
    const n=ctx.createBufferSource(); n.buffer=b; const g=ctx.createGain(); g.gain.value=vol||0.12;
    const f=ctx.createBiquadFilter(); f.type='lowpass'; f.frequency.value=1600; n.connect(f); f.connect(g); g.connect(master); n.start(t); }
  const presets = {
    click(){ blip(440,now(),0.07,'triangle',0.16); },
    choice(){ const t=now(); blip(523,t,0.08,'triangle',0.18); blip(784,t+0.06,0.1,'triangle',0.16); },
    dice(){ for(let i=0;i<6;i++) noise(now()+i*0.07,0.06,0.1); },
    land(){ blip(170,now(),0.12,'sine',0.3); noise(now(),0.08,0.1); },
    up(){ const t=now(); [523,659,784].forEach((f,i)=>blip(f,t+i*0.06,0.12,'sine',0.2)); },
    down(){ const t=now(); [440,349,262].forEach((f,i)=>blip(f,t+i*0.06,0.13,'sine',0.18)); },
    good(){ const t=now(); [659,988].forEach((f,i)=>blip(f,t+i*0.07,0.18,'sine',0.2)); },
    bad(){ slide(200,90,now(),0.35,'sawtooth',0.16); },
    coin(){ const t=now(); [988,1319,1568,2093].forEach((f,i)=>blip(f,t+i*0.05,0.12,'triangle',0.16)); },
    ally(){ const t=now(); [392,494,587,784].forEach((f,i)=>blip(f,t+i*0.05,0.25,'sine',0.14)); },
    goal(){ const t=now(); [523,659,784,1047,1319].forEach((f,i)=>blip(f,t+i*0.11,0.4,'triangle',0.18)); },
    start(){ const t=now(); [392,523,659].forEach((f,i)=>blip(f,t+i*0.09,0.3,'sine',0.18)); },
  };
  const STAT_FREQ = {trust:659, health:784, mind:880, bond:988, money:1047};
  return {
    play(name){ if(muted) return; ensure(); if(!ctx) return; if(ctx.state==='suspended') ctx.resume();
      const p=presets[name]; if(p){ try{p();}catch(e){} } },
    // per-stat "チャリン" — distinct pitch per stat; bright double-note up, soft tone down
    stat(key, up){ if(muted) return; ensure(); if(!ctx) return; if(ctx.state==='suspended') ctx.resume();
      const f=STAT_FREQ[key]||700, t=now();
      try{ if(up){ blip(f,t,0.09,'triangle',0.2); blip(f*1.5,t+0.06,0.14,'triangle',0.16); }

  return {
    play(){ init(); if(!el) return; started=true; const p=el.play&&el.play(); if(p&&p.catch) p.catch(()=>{}); },

function buildMotif(kind, accent){
  const N = ({coins:11, rain:18, hearts:10, sparkle:14, shadow:7, confetti:16, rise:10})[kind] || 12;
  let h='';
  for(let i=0;i<N;i++){
    const left=rnd(101), delay=(Math.random()*0.9).toFixed(2), dur=(1.1+Math.random()*1.3).toFixed(2);
    if(kind==='coins') h+=`<i style="left:${left}%; top:0; font-size:${13+rnd(13)}px; animation:mFall ${dur}s linear ${delay}s infinite">🪙</i>`;
    else if(kind==='rain') h+=`<i style="left:${left}%; top:0; width:2px; height:${14+rnd(16)}px; background:linear-gradient(${accent},transparent); border-radius:2px; animation:mRain ${(0.7+Math.random()*0.5).toFixed(2)}s linear ${delay}s infinite"></i>`;
    else if(kind==='hearts') h+=`<i style="left:${left}%; bottom:0; font-size:${13+rnd(13)}px; filter:drop-shadow(0 0 6px ${accent}); animation:mRise ${dur}s ease-in ${delay}s infinite">❤</i>`;
    else if(kind==='confetti') h+=`<i style="left:${left}%; top:0; width:8px; height:13px; border-radius:2px; background:${pick([accent,'#ffce4f','#5be0c0','#7cc4ff','#ff3da1'])}; animation:mFall ${dur}s linear ${delay}s infinite"></i>`;
    else if(kind==='shadow'){ const dx=rnd(80)-40, dy=rnd(80)-40; h+=`<i style="left:${left}%; top:${rnd(101)}%; width:${28+rnd(46)}px; height:${28+rnd(46)}px; border-radius:50%; background:radial-gradient(circle,#000 0%,transparent 70%); --dx:${dx}px; --dy:${dy}px; animation:mDrift ${(2+Math.random()).toFixed(2)}s ease-out ${delay}s infinite"></i>`; }
    else if(kind==='rise') h+=`<i style="left:${left}%; bottom:0; font-size:${12+rnd(12)}px; filter:drop-shadow(0 0 6px ${accent}); animation:mRise ${dur}s ease-in ${delay}s infinite">✦</i>`;
    else h+=`<i style="left:${left}%; top:${rnd(101)}%; color:${accent}; font-size:${10+rnd(13)}px; text-shadow:0 0 8px ${accent}; animation:mTwinkle ${(0.8+Math.random()).toFixed(2)}s ease-in-out ${delay}s infinite">✦</i>`;
  }
  return h;
}
function showSceneFx(themeKey, label, then, iconOverride){
  const th = SCENE_THEMES[themeKey] || SCENE_THEMES.city;
  const sc = scene();
  let ov=document.getElementById('fx-overlay'); if(ov && ov.parentNode) ov.remove();
  ov=document.createElement('div'); ov.id='fx-overlay';
  ov.style.setProperty('--a', th.accent); ov.style.setProperty('--p1', th.pal[0]); ov.style.setProperty('--p2', th.pal[1]);
  ov.innerHTML = `<div class="fx-motif">${buildMotif(th.motif, th.accent)}</div>
    <div class="fx-core"><div class="fx-glow"></div><div class="fx-ring"></div><div class="fx-ring r2"></div>
      <div class="fx-emoji">${iconOverride||th.icon}</div></div>
    <div class="fx-label">${label}</div>`;
  sc.appendChild(ov);
  setTimeout(()=>{ if(ov && ov.parentNode) ov.remove(); if(then) then(); }, 1300);
}

function spawnEmbers(){

  let h='';
  for(let i=0;i<20;i++){
    const left=rnd(101), dur=(7+Math.random()*9).toFixed(1), delay=(Math.random()*9).toFixed(1),
      dx=(rnd(80)-40), sz=(3+rnd(4));
    h+=`<i style="left:${left}%; width:${sz}px; height:${sz}px; --dx:${dx}px; animation-duration:${dur}s; animation-delay:-${delay}s"></i>`;
  }
  el.innerHTML=h;
}

/* ---- avatar (you): ages through the journey, reacts to your state ---- */
function avatarEmoji(){
  if(typeof S==='object' && S){
    if(S.health<=20) return '🤕';
    if(S.mind<=20) return '😞';
  }
  let stage=0;
  if(phase==='board' && board){ const t=board.turn; stage = t<3?1 : t<7?2 : 3; }
  else if(phase==='final'){ stage=3; }
  else if(phase==='story'){ stage = (typeof chapterIndex==='number' && chapterIndex>=3)?1:0; }
  const ppl=['🧒','🧑','🧔','🧓'];
  let f=ppl[stage];
  if(S){ if(S.mind>=80 && S.health>=65) f='😄'; }
  return f;
}
function updateAvatar(bump){
  const a=document.getElementById('avatar'); if(!a) return;
  const nf=avatarEmoji();
  if(bump && a.textContent!==nf){ a.classList.remove('bump'); void a.offsetWidth; a.classList.add('bump'); }
  a.textContent=nf;
  a.classList.toggle('faceR', phase==='board'); // ボード中は右向き
}

/* ---- story chapter theme (for the cinematic scene on each choice) ---- */
function storyTheme(ev){
  const t=(ev && ev.title && ev.title.ja)||'';
  if(/詐欺|うまい話|甘い|当選/.test(t)) return 'fraud';
  if(/裏切|保証|判子|脅/.test(t)) return 'betrayal';
  if(/病|検査|体|燃え尽き|限界/.test(t)) return 'illness';
  if(/別れ|離れ|喪失|失|手が/.test(t)) return 'loss';
  if(/出会|縁|隣|再会|家族|電話|手紙/.test(t)) return 'bond';
  if(/仕事|任|就職|職|昇進/.test(t)) return 'work';
  if(/街|灯|壁/.test(t)) return 'city';
  if(/夢|出発|分かれ道|引っ越|住む/.test(t)) return 'travel';
  if(/孤独|部屋|一人|夜|静け/.test(t)) return 'rest';
  if(/立ち上が|再び|やり直|はじめ|始め|差し出す/.test(t)) return 'comeback';
  return 'city';
}

/* ---- mapping: story result → board start ---- */
function chooseOccupation(){
  if(storyEndingId==='lonely') return 'restart';
  const maxStat = Math.max(S.trust,S.mind,S.bond,S.health,S.money);
  if(maxStat < 40) return 'restart';
  if(S.money>=70 && S.money>=maxStat) return 'investor';
  const map = {trust:'entrepreneur', mind:'creator', bond:'caregiver', health:'craftsman'};
  let best='craftsman', bv=-1;
  for(const k in map){ if(S[k] > bv){ bv=S[k]; best=map[k]; } }
  return best;
}

function startBoard(){
  audioKick(); Sfx.play('start');
  const occKey = chooseOccupation();
  const sb = ({redeemer:10,reborn:10,quiet_peace:6,survivor:2,lonely:0})[storyEndingId];
  const carry = (gsave && gsave.carry) || {cash:0, companions:0};
  let cash = (8 + Math.round(S.money*0.4)) + (sb==null?2:sb) + (OCC[occKey].startCash||0)
           + (carry.cash||0) - (storyDebt||0);
  // floor to 5 only when no debt is carried in (debt → you can start in the red 借金)
  if((carry.cash||0) >= 0 && (storyDebt||0) === 0) cash = Math.max(5, cash);
  const sp = ({redeemer:3,reborn:3,quiet_peace:2,survivor:1,lonely:0})[storyEndingId];
  board = {
    occ:occKey, cash, pos:(sp==null?1:sp), turn:0, maxTurns:BOARD_MAX_TURNS,
    companions:(S.bond>=60?1:0) + (carry.companions||0) + (bonusAllies||0),
    boardQuality:0, reachedGoal:false,
    skipNext:false, busy:false, cont:null, curEvent:null, tiles:genTrack(),
    firstSalaryHalf:(S.mind<25),
    carriedNote:{cash:carry.cash||0, comp:carry.companions||0, allies:bonusAllies||0, debt:storyDebt||0},
  };
  if(gsave){ gsave.carry=null; persistSave(); }   // carryover is consumed once
  bonusAllies = 0; storyDebt = 0;
  renderBoardIntro();
}

/* 50 distinct board layouts (deterministic) — salary is rarer now (every 7–9). */
function mulberry32(a){ return function(){ a|=0; a=a+0x6D2B79F5|0; let t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
const BOARD_PATTERNS = (function(){
  const out=[];
  for(let p=0;p<50;p++){
    const r = mulberry32((p+1)*2654435761>>>0);
    const salaryEvery = (7 + Math.floor(r()*3)) * 3;   // 21–27 → paydays are now rare
    // per-pattern weighted bag (varies the "feel" of each board)
    const bag=[];
    const w = {event:3+Math.floor(r()*3), good:2+Math.floor(r()*2), bad:1+Math.floor(r()*2),
      encounter:1+Math.floor(r()*2), illness:1+Math.floor(r()*2), branch:1+Math.floor(r()*2),
      rest:1+Math.floor(r()*2), setback:1+Math.floor(r()*2), bonus:1+Math.floor(r()*2)};
    for(const k in w){ for(let n=0;n<w[k];n++) bag.push(k); }
    const arr=['start'];
    for(let i=1;i<GOAL;i++){ arr.push(i%salaryEvery===0 ? 'salary' : bag[Math.floor(r()*bag.length)]); }
    arr.push('goal');
    out.push(arr);
  }
  return out;
})();
function genTrack(){
  return BOARD_PATTERNS[rnd(BOARD_PATTERNS.length)].map(t=>({type:t}));
}

function renderBoardStats(changed){
  const el = statsEl(); el.setAttribute('aria-hidden','false');
  el.style.gridTemplateColumns='repeat(4,1fr)';
  el.classList.add('big-stats');
  el.innerHTML = ['trust','health','mind','bond'].map(k=>{
    const m = STAT_META[k]; const d = changed && changed[k];
    const pop = d ? `<span class="pop ${d>0?'up':'down'}">${d>0?'▲+':'▼'}${d}</span>` : '';
    return `<div class="stat ${m.cls}${d?' flash':''}">${pop}<div class="ico">${m.ico}</div><div class="lbl">${T(UI[m.ui])}</div>
      <div class="bar"><i style="width:${S[k]}%"></i></div><div class="num">${S[k]}</div></div>`;
  }).join('');
  updateAvatar(!!changed);
}

  }

}

function renderBoard(){
  board.busy=false; board.cont=null;
  saveBoardState();   // checkpoint at each roll-ready turn → enables "resume"
  renderBoardFrame(`<div class="die">🎲</div>
    <div class="choices"><button class="btn-primary" onclick="rollDice()">🎲 ${T(UI.roll)}</button></div>`);

/* ---- dice & movement ---- */
function rollDice(){
  if(board.busy) return;
  board.busy=true; audioKick();
  if(board.skipNext){
    board.skipNext=false; board.turn++; Sfx.play('click');
    showPanel(T(UI.tile_rest), T(UI.skip_turn), {}, afterResolve);
    return;
  }
  const d = 1+rnd(6);
  const st = document.getElementById('board-stage');
  if(st) st.innerHTML = `<div class="dice-area">${cubeHTML()}<p class="muted">${T(UI.rolling)}</p></div>`;
  Sfx.play('dice');
  setTimeout(()=>setCubeFace(d, 2), 50);        // tumble to the rolled face
  setTimeout(()=>{ Sfx.play('land'); moveBy(d); }, 1050);
}

function moveBy(d){
  board.turn++;
  let steps = Math.min(d, GOAL - board.pos);   // never overshoot the goal
  (function step(){
    if(steps<=0){ setTimeout(()=>resolveTile(board.pos), 360); return; }
    board.pos++; steps--;
    renderBoardFrame(`<div class="muted" style="text-align:center">${T(UI.moving)} (${board.pos})</div>`);
    Sfx.play('click');   // one hop per tile
    setTimeout(step, 250);
  })();
}

/* ---- continue plumbing ---- */
function boardContinue(){ Sfx.play('click'); const f=board.cont; board.cont=null; if(f) f(); }
function deltaChips(eff){
  let chips='';
  if(eff.cash){ chips += `<span class="delta ${eff.cash>0?'up':'down'}">💰 ${eff.cash>0?'+':''}${eff.cash}${T(UI.man)}</span>`; }
  for(const k in eff){ if(k==='cash') continue; const m=STAT_META[k]; if(!m) continue; const v=eff[k]; if(!v) continue;
    chips += `<span class="delta ${v>0?'up':'down'}">${m.ico} ${v>0?'+':''}${v}</span>`; }
  return chips;
}
function panelHTML(title, body, eff, contLabel){
  return `<div class="board-msg fade"><p class="mh">${title}</p><p>${body}</p>
      <div class="deltas">${deltaChips(eff||{})}</div></div>
    <div class="choices"><button class="btn-primary" onclick="boardContinue()">${contLabel||T(UI.cont)} ▶</button></div>`;
}
function showPanel(title, body, eff, contFn, contLabel){
  board.cont = contFn || afterResolve;
  board.statFx = eff || null;   // drives the floating +/- pops on the stat bars & cash
  renderBoardFrame(panelHTML(title, body, eff||{}, contLabel));
}

function applyBoardEff(eff){
  const changed={};
  for(const k in eff){
    if(k==='cash'){ board.cash += eff[k]; }
    else if(STAT_META[k]){ const b=S[k]; S[k]=clamp(S[k]+eff[k]); if(S[k]!==b) changed[k]=eff[k]; }
  }
  if(eff.cash>0) Sfx.play('coin'); else if(eff.cash<0) Sfx.play('bad');   // 所持金チャリン / 出費
  playStatFx(changed);                                                     // 信頼/健康/心/縁 それぞれの音
  return changed;
}

/* ---- tile resolution: central 演出 first, then resolve ---- */
const TILE_THEME = {salary:'money', good:'luck', bad:'loss', bonus:'windfall',
  encounter:'bond', rest:'rest', setback:'loss', start:'city'};
function tileLabel(type){
  const m={salary:'tile_salary',good:'tile_good',bad:'tile_bad',bonus:'tile_bonus',encounter:'tile_encounter',rest:'tile_rest',setback:'tile_setback'};
  return m[type] ? T(UI[m[type]]) : (lang==='ja'?'人生の途上':'On the way');
}
function resolveTile(idx){
  if(idx>=GOAL || board.tiles[idx].type==='goal'){
    showSceneFx('goal', T(UI.reach_goal), ()=>{ Sfx.play('goal'); resolveGoal(); }); return;
  }
  const t = board.tiles[idx];
  if(t.type==='event' || t.type==='branch' || t.type==='illness'){
    const ev = (t.type==='illness') ? ILLNESS_EVENT : pick(t.type==='branch' ? BRANCH_EVENTS : BOARD_EVENTS);
    const theme = ev.theme || (t.type==='illness'?'illness':(t.type==='branch'?'travel':'city'));
    showSceneFx(theme, T(ev.title), ()=>openBoardEvent(ev), ev.icon);
    return;
  }
  showSceneFx(TILE_THEME[t.type]||'city', tileLabel(t.type), ()=>doInlineTile(t));
}

function doInlineTile(t){
  const occ = OCC[board.occ];
  switch(t.type){
    case 'salary': {
      let amt = occ.salary[0] + rnd(occ.salary[1]-occ.salary[0]+1);
      let body = T(UI.msg_salary);
      if(board.firstSalaryHalf){ amt = Math.max(1, Math.round(amt/2)); board.firstSalaryHalf=false;
        body += lang==='ja' ? '（まだ本調子じゃない…今回は半分）' : ' (not at your best yet — half this time)'; }
      const eff={cash:amt}; applyBoardEff(eff); showPanel(T(UI.tile_salary), body, eff); break;
    }
    case 'good': {
      let amt = 2 + rnd(4) + (occ.goodBonus||0);
      const eff={cash:amt}; if(rnd(2)===0) eff.mind=2; if(rnd(3)===0) eff.bond=2;
      applyBoardEff(eff); showPanel(T(UI.tile_good), T(UI.msg_good), eff); break;
    }
    case 'bad': {
      let loss = 3 + rnd(4); if(occ.riskMul) loss = Math.round(loss*occ.riskMul);
      let body = T(UI.msg_bad);
      if(board.companions>0){ loss = Math.ceil(loss/2); board.companions--; body = T(UI.ally_save)+'\n'+body; Sfx.play('ally'); }
      const eff={cash:-loss}; applyBoardEff(eff); showPanel(T(UI.tile_bad), body, eff); break;
    }
    case 'bonus': {
      let amt = 6 + rnd(7); if(occ.bonusMul) amt = Math.round(amt*occ.bonusMul);
      const eff={cash:amt}; applyBoardEff(eff); showPanel(T(UI.tile_bonus), T(UI.msg_bonus), eff); break;
    }
    case 'rest': {
      const eff={health:4+rnd(5), mind:3+rnd(4)}; applyBoardEff(eff);
      showPanel(T(UI.tile_rest), T(UI.msg_rest), eff); break;
    }
    case 'encounter': {
      board.companions++; const eff={bond:4+rnd(5)}; applyBoardEff(eff); Sfx.play('ally');
      showPanel(T(UI.tile_encounter), T(UI.ally_join)+'\n'+T(UI.msg_encounter), eff); break;
    }
    case 'setback': {
      let back = 2 + rnd(3); let body = T(UI.msg_setback);
      if(S.trust>=60 || S.bond>=60) back = Math.max(1, back-1);
      if(board.companions>0){ board.companions--; back=0; body = T(UI.ally_save); Sfx.play('ally'); }
      else Sfx.play('down');
      board.pos = Math.max(0, board.pos - back);
      showPanel(T(UI.tile_setback), body, {}); break;
    }
    default:
      showPanel(lang==='ja'?'人生の途上':'On the way',
                lang==='ja'?'静かな一日。また、次へ進もう。':'A quiet day. On we go.', {});
  }
}

function openBoardEvent(ev){
  board.curEvent = ev; board.cont = null;
  const html = `<div class="board-msg fade"><p class="mh">${T(ev.title)}</p><p>${T(ev.body)}</p></div>
    <div class="choices">${ev.choices.map((c,i)=>`
      <button class="choice" onclick="boardChoose(${i})"><b class="ch-letter">${'ABC'[i]||''}</b>${T(c.label)}${c.hint?`<span class="hint">${T(c.hint)}</span>`:''}</button>`).join('')}</div>`;
  renderBoardFrame(html);
}

function boardChoose(i){
  const c = board.curEvent.choices[i];
  let eff = c.eff, body = c.result, ok = true;
  if(c.check){
    const roll = S[c.check.stat] + rnd(21);
    ok = roll >= c.check.dc;
    if(!ok){ eff = c.check.eff_fail; body = c.check.result_fail; }
  }
  applyBoardEff(eff);   // plays cash + per-stat sounds
  if(c.addCompanion && ok){ board.companions++; Sfx.play('ally'); }
  if(eff && eff.skip) board.skipNext = true;
  if(c.good && ok) board.boardQuality += c.good;
  else if(c.good && !ok) board.boardQuality += Math.max(0, c.good-1);
  showPanel(T(board.curEvent.title), body, eff, afterResolve);
}

function resolveGoal(){
  board.reachedGoal = true;
  let amt = 15; if(OCC[board.occ].bonusMul) amt = Math.round(amt*1.3);
  const eff={cash:amt}; applyBoardEff(eff);
  showPanel(T(UI.reach_goal), T(UI.msg_goal), eff, showFinalResult, T(UI.result_title));
}

function afterResolve(){
  if(board.reachedGoal || board.pos>=GOAL){ showFinalResult(); return; }
  if(board.turn>=board.maxTurns){ showFinalResult(); return; }
  renderBoard();
}

/* ---- final scoring ---- */
function decideBoardEnding(){
  const cash=board.cash, st=S.mind+S.bond+S.trust;
  if(board.reachedGoal && st>=170 && cash>=70) return 'fulfilled';
  if(cash>=120) return 'prosperous';
  if(S.mind<=25 || S.bond<=18) return 'not_alone';
  if(cash<=15 || st<110) return 'weathered';
  return 'content';
}
function calcBoardCoins(){
  let c = 4;
  c += Math.max(0, Math.min(9, Math.floor(board.cash/18)));   // wealth milestone (0..9)
  c += Math.floor((S.mind + S.bond + S.trust) / 40);          // heart/bonds/trust (0..7)
  c += board.reachedGoal ? 6 : 2;                              // completed the journey
  c += Math.max(0, Math.min(6, (quality||0) + board.boardQuality)); // wise/kind choices
  return Math.max(5, Math.min(30, Math.round(c)));
}

function ensureThree(ev, theme){
  if(!ev || !ev.choices || ev.choices.length>=3) return;
  const tc = THIRD[theme] || THIRD.city;
  ev.choices.push(JSON.parse(JSON.stringify(tc)));
}
function injectThirdChoices(){
  BOARD_EVENTS.forEach(e=>ensureThree(e, e.theme));
  BRANCH_EVENTS.forEach(e=>ensureThree(e, e.theme||'travel'));
  ensureThree(ILLNESS_EVENT, 'illness');
  [ACT1, ACT2, ACT3].forEach(arr=>arr.forEach(e=>ensureThree(e, storyTheme(e))));
}
